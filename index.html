// ─── Students Modal Component ─────────────────────────────────────────────────
function StudentsModal({students, classes, onClose, resetStudentPassword, deleteStudent, createStudentAccount, setStudents}) {
  const SCOLS=["#4fc3f7","#43d98c","#c792ea","#ffb347","#ff5370","#80cbc4"];
  const [resetTarget,setResetTarget]=useState(null);
  const [newPass,setNewPass]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [addName,setAddName]=useState("");
  const [addPass,setAddPass]=useState("");
  const [addClassId,setAddClassId]=useState(classes[0]?.id||"");
  const [addColor,setAddColor]=useState("#4fc3f7");
  const [addErr,setAddErr]=useState("");
  const [filterClass,setFilterClass]=useState("all");

  function exportStudentsExcel(){
    try {
      const rows=[["Name","Class","Joined","Colour"]];
      students.forEach(s=>{
        const cls=classes.find(c=>c.id===s.classId);
        rows.push([s.name,cls?cls.name:"—",new Date(s.created).toLocaleDateString(),s.color]);
      });
      const ws=XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"]=[{wch:24},{wch:18},{wch:14},{wch:10}];
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,"Students",ws);
      const b64=XLSX.write(wb,{bookType:"xlsx",type:"base64"});
      const a=document.createElement("a");
      a.href="data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,"+b64;
      a.download="students.xlsx"; a.click();
    } catch(e){ alert("Export failed: "+e.message); }
  }

  function handleAddStudent(){
    setAddErr("");
    if(!addName.trim()||!addPass.trim()||!addClassId){setAddErr("Fill in all fields");return;}
    if(addPass.length<3){setAddErr("Password must be at least 3 characters");return;}
    const res=createStudentAccount(addName.trim(),addPass,addClassId,addColor);
    if(res==="exists"){setAddErr("A student with that name already exists");return;}
    setAddName(""); setAddPass(""); setAddErr(""); setShowAdd(false);
    setStudents(LS.get("__shared__"+STUDENTS_KEY)||[]);
  }

  const visibleStuds=filterClass==="all"?students:students.filter(s=>s.classId===filterClass);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{maxWidth:600,display:"flex",flexDirection:"column",maxHeight:"88vh"}}>
        <div className="mhdr">
          <span>👥 Student Accounts</span>
          <div style={{display:"flex",gap:6,marginLeft:"auto",marginRight:8}}>
            <button className="btn btn-green btn-sm" onClick={exportStudentsExcel}>📥 Export Excel</button>
            <button className="btn btn-run btn-sm" onClick={()=>{setShowAdd(!showAdd);setAddErr("");}}>
              {showAdd?"✕ Cancel":"+ Add Student"}
            </button>
          </div>
          <button className="xbtn" onClick={onClose}>✕</button>
        </div>

        {showAdd&&(
          <div style={{padding:"16px 20px",borderBottom:"1px solid #1e2d3d",background:"#0a1628"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#4fc3f7",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>New Student</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <label style={{display:"block",fontSize:9,color:"#3d5a73",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Full Name</label>
                <input value={addName} onChange={e=>setAddName(e.target.value)} placeholder="e.g. Alice Johnson" autoFocus
                  style={{width:"100%",padding:"8px 10px",background:"#0d1b2a",border:"1px solid #1e2d3d",borderRadius:6,color:"#d6e4f0",fontSize:12,boxSizing:"border-box"}}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:9,color:"#3d5a73",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Password</label>
                <input type="password" value={addPass} onChange={e=>setAddPass(e.target.value)} placeholder="••••••"
                  style={{width:"100%",padding:"8px 10px",background:"#0d1b2a",border:"1px solid #1e2d3d",borderRadius:6,color:"#d6e4f0",fontSize:12,boxSizing:"border-box"}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"end"}}>
              <div>
                <label style={{display:"block",fontSize:9,color:"#3d5a73",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Class Group</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {classes.map(g=>(
                    <div key={g.id} onClick={()=>setAddClassId(g.id)} style={{padding:"5px 12px",borderRadius:99,border:`2px solid ${addClassId===g.id?g.color:"#1e2d3d"}`,background:addClassId===g.id?g.color+"22":"transparent",cursor:"pointer",fontSize:11,fontWeight:700,color:addClassId===g.id?g.color:"#3d5a73",transition:"all .15s"}}>
                      {g.name}
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <label style={{display:"block",fontSize:9,color:"#3d5a73",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Colour</label>
                <div style={{display:"flex",gap:5}}>
                  {SCOLS.map(c=><div key={c} onClick={()=>setAddColor(c)} style={{width:18,height:18,borderRadius:"50%",background:c,cursor:"pointer",border:addColor===c?"2px solid white":"2px solid transparent",boxShadow:addColor===c?`0 0 0 1px ${c}`:"none"}}/>)}
                </div>
              </div>
            </div>
            {addErr&&<div style={{marginTop:8,fontSize:11,color:"#ff5370"}}>{addErr}</div>}
            <button className="btn btn-run btn-sm" style={{marginTop:12}} onClick={handleAddStudent}>Create Account</button>
          </div>
        )}

        <div style={{display:"flex",gap:6,padding:"10px 20px 0",flexWrap:"wrap"}}>
          <div onClick={()=>setFilterClass("all")} style={{padding:"3px 10px",borderRadius:99,border:`1px solid ${filterClass==="all"?"#4fc3f7":"#1e2d3d"}`,background:filterClass==="all"?"#4fc3f722":"transparent",cursor:"pointer",fontSize:10,fontWeight:700,color:filterClass==="all"?"#4fc3f7":"#3d5a73"}}>All</div>
          {classes.map(g=><div key={g.id} onClick={()=>setFilterClass(g.id)} style={{padding:"3px 10px",borderRadius:99,border:`1px solid ${filterClass===g.id?g.color:"#1e2d3d"}`,background:filterClass===g.id?g.color+"22":"transparent",cursor:"pointer",fontSize:10,fontWeight:700,color:filterClass===g.id?g.color:"#3d5a73"}}>{g.name}</div>)}
        </div>

        <div className="mbody" style={{flex:1,overflowY:"auto"}}>
          {visibleStuds.length===0
            ?<div className="empty"><div className="empty-ico">👥</div><div>{students.length===0?"No students yet — add one above or have them register":"No students in this class"}</div></div>
            :visibleStuds.map(stu=>{
              const cls=classes.find(c=>c.id===stu.classId);
              const pts=(LS.get("__shared__"+POINTS_KEY)||{})[stu.sessionId];
              return (
                <div key={stu.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:8,background:"#0d1b2a",border:"1px solid #1e2d3d",marginBottom:8}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:stu.color+"33",border:`2px solid ${stu.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👨‍💻</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#d6e4f0"}}>{stu.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                      {cls&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:cls.color+"22",color:cls.color,fontWeight:700,border:`1px solid ${cls.color}44`}}>{cls.name}</span>}
                      <span style={{fontSize:9,color:"#3d5a73"}}>{new Date(stu.created).toLocaleDateString()}</span>
                      {pts&&<span style={{fontSize:9,color:"#ffd700",background:"#ffd70015",padding:"1px 6px",borderRadius:99,fontWeight:700,border:"1px solid #ffd70030"}}>{pts.total||0} pts</span>}
                    </div>
                  </div>
                  {resetTarget===stu.id?(
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input placeholder="New password" value={newPass} onChange={e=>setNewPass(e.target.value)}
                        style={{padding:"5px 8px",background:"#0a1628",border:"1px solid #1e2d3d",borderRadius:5,color:"#d6e4f0",fontSize:11,width:120}}/>
                      <button className="btn btn-green btn-sm" onClick={()=>{if(newPass.length>=3){resetStudentPassword(stu.id,newPass);setResetTarget(null);setNewPass("");}}} style={{padding:"5px 10px"}}>Save</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setResetTarget(null);setNewPass("");}} style={{padding:"5px 10px"}}>✕</button>
                    </div>
                  ):(
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>setResetTarget(stu.id)}>🔑 Reset pw</button>
                      <button className="btn btn-ghost btn-sm" style={{fontSize:10,color:"#ff5370",borderColor:"#ff537044"}} onClick={()=>deleteStudent(stu.id)}>🗑 Delete</button>
                    </div>
                  )}
                </div>
              );
            })
          }
        </div>
        <div className="mftr" style={{fontSize:10,color:"#3d5a73"}}>
          {visibleStuds.length} of {students.length} student{students.length!==1?"s":""}
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [sqlJS,setSqlJS]=useState(null);
  const [loading,setLoading]=useState(true);
  const [loginScreen,setLoginScreen]=useState(true);
  const [connectScreen,setConnectScreen]=useState(false); // show server connect screen
  const [fbConnected,setFbConnected]=useState(false);
  const [fbRoomCode,setFbRoomCode]=useState(()=>LS.get("qc:fbconfig")?.roomCode||"");
  const [view,setView]=useState("ide");
  const [sessions,setSessions]=useState([]);
  const [curSess,setCurSess]=useState(null);
  const [students,setStudents]=useState([]); // shared student registry
  const [db,setDb]=useState(null);
  const dbRef=useRef(null);
  const [query,setQuery]=useState("-- Welcome to QueryClass!\n-- MySQL 8.0 syntax is fully supported.\n-- Press Ctrl+Enter to run.\n\nSHOW DATABASES;\nSELECT VERSION();\nSELECT USER();\n");
  const [results,setResults]=useState([]);
  const [history,setHistory]=useState([]);
  const [tables,setTables]=useState([]);
  const [status,setStatus]=useState({type:"idle",msg:"Ready"});
  const [modal,setModal]=useState(null);
  const [newSess,setNewSess]=useState({name:"",role:"student",color:"#4fc3f7",classId:null});
  const taRef=useRef(null);
  const [notif,setNotif]=useState(null);

  // Marathon
  const [marathon,setMarathon]=useState(null);
  const [mStudents,setMStudents]=useState([]);
  const [mProgress,setMProgress]=useState({});
  const [mReg,setMReg]=useState(null);
  const [mRegName,setMRegName]=useState("");
  const [activeQ,setActiveQ]=useState(0);
  const [newM,setNewM]=useState({title:"",questions:[{prompt:"",points:1}]});

  // Quiz
  const [quizList,setQuizList]=useState([]);
  const [curQuiz,setCurQuiz]=useState(null);
  const [quizStudents,setQuizStudents]=useState([]);
  const [quizSubs,setQuizSubs]=useState({});
  const [qReg,setQReg]=useState(null);
  const [qRegName,setQRegName]=useState("");
  const [qAnswers,setQAnswers]=useState({});
  const [selQIdx,setSelQIdx]=useState(0);
  const [markingQuiz,setMarkingQuiz]=useState(null);
  const [markScores,setMarkScores]=useState({});
  const [markFeedback,setMarkFeedback]=useState({});
  const [newQuiz,setNewQuiz]=useState(null);
  const [confirmDeleteQuizId,setConfirmDeleteQuizId]=useState(null); // quiz pending deletion
  const pollRef=useRef(null);
  // Classes
  const [classes,setClasses]=useState([]);
  const [curClassId,setCurClassId]=useState(null); // teacher's selected class filter
  // Timer — stored directly on quiz meta, derived from quizList
  const [nowTs,setNowTs]=useState(Date.now());
  const timerTickRef=useRef(null);

  const COLORS=["#4fc3f7","#43d98c","#c792ea","#ffb347","#ff5370","#80cbc4"];
  const isTeacher=curSess?.role==="teacher";

  const notify=(msg,icon="✓")=>{ setNotif({msg,icon}); setTimeout(()=>setNotif(null),2500); };

  useEffect(()=>{
    (async()=>{
      // Restore Firebase connection from saved config
      const fbOk = await tryRestoreFirebase();
      if (fbOk) { subscribeSharedKeys(); setFbConnected(true); setFbRoomCode(_fbConfig?.roomCode||""); }
      const S=await loadSQLJS(); setSqlJS(S);
      const sess=await store.get(SESSIONS_KEY)||[]; setSessions(sess);
      const studs=LS.get("__shared__"+STUDENTS_KEY)||[]; setStudents(studs);
      const cid=await store.get(CURRENT_KEY);
      const cls=await getClassGroups(); setClasses(cls);
      if(cid){
        const f=sess.find(s=>s.id===cid);
        if(f){ await activateSession(f,S); await refreshMarathon(cid); await refreshQuizData(cid); }
        else setLoginScreen(true);
      } else {
        // No session — show connect screen first if Firebase not yet configured
        if(!fbOk) { setConnectScreen(true); setLoginScreen(false); }
        else setLoginScreen(true);
      }
      setLoading(false);
    })();
    return()=>clearInterval(pollRef.current);
  },[]);

  useEffect(()=>{
    timerTickRef.current=setInterval(()=>setNowTs(Date.now()),1000);
    return()=>clearInterval(timerTickRef.current);
  },[]);

  useEffect(()=>{
    clearInterval(pollRef.current);
    if(view==="marathon"||view==="quiz"||view==="whiteboard"||view==="rewards"||view==="ide"){
      pollRef.current=setInterval(async()=>{
        if(view!=="ide"){ refreshMarathon(); refreshQuizData(); }
        const cls=await getClassGroups();
        setClasses(prev=>JSON.stringify(prev)===JSON.stringify(cls)?prev:cls);

        // Students: re-sync teacher's shared tables every 4s so they always have latest
        if(curSess?.role==="student" && db && sqlJS){
          mergeSharedTables(db, sqlJS);
          refreshTables(db);
        }
      },4000);
    }
    return()=>clearInterval(pollRef.current);
  },[view]);

  // Marathon
  async function refreshMarathon(cid){
    const m=await store.get(MARATHON_KEY,true);
    setMarathon(prev=>JSON.stringify(prev)===JSON.stringify(m)?prev:m);
    const sts=await store.get(M_STUDENTS,true)||[];
    setMStudents(prev=>JSON.stringify(prev)===JSON.stringify(sts)?prev:sts);
    const prog={};
    for(const st of sts) prog[st.id]=await store.get(M_PROG_PFX+st.id,true)||{};
    setMProgress(prev=>JSON.stringify(prev)===JSON.stringify(prog)?prev:prog);
    const id=cid??(await store.get(CURRENT_KEY));
    if(id){const f=sts.find(s=>s.sessionId===id); setMReg(prev=>JSON.stringify(prev)===JSON.stringify(f||null)?prev:(f||null));}
  }
  async function registerMarathon(){
    if(!mRegName.trim()||!curSess) return;
    const st={id:curSess.id+"-m-"+uid(),name:mRegName.trim(),sessionId:curSess.id,joinedAt:new Date().toISOString()};
    const sts=await store.get(M_STUDENTS,true)||[];
    const upd=[...sts.filter(s=>s.sessionId!==curSess.id),st];
    await store.set(M_STUDENTS,upd,true); await store.set(M_PROG_PFX+st.id,{},true);
    setMStudents(upd); setMReg(st); setMRegName(""); notify("Joined marathon!");
  }
  async function markM(studentId,qId,val){
    const prog=await store.get(M_PROG_PFX+studentId,true)||{};
    prog[qId]=val; await store.set(M_PROG_PFX+studentId,prog,true);
    setMProgress(p=>({...p,[studentId]:{...(p[studentId]||{}),[qId]:val}}));
  }
  async function saveMarathon(){
    const qs=newM.questions.filter(q=>q.prompt.trim());
    if(!qs.length||!newM.title.trim()) return;
    const m={title:newM.title.trim(),questions:qs.map((q,i)=>({id:i+1,prompt:q.prompt.trim(),points:Number(q.points)||1})),created:new Date().toISOString()};
    await store.set(MARATHON_KEY,m,true); setMarathon(m); setModal(null);
    setNewM({title:"",questions:[{prompt:"",points:1}]}); notify("Marathon saved!");
  }
  const mScore=sid=>(marathon?.questions||[]).reduce((s,q)=>s+(mProgress[sid]?.[q.id]==="done"?q.points:0),0);
  const mTotal=()=>(marathon?.questions||[]).reduce((s,q)=>s+q.points,0);

  // Quiz
  async function refreshQuizData(cid){
    const ql=await store.get(QUIZZES_KEY,true)||[];
    setQuizList(prev=>JSON.stringify(prev)===JSON.stringify(ql)?prev:ql);
    const qs=await store.get(QSTUDENTS_KEY,true)||[];
    setQuizStudents(prev=>JSON.stringify(prev)===JSON.stringify(qs)?prev:qs);
    const subs={};
    for(const st of qs) subs[st.id]=await store.get(QSUB_PFX+st.id,true)||{};
    setQuizSubs(prev=>JSON.stringify(prev)===JSON.stringify(subs)?prev:subs);
    const id=cid??(await store.get(CURRENT_KEY));
    if(id){const f=qs.find(s=>s.sessionId===id); setQReg(prev=>JSON.stringify(prev)===JSON.stringify(f||null)?prev:(f||null));}
  }
  async function startQuizTimer(quizId,durationMins){
    const startAt=Date.now();
    const endsAt=startAt+durationMins*60*1000;
    // Store timer on both the full quiz object and the meta list
    const quiz=await store.get(QUIZ_PFX+quizId,true);
    if(quiz){quiz.timer={startAt,endsAt,durationMins};await store.set(QUIZ_PFX+quizId,quiz,true);}
    const list=await store.get(QUIZZES_KEY,true)||[];
    const upd=list.map(q=>q.id===quizId?{...q,timer:{startAt,endsAt,durationMins}}:q);
    await store.set(QUIZZES_KEY,upd,true);
    setQuizList(prev=>prev.map(q=>q.id===quizId?{...q,timer:{startAt,endsAt,durationMins}}:q));
    notify(`⏱ Timer started — ${durationMins} min`);
  }
  async function stopQuizTimer(quizId){
    const quiz=await store.get(QUIZ_PFX+quizId,true);
    if(quiz){delete quiz.timer;await store.set(QUIZ_PFX+quizId,quiz,true);}
    const list=await store.get(QUIZZES_KEY,true)||[];
    const upd=list.map(q=>q.id===quizId?{...q,timer:null}:q);
    await store.set(QUIZZES_KEY,upd,true);
    setQuizList(prev=>prev.map(q=>q.id===quizId?{...q,timer:null}:q));
    notify("⏱ Timer stopped");
  }
  function timerInfo(quizId){
    const meta=quizList.find(q=>q.id===quizId);
    const t=meta?.timer; if(!t) return null;
    const secsLeft=Math.max(0,Math.round((t.endsAt-nowTs)/1000));
    const totalSecs=t.durationMins*60;
    const pctLeft=Math.max(0,Math.round((secsLeft/totalSecs)*100));
    const mins=Math.floor(secsLeft/60);
    const secs=secsLeft%60;
    const label=`${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
    const expired=secsLeft===0;
    const urgent=secsLeft<=60&&!expired;
    const warn=secsLeft<=300&&secsLeft>60;
    return{secsLeft,pctLeft,label,expired,urgent,warn,startAt:t.startAt,endsAt:t.endsAt,durationMins:t.durationMins};
  }

  // ── Render Logical ERD (node-based) to PNG ──────────────────────────────────
  function renderERtoPNG(erData, width=700, height=480) {
    return new Promise(resolve => {
      try {
        // Support both old format (entities/relations) and new (nodes/edges)
        let nodes = erData?.nodes || [];
        let edges = erData?.edges || [];
        // Backward compat: old entities format
        if(!nodes.length && erData?.entities?.length) {
          nodes = erData.entities.map(e=>({id:e.id,kind:'entity',label:e.name,x:e.x,y:e.y}));
          edges = (erData.relations||[]).map(r=>({id:r.id,from:r.from,to:r.to,card:r.cardinality||''}));
        }
        if (!nodes.length) { resolve(null); return; }

        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#0d1117"; ctx.fillRect(0, 0, width, height);
        // Grid dots
        ctx.fillStyle = "#1e2d3d";
        for (let x=0; x<width; x+=24) for (let y=0; y<height; y+=24) ctx.fillRect(x,y,1,1);

        // Auto-layout if all zero
        const allZero = nodes.every(n=>!n.x&&!n.y);
        const cols = Math.ceil(Math.sqrt(nodes.length));
        const laid = nodes.map((n,i)=>{
          if(allZero){const col=i%cols,row=Math.floor(i/cols);return{...n,x:30+col*200,y:30+row*120};}
          return n;
        });

        const W=(n)=>n.kind==='relationship'||n.kind==='weak_rel'?120:n.kind?.includes('attr')||n.kind==='key_attr'?110:140;
        const H=(n)=>n.kind==='relationship'||n.kind==='weak_rel'?44:n.kind?.includes('attr')||n.kind==='key_attr'?34:38;
        const cx=(n)=>n.x+W(n)/2, cy=(n)=>n.y+H(n)/2;

        // Draw edges
        edges.forEach(ed=>{
          const fn=laid.find(n=>n.id===ed.from),tn=laid.find(n=>n.id===ed.to);
          if(!fn||!tn) return;
          ctx.beginPath(); ctx.moveTo(cx(fn),cy(fn)); ctx.lineTo(cx(tn),cy(tn));
          ctx.strokeStyle="#2d4a66"; ctx.lineWidth=1.5; ctx.setLineDash([]); ctx.stroke();
          if(ed.card||ed.label){
            const mx=(cx(fn)+cx(tn))/2, my=(cy(fn)+cy(tn))/2;
            ctx.fillStyle="#111720"; ctx.fillRect(mx-20,my-9,40,18);
            ctx.strokeStyle="#4fc3f7"; ctx.lineWidth=1; ctx.strokeRect(mx-20,my-9,40,18);
            ctx.fillStyle="#4fc3f7"; ctx.font="bold 9px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillText(ed.card||ed.label,mx,my);
          }
        });

        // Draw nodes
        laid.forEach(nd=>{
          const w=W(nd),h=H(nd),x=nd.x,y=nd.y;
          ctx.fillStyle="#d6e4f0"; ctx.font="bold 11px Arial,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
          const kind=nd.kind||'entity';
          if(kind==='entity'){
            ctx.fillStyle="#181f2a"; ctx.strokeStyle="#2d4a66"; ctx.lineWidth=1.5;
            ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
            ctx.fillStyle="#d6e4f0"; ctx.fillText(nd.label,x+w/2,y+h/2);
          } else if(kind==='weak_entity'){
            ctx.fillStyle="#181f2a"; ctx.strokeStyle="#4fc3f7"; ctx.lineWidth=1.5;
            ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
            ctx.strokeRect(x+4,y+4,w-8,h-8);
            ctx.fillStyle="#d6e4f0"; ctx.fillText(nd.label,x+w/2,y+h/2);
          } else if(kind==='relationship'||kind==='weak_rel'){
            const hx=x+w/2,hy=y+h/2;
            ctx.fillStyle="#0d1117"; ctx.strokeStyle="#c3e88d"; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.moveTo(hx,y); ctx.lineTo(x+w,hy); ctx.lineTo(hx,y+h); ctx.lineTo(x,hy); ctx.closePath();
            ctx.fill(); ctx.stroke();
            if(kind==='weak_rel'){ctx.beginPath();ctx.moveTo(hx,y+5);ctx.lineTo(x+w-5,hy);ctx.lineTo(hx,y+h-5);ctx.lineTo(x+5,hy);ctx.closePath();ctx.stroke();}
            ctx.fillStyle="#c3e88d"; ctx.fillText(nd.label,hx,hy);
          } else if(kind?.includes('attr')||kind==='key_attr'){
            const rx=w/2,ry=h/2;
            ctx.fillStyle="#0d1117"; ctx.strokeStyle="#f78c6c"; ctx.lineWidth=1.5;
            if(kind==='derived_attr'){ctx.setLineDash([5,3]);}
            ctx.beginPath(); ctx.ellipse(x+rx,y+ry,rx,ry,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.setLineDash([]);
            if(kind==='multi_attr'){ctx.beginPath();ctx.ellipse(x+rx,y+ry,rx-4,ry-4,0,0,Math.PI*2);ctx.stroke();}
            ctx.fillStyle="#f78c6c";
            if(kind==='key_attr'){
              ctx.save(); ctx.font="bold 10px monospace"; ctx.textDecoration="underline";
              ctx.fillText(nd.label,x+rx,y+ry);
              ctx.beginPath(); const tw=ctx.measureText(nd.label).width;
              ctx.moveTo(x+rx-tw/2,y+ry+7); ctx.lineTo(x+rx+tw/2,y+ry+7);
              ctx.strokeStyle="#f78c6c"; ctx.lineWidth=1; ctx.stroke(); ctx.restore();
            } else { ctx.font="10px monospace"; ctx.fillText(nd.label,x+rx,y+ry); }
          }
        });

        resolve(canvas.toDataURL("image/png"));
      } catch(e){ resolve(null); }
    });
  }

  // ── Render Relational Model (Physical ERD) to PNG ─────────────────────────
  function renderRelationalToPNG(relData, width=700, height=480) {
    return new Promise(resolve=>{
      try {
        const tables = relData?.tables||[];
        if(!tables.length){ resolve(null); return; }
        const fkeys = relData?.fkeys||[];

        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#0d1117"; ctx.fillRect(0,0,width,height);
        ctx.fillStyle = "#1e2d3d";
        for(let x=0;x<width;x+=24) for(let y=0;y<height;y+=24) ctx.fillRect(x,y,1,1);

        const COL_H=20, HDR_H=28, TBL_W=170;
        const tblH=(t)=>HDR_H+t.cols.length*COL_H;

        // Auto-layout
        const allZero=tables.every(t=>!t.x&&!t.y);
        const cols=Math.ceil(Math.sqrt(tables.length));
        const laid=tables.map((t,i)=>{
          if(allZero){const col=i%cols,row=Math.floor(i/cols);return{...t,x:20+col*210,y:20+row*160};}
          return t;
        });

        const cx=(t)=>t.x+TBL_W/2;
        const colCy=(t,ci)=>t.y+HDR_H+ci*COL_H+COL_H/2;

        // FK arrows
        fkeys.forEach(fk=>{
          const ft=laid.find(t=>t.id===fk.fromTable),tt=laid.find(t=>t.id===fk.toTable);
          if(!ft||!tt) return;
          const fci=ft.cols.findIndex(c=>c.id===fk.fromCol);
          const tci=tt.cols.findIndex(c=>c.id===fk.toCol);
          const x1=cx(ft),y1=fci>=0?colCy(ft,fci):ft.y+tblH(ft)/2;
          const x2=cx(tt),y2=tci>=0?colCy(tt,tci):tt.y+tblH(tt)/2;
          ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
          ctx.strokeStyle="#5a7a94"; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.stroke();
          ctx.setLineDash([]);
          // Arrow
          const ang=Math.atan2(y2-y1,x2-x1);
          ctx.fillStyle="#5a7a94";
          ctx.beginPath(); ctx.moveTo(x2,y2);
          ctx.lineTo(x2-10*Math.cos(ang-0.4),y2-10*Math.sin(ang-0.4));
          ctx.lineTo(x2-10*Math.cos(ang+0.4),y2-10*Math.sin(ang+0.4));
          ctx.closePath(); ctx.fill();
          // Card label
          const mx=(x1+x2)/2,my=(y1+y2)/2;
          ctx.fillStyle="#111720"; ctx.fillRect(mx-16,my-8,32,16);
          ctx.strokeStyle="#5a7a94"; ctx.lineWidth=1; ctx.strokeRect(mx-16,my-8,32,16);
          ctx.fillStyle="#5a7a94"; ctx.font="bold 8px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(fk.card||"N:1",mx,my);
        });

        // Tables
        laid.forEach(tbl=>{
          const h=tblH(tbl);
          // Shadow
          ctx.fillStyle="rgba(0,0,0,.4)"; ctx.fillRect(tbl.x+3,tbl.y+3,TBL_W,h);
          // Body
          ctx.fillStyle="#181f2a"; ctx.strokeStyle="#2d4a66"; ctx.lineWidth=1.5;
          ctx.fillRect(tbl.x,tbl.y,TBL_W,h); ctx.strokeRect(tbl.x,tbl.y,TBL_W,h);
          // Header
          ctx.fillStyle="#2d4a66"; ctx.fillRect(tbl.x,tbl.y,TBL_W,HDR_H);
          ctx.fillStyle="#d6e4f0"; ctx.font="bold 12px Arial,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(tbl.name,tbl.x+TBL_W/2,tbl.y+HDR_H/2);
          // Columns
          tbl.cols.forEach((col,ci)=>{
            const cy2=tbl.y+HDR_H+ci*COL_H;
            ctx.strokeStyle="#1e2d3d"; ctx.lineWidth=0.5;
            ctx.beginPath(); ctx.moveTo(tbl.x,cy2); ctx.lineTo(tbl.x+TBL_W,cy2); ctx.stroke();
            if(col.pk){ctx.fillStyle="#ffe082";ctx.font="bold 8px monospace";ctx.textAlign="left";ctx.textBaseline="middle";ctx.fillText("PK",tbl.x+5,cy2+COL_H/2);}
            else if(col.fk){ctx.fillStyle="#ffb347";ctx.font="bold 8px monospace";ctx.textAlign="left";ctx.textBaseline="middle";ctx.fillText("FK",tbl.x+5,cy2+COL_H/2);}
            ctx.fillStyle=col.pk?"#ffe082":"#d6e4f0";
            ctx.font=col.pk?"bold 10px monospace":"10px monospace"; ctx.textAlign="left"; ctx.textBaseline="middle";
            ctx.fillText(col.name+(col.nn&&!col.pk?"*":""),tbl.x+(col.pk||col.fk?22:8),cy2+COL_H/2);
            ctx.fillStyle="#5a7a94"; ctx.font="9px monospace"; ctx.textAlign="right";
            ctx.fillText((col.type||"").split("(")[0],tbl.x+TBL_W-5,cy2+COL_H/2);
          });
        });
        resolve(canvas.toDataURL("image/png"));
      } catch(e){ resolve(null); }
    });
  }

  // ── Render a SQL code block to PNG ────────────────────────────────────────
  function renderSQLtoPNG(sqlText, width=700) {
    return new Promise(resolve=>{
      try {
        if(!sqlText||sqlText.trim()==="No answer submitted"){resolve(null);return;}
        const lines=sqlText.split("\n");
        const lineH=18, pad=14, lineNW=32;
        const height=Math.max(60, lines.length*lineH+pad*2);
        const canvas=document.createElement("canvas");
        canvas.width=width; canvas.height=height;
        const ctx=canvas.getContext("2d");
        ctx.fillStyle="#0d1117"; ctx.fillRect(0,0,width,height);
        // Line number gutter
        ctx.fillStyle="#111720"; ctx.fillRect(0,0,lineNW,height);
        ctx.strokeStyle="#1e2d3d"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(lineNW,0); ctx.lineTo(lineNW,height); ctx.stroke();

        // Simple syntax highlighting
        const KW=/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP BY|ORDER BY|HAVING|LIMIT|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|ALTER|DROP|INDEX|PRIMARY|KEY|FOREIGN|REFERENCES|NOT NULL|DEFAULT|AUTO_INCREMENT|AUTOINCREMENT|UNIQUE|AND|OR|IN|NOT|IS|NULL|AS|DISTINCT|UNION|ALL|CASE|WHEN|THEN|ELSE|END|BY|ASC|DESC|COUNT|SUM|AVG|MIN|MAX|SHOW|DESCRIBE|USE)\b/gi;
        const STR=/('(?:[^'])*'|"(?:[^"])*")/g;
        const CMT=/(--[^\n]*|\/\*[\s\S]*?\*\/)/g;
        const NUM=/\b(\d+(?:\.\d+)?)\b/g;

        ctx.font="13px 'Courier New',monospace";
        ctx.textBaseline="middle";

        lines.forEach((line,li)=>{
          const y=pad+li*lineH;
          // Line number
          ctx.fillStyle="#2d4a66"; ctx.font="11px monospace"; ctx.textAlign="right";
          ctx.fillText(li+1,lineNW-5,y+lineH/2);
          ctx.font="13px 'Courier New',monospace"; ctx.textAlign="left";

          // Tokenise and paint
          let x=lineNW+8;
          let rest=line;
          // Comments — entire line
          if(rest.trim().startsWith("--")||rest.trim().startsWith("#")){
            ctx.fillStyle="#5a7a94"; ctx.fillText(rest,x,y+lineH/2); return;
          }
          // Paint word by word (simple approach)
          const tokens=rest.split(/(\s+)/);
          tokens.forEach(tok=>{
            if(!tok){return;}
            if(/^\s+$/.test(tok)){x+=ctx.measureText(tok).width;return;}
            let color="#d6e4f0";
            if(KW.test(tok)){color="#4fc3f7";}
            else if(/^('.*'|".*")$/.test(tok)){color="#c3e88d";}
            else if(/^\d+$/.test(tok)){color="#f78c6c";}
            else if(/^[(),;*=<>!]+$/.test(tok)){color="#89ddff";}
            KW.lastIndex=0;
            ctx.fillStyle=color;
            ctx.fillText(tok,x,y+lineH/2);
            x+=ctx.measureText(tok).width;
          });
        });
        resolve(canvas.toDataURL("image/png"));
      } catch(e){resolve(null);}
    });
  }

  // ── Main export ───────────────────────────────────────────────────────────
  async function exportQuizExcel(quizId) {
    notify("⏳ Generating export…");
    await new Promise(r=>setTimeout(r,50)); // let notify render

    const quiz = await store.get(QUIZ_PFX+quizId, true);
    if(!quiz){notify("Quiz not found");return;}
    const allStudents = await store.get(QSTUDENTS_KEY, true) || [];
    const qs = quiz.classId ? allStudents.filter(s=>s.classId===quiz.classId) : allStudents;
    const totalPts = quiz.questions.reduce((s,q)=>s+((q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):(q.type==="er_logical"||q.type==="er_physical")?(q.points||10):q.points)),0);
    const cls = classes.find(c=>c.id===quiz.classId);

    // ── Read all submissions correctly (shared prefix) ────────────────────
    const subMap = {}; // studentId → submission
    for(const st of qs){
      const sub = readSub(st.id, quizId);
      if(sub) subMap[st.id]=sub;
    }

    // ── Pre-render all images ─────────────────────────────────────────────
    const erPngs  = {}; // `${stId}_${qIdx}` → dataURL (logical ERD / scenario ER)
    const relPngs = {}; // `${stId}_${qIdx}` → dataURL (relational model)
    const sqlPngs = {}; // `${stId}_${qIdx}` → dataURL
    for(const st of qs){
      const sub=subMap[st.id]; if(!sub) continue;
      for(let i=0;i<quiz.questions.length;i++){
        const q=quiz.questions[i];
        if(q.type==="scenario"){
          if(sub.answers[i]?.er?.entities?.length>0||sub.answers[i]?.er?.nodes?.length>0)
            erPngs[`${st.id}_${i}`]=await renderERtoPNG(sub.answers[i].er);
          if(sub.answers[i]?.sql?.trim())
            sqlPngs[`${st.id}_${i}`]=await renderSQLtoPNG(sub.answers[i].sql);
        }
        if(q.type==="er_logical"){
          const ans=sub.answers[i];
          if(ans?.nodes?.length>0||ans?.entities?.length>0)
            erPngs[`${st.id}_${i}`]=await renderERtoPNG(ans);
        }
        if(q.type==="er_physical"){
          const ans=sub.answers[i];
          if(ans?.tables?.length>0)
            relPngs[`${st.id}_${i}`]=await renderRelationalToPNG(ans);
        }
        if(q.type==="sql"&&sub.answers[i]?.trim())
          sqlPngs[`${st.id}_${i}`]=await renderSQLtoPNG(sub.answers[i]);
      }
    }

    // ════════════════════════════════════════════════════════════════════
    // Generate HTML Report (opens in browser & Excel)
    // ════════════════════════════════════════════════════════════════════
    const ranked=[...qs].sort((a,b)=>{
      const sa=subMap[a.id]?.marked?subMap[a.id].totalScore:-1;
      const sb=subMap[b.id]?.marked?subMap[b.id].totalScore:-1;
      return sb-sa;
    });

    const timerStart = quiz.timer?.startAt ? new Date(quiz.timer.startAt) : null;

    // ── Build grade table rows (pre-computed, no await needed) ────────────
    const qHeaders = quiz.questions.map((_,i) => "<th>Q"+(i+1)+"</th>").join("");
    const gradeRows = ranked.map(function(st, ri) {
      var sub = subMap[st.id];
      if(!sub) return "<tr><td class='rank'>"+(ri+1)+"</td><td>"+st.name+"</td><td colspan='"+(5+quiz.questions.length)+"'><span class='not-submitted'>Not submitted</span></td></tr>";
      var submittedAt = sub.submittedAt ? new Date(sub.submittedAt) : null;
      var timeTaken = "—";
      if(submittedAt && timerStart){ var diff=Math.round((submittedAt-timerStart)/1000); timeTaken=Math.floor(diff/60)+"m "+diff%60+"s"; }
      else if(submittedAt && quiz.created){ var diff2=Math.round((submittedAt-new Date(quiz.created))/1000); timeTaken=Math.floor(diff2/60)+"m "+diff2%60+"s"; }
      var p2 = sub.marked ? pct(sub.totalScore,totalPts) : null;
      var gc = p2!==null ? (p2>=90?"badge-a":p2>=80?"badge-b":p2>=60?"badge-c":"badge-f") : "badge-p";
      var gl = p2!==null ? gradeLabel(p2) : "Pending";
      var qS = quiz.questions.map(function(q,i){
        if(!sub.marked) return "<td><span class='badge badge-p'>—</span></td>";
        var s=0;
        if(q.type==="scenario") s=(Number(sub.feedback&&sub.feedback[i+"_er"]||0)+Number(sub.feedback&&sub.feedback[i+"_sql"]||0));
        else if(q.type==="sql") s=Number(sub.feedback&&sub.feedback[i+"_sql"]||0);
        else s=sub.answers[i]===q.correct?q.points:0;
        var mx=(q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):(q.type==="er_logical"||q.type==="er_physical")?(q.points||10):q.points);
        var ok=s>=mx;
        return "<td style='text-align:center'><b style='color:"+(ok?"#059669":"#dc2626")+"'>"+s+"</b><span style='color:#94a3b8'>/"+mx+"</span></td>";
      }).join("");
      return "<tr><td class='rank'>"+(ri+1)+"</td><td><b>"+st.name+"</b></td>"
        +"<td style='color:#64748b;font-size:11px'>"+(submittedAt?submittedAt.toLocaleString():"—")+"</td>"
        +"<td style='font-family:monospace'>"+timeTaken+"</td>"
        +"<td><b>"+(sub.marked?sub.totalScore+"/"+totalPts:"Pending")+"</b></td>"
        +"<td>"+(p2!==null?p2+"%":"—")+"</td>"
        +"<td><span class='badge "+gc+"'>"+gl+"</span></td>"
        +qS+"</tr>";
    }).join("");

    // ── Build per-student answer sections (async — images already rendered) ─
    var studentSections = [];
    for(var si=0; si<qs.length; si++){
      var st = qs[si];
      var sub = subMap[st.id];
      if(!sub){
        studentSections.push("<div class='student-section'><div class='student-hdr'><h2>"+st.name+"</h2><span class='badge badge-ns'>Not Submitted</span></div></div>");
        continue;
      }
      var submittedAt = sub.submittedAt ? new Date(sub.submittedAt) : null;
      var markedAt    = sub.markedAt    ? new Date(sub.markedAt)    : null;
      var p3  = sub.marked ? pct(sub.totalScore,totalPts) : null;
      var gc3 = p3!==null ? (p3>=90?"badge-a":p3>=80?"badge-b":p3>=60?"badge-c":"badge-f") : "badge-p";
      var tT  = "—";
      if(submittedAt&&timerStart){var dd=Math.round((submittedAt-timerStart)/1000);tT=Math.floor(dd/60)+"m "+dd%60+"s";}
      else if(submittedAt&&quiz.created){var dd2=Math.round((submittedAt-new Date(quiz.created))/1000);tT=Math.floor(dd2/60)+"m "+dd2%60+"s";}

      var qBlocks = [];
      for(var qi2=0; qi2<quiz.questions.length; qi2++){
        var q   = quiz.questions[qi2];
        var idx = qi2;
        var qPts = q.type==="scenario" ? (q.erPoints||5)+(q.sqlPoints||5) : q.points;

        // Score html
        var scoreHtml = "";
        if(sub.marked){
          if(q.type==="er_logical"||q.type==="er_physical"){
            var erSc4 = Number(sub.feedback&&sub.feedback[idx+"_er"]||0);
            var erFb4 = (sub.feedback&&sub.feedback[idx+"_er"])||"";
            scoreHtml = "<div class='score-row'><span>Score: <b>"+erSc4+"/"+(q.points||10)+"</b></span></div>";
            if(erFb4) scoreHtml += "<div class='feedback-box'>&#128172; "+erFb4+"</div>";
          } else if(q.type==="scenario"){
            var erSc  = Number(sub.feedback&&sub.feedback[idx+"_er"]  ||0);
            var sqlSc = Number(sub.feedback&&sub.feedback[idx+"_sql"] ||0);
            var erFb  = (sub.feedback&&sub.feedback[idx+"_er"])  ||"";
            var sqlFb = (sub.feedback&&sub.feedback[idx+"_sql"]) ||"";
            scoreHtml = "<div class='score-row'><span>ER: <b>"+erSc+"/"+(q.erPoints||5)+"</b></span><span>SQL: <b>"+sqlSc+"/"+(q.sqlPoints||5)+"</b></span><span>Total: <b>"+(erSc+sqlSc)+"/"+qPts+"</b></span></div>";
            if(erFb||sqlFb) scoreHtml += "<div class='feedback-box'>&#128172; "+([erFb?"ER: "+erFb:"",sqlFb?"SQL: "+sqlFb:""].filter(Boolean).join(" &nbsp;|&nbsp; "))+"</div>";
          } else if(q.type==="sql"){
            var sc2 = Number(sub.feedback&&sub.feedback[idx+"_sql"]||0);
            var fb2 = (sub.feedback&&sub.feedback[idx+"_sql"])||"";
            scoreHtml = "<div class='score-row'><span>Score: <b>"+sc2+"/"+qPts+"</b></span></div>";
            if(fb2) scoreHtml += "<div class='feedback-box'>&#128172; "+fb2+"</div>";
          } else {
            var sc3 = sub.answers[idx]===q.correct ? q.points : 0;
            var fb3 = (sub.feedback&&sub.feedback[idx+"_mcq"])||"";
            var col = sc3>0?"#059669":"#dc2626";
            scoreHtml = "<div class='score-row'><span>Score: <b style='color:"+col+"'>"+sc3+"/"+qPts+"</b></span><span>"+(sc3>0?"&#9989; Correct":"&#10060; Wrong")+"</span></div>";
            if(fb3) scoreHtml += "<div class='feedback-box'>&#128172; "+fb3+"</div>";
          }
        }

        // Answer html
        var answerHtml = "";
        if(q.type==="mcq"){
          var chosen = sub.answers[idx];
          answerHtml = "<div class='label'>Student's Answer</div>";
          for(var oi=0;oi<q.options.length;oi++){
            var isChosen  = chosen===oi;
            var isCorrect = q.correct===oi;
            var cls2 = "mcq-opt"+(isChosen?" mcq-chosen":"")+(isCorrect?" mcq-correct":"");
            answerHtml += "<div class='"+cls2+"'>"+(isChosen?"&#9654; ":"&nbsp;&nbsp;&nbsp;")
              +String.fromCharCode(65+oi)+") "+q.options[oi]+(isCorrect?" &#10003;":"")+"</div>";
          }
          if(chosen===undefined) answerHtml += "<div class='answer-box wrong'>No answer selected</div>";
        }
        if(q.type==="sql"){
          var sqlAns = sub.answers[idx]||"";
          var sqlPng = sqlPngs[st.id+"_"+idx];
          answerHtml = "<div class='label'>Student's SQL Answer</div>";
          answerHtml += sqlPng
            ? "<img class='diagram' src='"+sqlPng+"' alt='SQL Answer'/>"
            : "<div class='answer-box'>"+(sqlAns||"No answer submitted")+"</div>";
        }
        if(q.type==="scenario"){
          var erData  = sub.answers[idx]&&sub.answers[idx].er;
          var erPng2  = erPngs[st.id+"_"+idx];
          var sqlPng2 = sqlPngs[st.id+"_"+idx];
          var scenSQL = (sub.answers[idx]&&sub.answers[idx].sql)||"";
          answerHtml  = "<div class='label'>Scenario</div><div class='answer-box'>"+(q.scenario||"")+"</div>";
          if(q.requirements&&q.requirements.length){
            answerHtml += "<div class='label'>Requirements</div><ol style='padding-left:18px;font-size:12px;line-height:1.8'>"
              +q.requirements.map(function(r){return "<li>"+r+"</li>";}).join("")+"</ol>";
          }
          answerHtml += "<div class='label'>ER Diagram</div>";
          if(erPng2) answerHtml += "<img class='diagram' src='"+erPng2+"' alt='ER Diagram'/>";
          else if(erData&&erData.entities&&erData.entities.length) answerHtml += "<div class='answer-box'>"+erData.entities.map(function(e){return "["+e.name+"]";}).join(" → ")+"</div>";
          else answerHtml += "<div class='answer-box wrong'>No ER diagram submitted</div>";
          answerHtml += "<div class='label'>SQL Answer</div>";
          answerHtml += sqlPng2
            ? "<img class='diagram' src='"+sqlPng2+"' alt='SQL Answer'/>"
            : "<div class='answer-box'>"+(scenSQL||"No SQL submitted")+"</div>";
        }
        if(q.type==="er_logical"){
          var erPng3 = erPngs[st.id+"_"+idx];
          var erAns  = sub.answers[idx];
          answerHtml = "<div class='label'>Scenario</div><div class='answer-box'>"+(q.scenario||q.prompt||"")+"</div>";
          if(q.requirements&&q.requirements.length){
            answerHtml += "<div class='label'>Requirements</div><ol style='padding-left:18px;font-size:12px;line-height:1.8'>"
              +q.requirements.map(function(r){return "<li>"+r+"</li>";}).join("")+"</ol>";
          }
          answerHtml += "<div class='label'>Student's Logical ERD</div>";
          if(erPng3) answerHtml += "<img class='diagram' src='"+erPng3+"' alt='ER Diagram' style='max-width:100%;border-radius:8px;border:1px solid #e2e8f0;display:block;margin:8px 0'/>";
          else if(erAns&&(erAns.nodes||erAns.entities)){
            var nodeList=(erAns.nodes||erAns.entities||[]);
            answerHtml += "<div class='answer-box'>"+(nodeList.length>0?nodeList.map(function(n){return "["+(n.label||n.name)+"]";}).join(" "):"No diagram submitted")+"</div>";
          } else answerHtml += "<div class='answer-box wrong'>No diagram submitted</div>";
        }
        if(q.type==="er_physical"){
          var relPng3 = relPngs[st.id+"_"+idx];
          var relAns  = sub.answers[idx];
          answerHtml = "<div class='label'>Scenario</div><div class='answer-box'>"+(q.scenario||q.prompt||"")+"</div>";
          if(q.requirements&&q.requirements.length){
            answerHtml += "<div class='label'>Requirements</div><ol style='padding-left:18px;font-size:12px;line-height:1.8'>"
              +q.requirements.map(function(r){return "<li>"+r+"</li>";}).join("")+"</ol>";
          }
          answerHtml += "<div class='label'>Student's Relational Model</div>";
          if(relPng3) answerHtml += "<img class='diagram' src='"+relPng3+"' alt='Relational Model' style='max-width:100%;border-radius:8px;border:1px solid #e2e8f0;display:block;margin:8px 0'/>";
          else if(relAns&&relAns.tables&&relAns.tables.length){
            answerHtml += "<div class='answer-box'>"+relAns.tables.map(function(t){return t.name+"("+t.cols.map(function(c){return (c.pk?"<u>":"")+c.name+(c.pk?"</u>":"")+(c.fk?"*":"");}).join(", ")+")";}).join("<br/>")+"</div>";
          } else answerHtml += "<div class='answer-box wrong'>No relational model submitted</div>";
        }

        var typeLabel = q.type==="mcq"?"MCQ":q.type==="sql"?"SQL":q.type==="er_logical"?"ER Diagram":q.type==="er_physical"?"Relational Model":"Scenario";
        qBlocks.push(
          "<div class='q-block'>"
          +"<div class='q-hdr'>"
            +"<div class='q-num'>"+(idx+1)+"</div>"
            +"<span class='q-type qt-"+q.type+"'>"+typeLabel+"</span>"
            +"<b style='flex:1;font-size:13px'>"+(q.prompt||(q.scenario||"").slice(0,80)||"")+"</b>"
            +"<span style='color:#64748b;font-size:11px'>"+qPts+" pts</span>"
          +"</div>"
          +"<div class='q-body'>"+answerHtml+scoreHtml+"</div>"
          +"</div>"
        );
      }

      var scoreLabel = p3!==null ? (sub.totalScore+"/"+totalPts+" &middot; "+p3+"% &middot; "+gradeLabel(p3)) : "Submitted — Pending";
      studentSections.push(
        "<div class='student-section'>"
        +"<div class='student-hdr'><h2>"+st.name+"</h2><span class='badge "+gc3+"' style='font-size:13px'>"+scoreLabel+"</span></div>"
        +"<div class='student-body'>"
          +"<div style='display:flex;gap:24px;font-size:12px;color:#64748b;margin-bottom:16px;flex-wrap:wrap'>"
            +"<span>&#128197; Submitted: <b style='color:#1a2332'>"+(submittedAt?submittedAt.toLocaleString():"—")+"</b></span>"
            +"<span>&#9201; Time taken: <b style='color:#1a2332;font-family:monospace'>"+tT+"</b></span>"
            +(markedAt?"<span>&#9989; Marked: <b style='color:#1a2332'>"+markedAt.toLocaleString()+"</b></span>":"")
          +"</div>"
          +qBlocks.join("")
        +"</div>"
        +"</div>"
      );
    }
    var studentSectionsHtml = studentSections.join("");

    // ── Info cards ─────────────────────────────────────────────────────────
    var infoCards = ""
      +"<div class='info-card'><div class='key'>Total Students</div><div class='val'>"+qs.length+"</div></div>"
      +"<div class='info-card'><div class='key'>Submitted</div><div class='val'>"+Object.keys(subMap).length+"</div></div>"
      +"<div class='info-card'><div class='key'>Marked</div><div class='val'>"+qs.filter(function(s){return subMap[s.id]&&subMap[s.id].marked;}).length+"</div></div>"
      +"<div class='info-card'><div class='key'>Max Score</div><div class='val'>"+totalPts+" pts</div></div>"
      +"<div class='info-card'><div class='key'>Questions</div><div class='val'>"+quiz.questions.length+"</div></div>"
      +(timerStart?"<div class='info-card'><div class='key'>Quiz Started</div><div class='val' style='font-size:13px'>"+timerStart.toLocaleString()+"</div></div>":"");

    const CSS = "*{box-sizing:border-box;margin:0;padding:0}"
      +"body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f9;color:#1a2332;font-size:13px}"

      +".meta{color:#5a7a94;font-size:12px;margin-bottom:24px}"

      +".badge-a{background:#d1fae5;color:#065f46}.badge-b{background:#dbeafe;color:#1e40af}"
      +".badge-c{background:#fef9c3;color:#854d0e}.badge-f{background:#fee2e2;color:#991b1b}"
      +".badge-p{background:#f3e8ff;color:#6b21a8}.badge-ns{background:#f1f5f9;color:#64748b}"
      +"table{width:100%;border-collapse:collapse;margin-bottom:24px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}"
      +"th{background:#1a2332;color:#fff;padding:9px 12px;font-size:12px;text-align:left;font-weight:600}"
      +"td{padding:9px 12px;border-bottom:1px solid #e8edf2;vertical-align:top}"
      +"tr:last-child td{border-bottom:none}tr:hover td{background:#f8fafc}"

      +".student-section{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:32px;overflow:hidden}"
      +".student-hdr{background:#1a2332;color:#fff;padding:14px 18px;display:flex;gap:16px;align-items:center}"
      +".student-hdr h2{font-size:16px;flex:1}"
      +".student-body{padding:18px}"
      +".q-block{margin-bottom:20px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}"

      +".q-num{background:#1a2332;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}"
      +".q-body{padding:14px}"
      +".q-type{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;text-transform:uppercase}"
      +".qt-mcq{background:#dbeafe;color:#1e40af}.qt-sql{background:#d1fae5;color:#065f46}.qt-scenario{background:#f3e8ff;color:#6b21a8}.qt-er_logical{background:#fef3c7;color:#92400e}.qt-er_physical{background:#e0f2fe;color:#0369a1}"
      +".answer-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 14px;margin:8px 0;font-family:monospace;font-size:12px;white-space:pre-wrap;line-height:1.6}"

      +"@media print{body{background:#fff}.page{padding:0}table{box-shadow:none}}";

    const html = "<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'/>"
      +"<title>"+quiz.title+" — Quiz Report</title>"
      +"<style>"+CSS+"</style></head><body><div class='page'>"
      +"<h1>&#128221; "+quiz.title+"</h1>"
      +"<div class='meta'>"+(quiz.description||"")+" &nbsp;&middot;&nbsp; Class: <b>"+(cls?cls.name:"All")+"</b> &nbsp;&middot;&nbsp; Exported: "+new Date().toLocaleString()+"</div>"
      +"<div class='info-grid'>"+infoCards+"</div>"
      +"<div class='section-title'>&#128202; Grade Summary</div>"
      +"<table><thead><tr><th>#</th><th>Student</th><th>Submitted At</th><th>Time Taken</th><th>Score</th><th>%</th><th>Grade</th>"+qHeaders+"</tr></thead>"
      +"<tbody>"+gradeRows+"</tbody></table>"
      +"<div class='section-title'>&#128196; Student Answer Sheets</div>"
      +studentSectionsHtml
      +"</div></body></html>";

    // Download HTML via data URI (avoids CSP blob: restrictions)
    function dlDataURI(dataUri, filename) {
      var a = document.createElement("a");
      a.href = dataUri; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    var safeTitle = quiz.title.replace(/[^a-z0-9]/gi,"_");
    dlDataURI("data:text/html;base64," + btoa(unescape(encodeURIComponent(html))), safeTitle+"_report.html");

    // Also export Excel with accurate data
    const WB = XLSX.utils.book_new();

    // Sheet 1 — Grades (accurate)
    const summaryRows=[
      ["QUIZ REPORT"],["Title: "+quiz.title],["Class: "+(cls?cls.name:"All")],["Exported: "+new Date().toLocaleString()],["Total Points: "+totalPts],[],
      ["Rank","Student","Submitted At","Time Taken","Score","/ Total","Percentage","Grade",...quiz.questions.map((_,i)=>"Q"+(i+1))]
    ];
    ranked.forEach((st,ri)=>{
      const sub=subMap[st.id];
      if(!sub){summaryRows.push([ri+1,st.name,"Not submitted","—","—",totalPts,"—","—",...quiz.questions.map(()=>"")]);return;}
      const submittedAt=sub.submittedAt?new Date(sub.submittedAt):null;
      let timeTaken="—";
      if(submittedAt&&timerStart){const d=Math.round((submittedAt-timerStart)/1000);timeTaken=`${Math.floor(d/60)}m ${d%60}s`;}
      const p2=sub.marked?pct(sub.totalScore,totalPts):null;
      const qScores=quiz.questions.map((q,i)=>{
        if(!sub.marked) return "Pending";
        if(q.type==="scenario") return Number((sub.feedback&&sub.feedback[i+"_er"])||0)+Number((sub.feedback&&sub.feedback[i+"_sql"])||0);
        if(q.type==="sql") return Number((sub.feedback&&sub.feedback[i+"_sql"])||0);
        return sub.answers[i]===q.correct?q.points:0;
      });
      summaryRows.push([ri+1,st.name,submittedAt?submittedAt.toLocaleString():"—",timeTaken,sub.marked?sub.totalScore:"Pending",totalPts,p2!==null?(p2+"%"):"—",p2!==null?gradeLabel(p2):"—",...qScores]);
    });
    const ws1=XLSX.utils.aoa_to_sheet(summaryRows);
    ws1["!cols"]=[{wch:5},{wch:22},{wch:22},{wch:12},{wch:10},{wch:8},{wch:12},{wch:8},...quiz.questions.map(()=>({wch:10}))];
    XLSX.utils.book_append_sheet(WB,ws1,"Grades");

    // Sheet 2 — Answers (text)
    const ansRows=[["Student","Question #","Type","Question","Answer","Score","Max","Feedback","Submitted At","Marked At"]];
    for(const st of qs){
      const sub=subMap[st.id]; if(!sub) continue;
      quiz.questions.forEach((q,i)=>{
        const fbKey_er  = i+"_er";
        const fbKey_sql = i+"_sql";
        const fbKey_mcq = i+"_mcq";
        let ans="";
        if(q.type==="mcq") ans=sub.answers[i]!==undefined?(String.fromCharCode(65+sub.answers[i])+") "+q.options[sub.answers[i]]):"No answer";
        else if(q.type==="sql") ans=sub.answers[i]||"";
        else {
          const erLen=(sub.answers[i]&&sub.answers[i].er&&sub.answers[i].er.entities&&sub.answers[i].er.entities.length)||0;
          const relLen=(sub.answers[i]&&sub.answers[i].er&&sub.answers[i].er.relations&&sub.answers[i].er.relations.length)||0;
          const sqlPre=((sub.answers[i]&&sub.answers[i].sql)||"").slice(0,120);
          ans="[ER: "+erLen+" entities, "+relLen+" relations] SQL: "+sqlPre;
        }
        let score="Pending",fb="";
        if(sub.marked){
          const f=sub.feedback||{};
          if(q.type==="scenario"){
            score="ER:"+(f[fbKey_er]||0)+"/"+(q.erPoints||5)+" SQL:"+(f[fbKey_sql]||0)+"/"+(q.sqlPoints||5);
            fb=[f[fbKey_er]?"ER: "+f[fbKey_er]:"",f[fbKey_sql]?"SQL: "+f[fbKey_sql]:""].filter(Boolean).join(" | ");
          } else if(q.type==="sql"){
            score=(f[fbKey_sql]||0)+"/"+q.points; fb=f[fbKey_sql]||"";
          } else {
            score=sub.answers[i]===q.correct?q.points+"/"+q.points+" V":"0/"+q.points+" X"; fb=f[fbKey_mcq]||"";
          }
        }
        const qMax=(q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):(q.type==="er_logical"||q.type==="er_physical")?(q.points||10):q.points);
        ansRows.push([st.name,i+1,q.type,q.prompt||q.scenario||"",ans,score,qMax,fb,sub.submittedAt?new Date(sub.submittedAt).toLocaleString():"",sub.markedAt?new Date(sub.markedAt).toLocaleString():"Not marked"]);
      });
    }
    const ws2=XLSX.utils.aoa_to_sheet(ansRows);
    ws2["!cols"]=[{wch:20},{wch:5},{wch:10},{wch:40},{wch:55},{wch:18},{wch:6},{wch:40},{wch:20},{wch:20}];
    XLSX.utils.book_append_sheet(WB,ws2,"Answers");

    // Download XLSX via data URI (avoids CSP blob: restrictions)
    var xlsxOut = XLSX.write(WB, {bookType:"xlsx", type:"base64"});
    dlDataURI("data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + xlsxOut, safeTitle+"_grades.xlsx");
    notify("📊 Report + Excel exported!");
  }

  async function registerQuizStudent(classId){
    if(!qRegName.trim()||!curSess||!classId) return;
    const st={id:curSess.id+"-q-"+uid(),name:qRegName.trim(),sessionId:curSess.id,classId,joinedAt:new Date().toISOString()};
    const qs=await store.get(QSTUDENTS_KEY,true)||[];
    const upd=[...qs.filter(s=>s.sessionId!==curSess.id),st];
    await store.set(QSTUDENTS_KEY,upd,true); setQuizStudents(upd); setQReg(st); setQRegName(""); notify("Registered!");
  }
  async function loadQuiz(qid){
    // Check lock status from meta (faster than full quiz load)
    const meta=(quizList||[]).find(m=>m.id===qid);
    if(meta?.locked && !isTeacher){ notify("🔒 This quiz is locked by the teacher","🔒"); return; }
    const q=await store.get(QUIZ_PFX+qid,true); setCurQuiz(q); setQAnswers({}); setSelQIdx(0);
  }
  async function submitQuiz(){
    if(!qReg||!curQuiz) return;
    const autoScore=curQuiz.questions.reduce((sum,q,i)=>q.type==="mcq"?sum+(qAnswers[i]===q.correct?q.points:0):sum,0);
    const sub={studentId:qReg.id,quizId:curQuiz.id,answers:qAnswers,autoScore,submittedAt:new Date().toISOString(),marked:false,totalScore:null,feedback:{}};
    const allSubs=await store.get(QSUB_PFX+qReg.id,true)||{};
    allSubs[curQuiz.id]=sub;
    await store.set(QSUB_PFX+qReg.id,allSubs,true);
    setQuizSubs(p=>({...p,[qReg.id]:allSubs})); notify("Quiz submitted! 🎉");
  }
  async function saveMarking(){
    if(!markingQuiz) return;
    const {quizId,studentId}=markingQuiz;
    const allSubs=await store.get(QSUB_PFX+studentId,true)||{};
    const sub=allSubs[quizId]; if(!sub) return;
    const quiz=await store.get(QUIZ_PFX+quizId,true);
    const total=quiz.questions.reduce((s,q,i)=>{
      if(q.type==="mcq"){const auto=sub.answers[i]===q.correct?q.points:0;return s+(markScores[`${i}_mcq`]!==undefined?Number(markScores[`${i}_mcq`]):auto);}
      if(q.type==="sql") return s+(markScores[`${i}_sql`]!==undefined?Number(markScores[`${i}_sql`]):0);
      if(q.type==="scenario") return s+(markScores[`${i}_er`]!==undefined?Number(markScores[`${i}_er`]):0)+(markScores[`${i}_sql`]!==undefined?Number(markScores[`${i}_sql`]):0);
      if(q.type==="er_logical"||q.type==="er_physical") return s+(markScores[`${i}_er`]!==undefined?Number(markScores[`${i}_er`]):0);
      return s;
    },0);
    sub.totalScore=total; sub.feedback=markFeedback; sub.marked=true; sub.markedAt=new Date().toISOString();
    allSubs[quizId]=sub;
    await store.set(QSUB_PFX+studentId,allSubs,true);
    setQuizSubs(p=>({...p,[studentId]:allSubs}));
    // ── Auto-award reward points based on teacher-set quiz reward pts ──────
    const qRptsAll = LS.get("__shared__"+QUIZ_RPTS_KEY)||{};
    const qRptsForQuiz = qRptsAll[quizId]||{};
    let totalReward = 0;
    const rewardLines = [];
    quiz.questions.forEach((q,i)=>{
      const rewardPts = Number(qRptsForQuiz[i])||0;
      if(rewardPts<=0) return;
      // Determine if student got this question right / answered it
      let gotIt = false;
      if(q.type==="mcq") gotIt = (sub.answers[i]===q.correct);
      else if(q.type==="sql") gotIt = (Number(markScores[i+"_sql"]||0)>0);
      else if(q.type==="scenario") gotIt = ((Number(markScores[i+"_er"]||0)+Number(markScores[i+"_sql"]||0))>0);
      else if(q.type==="er_logical"||q.type==="er_physical") gotIt = (Number(markScores[i+"_er"]||0)>0);
      if(gotIt){ totalReward+=rewardPts; rewardLines.push("Q"+(i+1)+": +"+rewardPts+"pts"); }
    });
    if(totalReward>0){
      const stuName=(quizStudents.find(s=>s.id===studentId)||{name:studentId}).name;
      givePoints(studentId, stuName, totalReward, "Quiz: "+quiz.title+" ("+rewardLines.join(", ")+")", "quiz");
    }
    setModal(null); setMarkingQuiz(null); notify("Marks saved! 💾"+(totalReward>0?" +"+totalReward+" reward pts 🌟":""));
  }

    await store.set(QUIZZES_KEY,[...list.filter(x=>x.id!==quiz.id),meta],true);

  // Sessions
  async function activateSession(sess,S){
    S=S||sqlJS;
    // Always re-read from storage so classId (and any other updates) are fresh
    const allSess = LS.get(SESSIONS_KEY)||[];
    const freshSess = allSess.find(s=>s.id===sess.id)||sess;
    const database=await loadDB(freshSess.id,S);
    // Students: merge teacher's shared tables into their own DB
    if(freshSess.role==="student") mergeSharedTables(database, S);
    dbRef.current=database; setDb(database); setCurSess(freshSess); refreshTables(database);
    // Sync in-memory sessions list too
    setSessions(allSess);
    await store.set(CURRENT_KEY,freshSess.id);
    const qs=await store.get(QSTUDENTS_KEY,true)||[];
    let existingQReg=qs.find(s=>s.sessionId===freshSess.id)||null;
    // Auto-register student into quizzes on login if not already registered
    if(freshSess.role==="student" && !existingQReg && freshSess.classId){
      const st={id:freshSess.id+"-q-auto",name:freshSess.name,sessionId:freshSess.id,classId:freshSess.classId,joinedAt:new Date().toISOString()};
      const upd=[...qs.filter(s=>s.sessionId!==freshSess.id),st];
      await store.set(QSTUDENTS_KEY,upd,true);
      existingQReg=st;
    }
    setQReg(existingQReg);
    const ms=await store.get(M_STUDENTS,true)||[]; setMReg(ms.find(s=>s.sessionId===freshSess.id)||null);
  }
  function refreshTables(database){
    try{const r=database.exec("SELECT name FROM sqlite_master WHERE type='table' ORDER BY name");setTables(r[0]?.values?.map(v=>v[0])||[]);}catch{setTables([]);}
  }
  async function createSession(){
    if(!newSess.name.trim()||!sqlJS) return;
    if(newSess.role==="teacher" && sessions.some(s=>s.role==="teacher")){
      notify("A teacher session already exists","⚠️"); return;
    }
    const s={id:uid(),name:newSess.name.trim(),role:newSess.role,color:newSess.color,classId:newSess.classId||null,created:new Date().toISOString()};
    const upd=[...sessions,s]; setSessions(upd); await store.set(SESSIONS_KEY,upd);
    const database=new sqlJS.Database(); try{database.run('PRAGMA foreign_keys = ON');}catch{} dbRef.current=database; setDb(database); setCurSess(s); setTables([]); setResults([]); setQReg(null); setMReg(null);
    await store.set(CURRENT_KEY,s.id); setNewSess({name:"",role:"student",color:"#4fc3f7",classId:null}); setModal(null); notify(`Session created: ${s.name}`);
  }

  async function loginTeacher(password){
    const rec = LS.get("__shared__"+TEACHER_KEY);
    if(!rec){
      // First-time setup: create teacher account + session
      LS.set("__shared__"+TEACHER_KEY, {passHash:simpleHash(password)});
      const allSess = LS.get(SESSIONS_KEY)||[];
      let ts = allSess.find(s=>s.role==="teacher");
      if(!ts){
        ts={id:uid(),name:"Teacher",role:"teacher",color:"#c792ea",classId:null,created:new Date().toISOString()};
        const upd=[...allSess,ts]; LS.set(SESSIONS_KEY,upd); setSessions(upd);
      }
      await activateSession(ts,sqlJS);
      await refreshMarathon(ts.id); await refreshQuizData(ts.id);
      setLoginScreen(false); notify("Welcome, Teacher! 👨‍🏫");
      return true;
    }
    if(rec.passHash !== simpleHash(password)) return false;
    const allSess = LS.get(SESSIONS_KEY)||[];
    let ts = allSess.find(s=>s.role==="teacher");
    if(!ts){
      ts={id:uid(),name:"Teacher",role:"teacher",color:"#c792ea",classId:null,created:new Date().toISOString()};
      const upd=[...allSess,ts]; LS.set(SESSIONS_KEY,upd); setSessions(upd);
    }
    await activateSession(ts,sqlJS);
    await refreshMarathon(ts.id); await refreshQuizData(ts.id);
    setLoginScreen(false); notify("Welcome back, Teacher! 👨‍🏫");
    return true;
  }

  async function loginStudent(name, password, classId){
    const studs = LS.get("__shared__"+STUDENTS_KEY)||[];
    const rec = studs.find(s=>s.name.toLowerCase()===name.toLowerCase());
    if(!rec) return "notfound";
    if(rec.passHash !== simpleHash(password)) return "badpass";
    // Find or create their session
    const allSess = LS.get(SESSIONS_KEY)||[];
    let sess = allSess.find(s=>s.id===rec.sessionId);
    if(!sess){
      sess={id:rec.sessionId||uid(),name:rec.name,role:"student",color:rec.color,classId:rec.classId,created:rec.created||new Date().toISOString()};
      const upd=[...allSess.filter(s=>s.id!==sess.id),sess]; LS.set(SESSIONS_KEY,upd); setSessions(upd);
    }
    await activateSession(sess,sqlJS);
    await refreshMarathon(sess.id); await refreshQuizData(sess.id);
    setLoginScreen(false); notify("Welcome, "+rec.name+"! 👨‍💻");
    return "ok";
  }

  async function registerStudent(name, password, joinCode, color){
    // joinCode may be a raw join code like "GRP-A" — resolve to group id
    const group = await resolveClassCode(joinCode);
    if(!group) return "badcode";
    const classId = group.id;
    const studs = LS.get("__shared__"+STUDENTS_KEY)||[];
    if(studs.some(s=>s.name.toLowerCase()===name.toLowerCase())) return "exists";
    const sessId = uid();
    const rec={id:uid(),sessionId:sessId,name:name.trim(),passHash:simpleHash(password),classId,color,created:new Date().toISOString()};
    const newStuds=[...studs,rec]; saveStudents(newStuds);
    const sess={id:sessId,name:rec.name,role:"student",color,classId,created:rec.created};
    const allSess=LS.get(SESSIONS_KEY)||[];
    const upd=[...allSess,sess]; LS.set(SESSIONS_KEY,upd); setSessions(upd);
    await activateSession(sess,sqlJS);
    await refreshMarathon(sess.id); await refreshQuizData(sess.id);
    setLoginScreen(false); notify("Account created! Welcome, "+rec.name+" 🎉");
    return "ok";
  }

  // Teacher-side: create student account without switching to their session
  function createStudentAccount(name, password, classId, color){
    const studs = LS.get("__shared__"+STUDENTS_KEY)||[];
    if(studs.some(s=>s.name.toLowerCase()===name.toLowerCase())) return "exists";
    const sessId = uid();
    const rec={id:uid(),sessionId:sessId,name:name.trim(),passHash:simpleHash(password),classId,color,created:new Date().toISOString()};
    saveStudents([...studs,rec]);
    const sess={id:sessId,name:rec.name,role:"student",color,classId,created:rec.created};

    LS.set(SESSIONS_KEY,[...allSess,sess]); setSessions([...allSess,sess]);
    notify("Student account created: "+rec.name+" ✓");

                              <span className={`badge ${s==="done"?"b-done":s==="error"?"b-err":"b-pend"}`}>{s==="done"?"✓ Done":s==="error"?"✗ Error":"Pending"}</span>

                                <button className="btn btn-ghost btn-sm" style={{padding:"2px 7px"}} onClick={()=>markM(st.id,q.id,null)}>↺</button>
                              </div>
                            </div>
                          );})}
                          {mStudents.length===0&&<div style={{padding:"7px 13px",fontSize:10,color:T.dim,borderTop:`1px solid ${T.border}`}}>No students joined yet</div>}

                    })}
                  </div>
                )}
              </div>
            ):!curSess?<div className="reg-screen"><div className="reg-card"><div style={{fontSize:38,marginBottom:10}}>🔒</div><div style={{fontSize:17,fontWeight:800,marginBottom:5}}>Session Required</div><div style={{fontSize:12,color:T.muted,marginBottom:16}}>Create or select a session first</div><button className="btn btn-run" onClick={()=>setModal("sessions")}>Open Sessions</button></div></div>

              :!mReg?<div className="reg-screen"><div className="reg-card"><div style={{fontSize:38,marginBottom:10}}>🏃</div><div style={{fontSize:17,fontWeight:800,marginBottom:5}}>Join the Marathon</div><div style={{fontSize:12,color:T.muted,marginBottom:4}}>"{marathon.title}"</div><div style={{fontSize:10,color:T.dim,marginBottom:16}}>{marathon.questions.length} questions · {mTotal()} pts</div><input className="finput" style={{marginBottom:10,textAlign:"center",fontSize:14}} placeholder="Your full name" value={mRegName} onChange={e=>setMRegName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&registerMarathon()} autoFocus/><button className="btn btn-green" style={{width:"100%",justifyContent:"center",padding:"8px 0",fontSize:13}} onClick={registerMarathon} disabled={!mRegName.trim()}>Join Marathon 🏁</button></div></div>
              :<div style={{display:"grid",gridTemplateColumns:"1fr 225px",height:"100%",overflow:"hidden"}}>
                <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
                  <div style={{padding:"9px 14px",background:T.surface,borderBottom:`1px solid ${T.border}`,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
                    <span style={{fontSize:9,color:T.muted,marginRight:4,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Q:</span>
                    {marathon.questions.map((q,i)=>{const s=mProgress[mReg.id]?.[q.id];return<div key={q.id} className={`mq-pip ${s==="done"?"pip-done":s==="error"?"pip-err":i===activeQ?"pip-active":"pip-pend"}`} onClick={()=>setActiveQ(i)}>{q.id}</div>;})}
                  </div>
                  <div style={{padding:"10px 14px",background:T.surface,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
                    <div style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:8,padding:"11px 13px"}}>
                      <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:T.muted,marginBottom:4}}>Q{marathon.questions[activeQ]?.id} · {marathon.questions[activeQ]?.points}pt{marathon.questions[activeQ]?.points!==1?"s":""}</div>
                      <div style={{fontSize:14,fontWeight:600,lineHeight:1.55}}>{marathon.questions[activeQ]?.prompt}</div>
                    </div>
                  </div>
                  <EditorPanel query={query} setQuery={setQuery} taRef={taRef} lines={lines} handleKey={handleKey} db={db} curSess={curSess} results={results} status={status} tables={tables} onRun={()=>runQuery(true)} runLabel="▶ Run &amp; Submit"/>
                </div>
                <div className="rpanel">
                  <div style={{padding:"11px 11px 8px",borderBottom:`1px solid ${T.border}`}}><div style={{fontSize:12,fontWeight:700}}>My Progress</div><div style={{fontSize:9,color:T.muted,marginTop:1}}>as <strong style={{color:T.text}}>{mReg.name}</strong></div></div>

                      <div style={{fontSize:26,fontWeight:800,color:T.accent,fontFamily:"'JetBrains Mono',monospace"}}>{mScore(mReg.id)}<span style={{fontSize:12,color:T.muted}}>/{mTotal()} pts</span></div>
                      <div className="prog-wrap" style={{marginTop:5}}><div className="prog-bar" style={{width:`${pct(mScore(mReg.id),mTotal())}%`,background:T.accent}}/></div>
                    </div>
                    {marathon.questions.map((q,i)=>{const s=mProgress[mReg.id]?.[q.id];return(
                      <div key={q.id} onClick={()=>setActiveQ(i)} style={{padding:"6px 8px",borderRadius:6,background:i===activeQ?T.accentGlow:"transparent",border:`1px solid ${i===activeQ?T.borderHi:"transparent"}`,cursor:"pointer",marginBottom:3}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <div className="q-num" style={{width:18,height:18,fontSize:9,background:s==="done"?T.green:s==="error"?T.red:T.dim}}>{q.id}</div>
                          <span style={{fontSize:10,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.prompt.slice(0,28)}…</span>
                          <span className={`badge ${s==="done"?"b-done":s==="error"?"b-err":"b-pend"}`} style={{fontSize:8}}>{s==="done"?"✓":s==="error"?"✗":"—"}</span>
                        </div>
                      </div>
                    );})}
                  </div>
                </div>
              </div>}
          </div>
        )}

        {/* ── QUIZ ── */}
        {view==="quiz"&&(
          <div style={{height:"100%",overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {isTeacher?(
              <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
                {/* ── Teacher toolbar ── */}
                <div style={{padding:"10px 18px",background:T.surface,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,flexShrink:0,flexWrap:"wrap"}}>
                  <div style={{fontSize:14,fontWeight:800,flexShrink:0}}>📝 Quiz Manager</div>
                  {/* Class tabs */}
                  <div style={{display:"flex",gap:5,flex:1,flexWrap:"wrap",alignItems:"center"}}>
                    <div className={`class-tab ${!curClassId?"active":""}`} onClick={()=>setCurClassId(null)}>All</div>
                    {classes.map(c=>(
                      <div key={c.id} className={`class-tab ${curClassId===c.id?"active":""}`} onClick={()=>setCurClassId(c.id)}>
                        <span className="class-dot" style={{background:c.color}}/>
                        {c.name}
                      </div>
                    ))}
                    <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>setModal("manage-classes")}>⚙ Groups</button>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    <button className="btn btn-ghost btn-sm" onClick={refreshQuizData}>↻</button>
                    {curQuiz&&<button className="btn btn-sm export-btn" onClick={()=>exportQuizExcel(curQuiz.id)}>📊 Export</button>}
                    {curQuiz&&<TimerControls quizId={curQuiz.id} ti={timerInfo(curQuiz.id)} onStart={startQuizTimer} onStop={stopQuizTimer}/>}
                    {curQuiz&&<button className="btn btn-sm" style={{background:"#ff537022",color:"#ff5370",border:"1px solid #ff537044"}} onClick={()=>deleteQuiz(curQuiz.id)}>🗑 Delete</button>}
                    <button className="btn btn-purple btn-sm" onClick={()=>{setNewQuiz({title:"",description:"",classId:curClassId,questions:[{type:"mcq",prompt:"",options:["","","",""],correct:0,points:1}]});setModal("create-quiz");}}>+ New Quiz</button>
                  </div>
                </div>
                {/* ── Class info bar ── */}
                {curClassId&&(()=>{
                  const cls=classes.find(c=>c.id===curClassId);
                  const classStudents=quizStudents.filter(s=>s.classId===curClassId);
                  const classQuizzes=quizList.filter(q=>q.classId===curClassId);
                  return cls?(
                    <div style={{padding:"6px 18px",background:cls.color+"18",borderBottom:`1px solid ${cls.color}33`,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                      <span className="class-dot" style={{background:cls.color,width:11,height:11}}/>
                      <span style={{fontSize:12,fontWeight:700,color:T.text}}>{cls.name}</span>
                      <span style={{fontSize:10,color:T.muted}}>{classQuizzes.length} quiz{classQuizzes.length!==1?"zes":""} · {classStudents.length} student{classStudents.length!==1?"s":""}</span>
                    </div>
                  ):null;
                })()}
                <div style={{flex:1,overflow:"auto",padding:"14px 18px"}}>
                  {(()=>{
                    const filteredQuizzes=curClassId?quizList.filter(q=>q.classId===curClassId):quizList;
                    const filteredStudents=curClassId?quizStudents.filter(s=>s.classId===curClassId):quizStudents;
                    if(filteredQuizzes.length===0) return (
                      <div className="empty"><div className="empty-ico">📋</div>
                        <div style={{marginBottom:12,fontSize:13}}>{curClassId?"No quizzes for this class yet":"No quizzes yet — create your first!"}</div>
                        <button className="btn btn-purple" onClick={()=>{setNewQuiz({title:"",description:"",classId:curClassId,questions:[{type:"mcq",prompt:"",options:["","","",""],correct:0,points:1}]});setModal("create-quiz");}}>+ New Quiz</button>
                      </div>

                      <>
                        <div className="section-hdr">Quizzes{curClassId&&classes.find(c=>c.id===curClassId)?` — ${classes.find(c=>c.id===curClassId).name}`:""}</div>

                          {filteredQuizzes.map(q=>{
                            const cls=classes.find(c=>c.id===q.classId);
                            const ti=timerInfo(q.id);
                            return (
                              <div key={q.id} className={`quiz-card ${curQuiz?.id===q.id?"active":""}`} onClick={()=>loadQuiz(q.id)}>
                                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:6}}>
                                  <div style={{flex:1}}>
                                    <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{q.title}</div>
                                    {cls&&<div style={{display:"inline-flex",alignItems:"center",gap:4,background:cls.color+"22",border:`1px solid ${cls.color}44`,borderRadius:10,padding:"1px 7px",marginBottom:4}}>

                                      <span style={{fontSize:9,fontWeight:600,color:cls.color}}>{cls.name}</span>
                                    </div>}
                                  </div>
                                  <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
                                    {q.locked&&<span style={{fontSize:9,color:"#ff5370",background:"#ff537022",padding:"1px 5px",borderRadius:99,fontWeight:700,flexShrink:0}}>🔒 Locked</span>}
                                    <button className="xbtn" title="Export Excel" onClick={e=>{e.stopPropagation();exportQuizExcel(q.id);}}>📊</button>
                                    <button className="xbtn" title="Edit" onClick={e=>{e.stopPropagation();store.get(QUIZ_PFX+q.id,true).then(qd=>{setNewQuiz({...qd,classId:qd.classId||q.classId});setModal("create-quiz");});}}>✏</button>
                                    <button className="xbtn" title={q.locked?"Unlock quiz":"Lock quiz"} onClick={e=>toggleQuizLock(q.id,e)} style={{color:q.locked?"#43d98c":"#ff5370"}}>{q.locked?"🔓":"🔒"}</button>
