  /* ── Rewards ── */

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Storage (localStorage-backed, shared via prefix) ─────────────────────────
// "shared" data uses a global prefix so all sessions on same device can read it.
// In a real deployment you'd swap this for a backend API.
const LS = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
};
const store = {
  get:  async (k, sh=false) => LS.get((sh?"__shared__":"")+k),
  set:  async (k, v, sh=false) => LS.set((sh?"__shared__":"")+k, v),
  del:  async (k, sh=false) => LS.del((sh?"__shared__":"")+k),
};

// ─── Storage keys ─────────────────────────────────────────────────────────────
const DB_PFX        = "mysqlide:db:";
const SESSIONS_KEY  = "mysqlide:sessions";
const CURRENT_KEY   = "mysqlide:current";
const MARATHON_KEY  = "mysqlide:marathon";
const M_PROG_PFX    = "mysqlide:mprog:";
const M_STUDENTS    = "mysqlide:mstudents";
const QUIZZES_KEY   = "mysqlide:quizzes";
const QUIZ_PFX      = "mysqlide:quiz:";
const QSUB_PFX      = "mysqlide:qsub:";
const QSTUDENTS_KEY = "mysqlide:qstudents";
const CLASSES_KEY   = "mysqlide:classes";
const WB_PFX        = "mysqlide:wb:";      // WB_PFX+classId → whiteboard state
const WB_NOTES_PFX  = "mysqlide:wbn:";    // WB_NOTES_PFX+classId → array of sticky notes
const POINTS_KEY    = "mysqlide:points";   // shared → { studentId: { name, total, log:[{pts,reason,at}] } }
const QUIZ_RPTS_KEY = "mysqlide:qrpts";    // shared → { quizId: { qIdx: rewardPts } }

// ─── MySQL → SQLite Transpiler ─────────────────────────────────────────────
// Intercepts MySQL shell commands and syntax, translates to SQLite equivalents.
// Supports: SHOW, DESCRIBE/DESC, USE, DROP DATABASE, CREATE DATABASE,
//   AUTO_INCREMENT, ENGINE=, CHARSET=, UNSIGNED, backtick identifiers,
//   IF NOT EXISTS / IF EXISTS, TRUNCATE TABLE, INSERT IGNORE,
//   SHOW CREATE TABLE, EXPLAIN, CALL (stub), SET (stub),
//   multi-line comments, -- comments, MySQL string functions (aliases),
//   LIMIT x OFFSET y, ON UPDATE CURRENT_TIMESTAMP (stripped).

function mysqlToSQLite(raw) {
  // Returns array of {type:"exec"|"virtual", stmt, handler?}
  const stmts = splitMySQL(raw);
  return stmts.map(stmt => {
    const trimmed = stmt.trim();
    if (!trimmed) return null;

    // ── Shell / DDL meta commands ──────────────────────────────────────────
    const upper = trimmed.replace(/\/\*.*?\*\//gs, "").replace(/--[^\n]*/g, "").trim().toUpperCase();

    // SHOW DATABASES / SHOW SCHEMAS
    if (/^SHOW\s+(DATABASES|SCHEMAS)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        return { type:"table", data:{ columns:["Database"], values:[["main"]] }, sql:trimmed };
      }};

    // SHOW TABLES [FROM db] [LIKE pattern]
    if (/^SHOW\s+(FULL\s+)?TABLES(\s+FROM\s+\S+)?(\s+LIKE\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        try {
          const like = (trimmed.match(/LIKE\s+'([^']+)'/i)||[])[1];
          let sql = "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name";
          const res = db.exec(sql);
          let vals = res[0]?.values||[];
          if (like) { const re=new RegExp("^"+like.replace(/%/g,".*").replace(/_/g,".")+"$","i"); vals=vals.filter(r=>re.test(r[0])); }
          return { type:"table", data:{ columns:["Tables_in_main"], values:vals }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW FULL COLUMNS / SHOW COLUMNS FROM tbl
    if (/^SHOW\s+(FULL\s+)?COLUMNS\s+(FROM|IN)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/(?:FROM|IN)\s+`?(\w+)`?/i)||[])[1];
        if (!tbl) return { type:"error", message:"Table name required", sql:trimmed };
        try {
          const res = db.exec(`PRAGMA table_info(${tbl})`);
          if (!res[0]) return { type:"error", message:`Table '${tbl}' doesn't exist`, sql:trimmed };
          const rows = res[0].values.map(r => [
            r[1],             // Field
            r[2],             // Type
            r[3]?"NO":"YES",  // Null
            r[5]?"PRI":"",    // Key
            r[4]??'NULL',     // Default
            ""                // Extra
          ]);
          return { type:"table", data:{ columns:["Field","Type","Null","Key","Default","Extra"], values:rows }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // DESCRIBE / DESC tablename
    if (/^(DESCRIBE|DESC)\s+`?(\w+)`?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/(?:DESCRIBE|DESC)\s+`?(\w+)`?/i)||[])[1];
        try {
          const res = db.exec(`PRAGMA table_info(${tbl})`);
          if (!res[0]) return { type:"error", message:`Table '${tbl}' doesn't exist`, sql:trimmed };
          const rows = res[0].values.map(r => [r[1],r[2],r[3]?"NO":"YES",r[5]?"PRI":"",r[4]??'NULL',""]);
          return { type:"table", data:{ columns:["Field","Type","Null","Key","Default","Extra"], values:rows }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW CREATE TABLE
    if (/^SHOW\s+CREATE\s+TABLE\s+`?(\w+)`?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/TABLE\s+`?(\w+)`?/i)||[])[1];
        try {
          const res = db.exec(`SELECT sql FROM sqlite_master WHERE type='table' AND name='${tbl}'`);
          const ddl = res[0]?.values[0]?.[0];
          if (!ddl) return { type:"error", message:`Table '${tbl}' doesn't exist`, sql:trimmed };
          return { type:"table", data:{ columns:["Table","Create Table"], values:[[tbl, ddl]] }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW INDEX / SHOW INDEXES / SHOW KEYS FROM tbl
    if (/^SHOW\s+(INDEX|INDEXES|KEYS)\s+(FROM|IN)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/(?:FROM|IN)\s+`?(\w+)`?/i)||[])[1];
        try {
          const res = db.exec(`PRAGMA index_list(${tbl})`);
          const rows = (res[0]?.values||[]).map(r => {
            const idx = db.exec(`PRAGMA index_info(${r[1]})`);
            const cols = (idx[0]?.values||[]).map(c=>c[2]).join(", ");
            return [tbl, r[2]?0:1, r[1], 1, cols, "A", 0, null, null, "", "BTREE", "", ""];
          });
          // Also add PK if present
          const pkRes = db.exec(`PRAGMA table_info(${tbl})`);
          const pkCols = (pkRes[0]?.values||[]).filter(r=>r[5]).map(r=>r[1]);
          if (pkCols.length) rows.unshift([tbl,0,"PRIMARY",1,pkCols.join(", "),"A",0,null,null,"","BTREE","",""]);
          return { type:"table", data:{ columns:["Table","Non_unique","Key_name","Seq_in_index","Column_name","Collation","Cardinality","Sub_part","Packed","Null","Index_type","Comment","Index_comment"], values:rows }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW VARIABLES
    if (/^SHOW\s+(GLOBAL\s+|SESSION\s+)?VARIABLES(\s+LIKE\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const vars = [
          ["version","8.0.35-simulated"],["version_comment","QueryClass MySQL Simulator"],
          ["character_set_client","utf8mb4"],["collation_connection","utf8mb4_unicode_ci"],
          ["max_connections","151"],["innodb_buffer_pool_size","134217728"],
          ["sql_mode","STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"],
          ["time_zone","SYSTEM"],["autocommit","ON"],["foreign_key_checks","ON"],
        ];
        const like = (trimmed.match(/LIKE\s+'([^']+)'/i)||[])[1];
        let vals = vars;
        if (like) { const re=new RegExp("^"+like.replace(/%/g,".*").replace(/_/g,".")+"$","i"); vals=vars.filter(r=>re.test(r[0])); }
        return { type:"table", data:{ columns:["Variable_name","Value"], values:vals }, sql:trimmed };
      }};

    // SHOW STATUS
    if (/^SHOW\s+(GLOBAL\s+|SESSION\s+)?STATUS(\s+LIKE\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const vars = [["Uptime","3600"],["Threads_connected","1"],["Questions","42"],["Slow_queries","0"],["Opens","100"],["Flush_commands","1"],["Open_tables","20"],["Queries_per_second_avg","0.01"]];
        return { type:"table", data:{ columns:["Variable_name","Value"], values:vars }, sql:trimmed };
      }};

    // SHOW ENGINES
    if (/^SHOW\s+ENGINES\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Engine","Support","Comment","Transactions","XA","Savepoints"],
        values:[["InnoDB","DEFAULT","Supports transactions, row-level locking","YES","YES","YES"],
                ["MyISAM","YES","MyISAM storage engine","NO","NO","NO"],
                ["MEMORY","YES","Hash based, stored in memory","NO","NO","NO"],
                ["CSV","YES","CSV storage engine","NO","NO","NO"]]}, sql:trimmed
      })};

    // SHOW PROCESSLIST
    if (/^SHOW\s+(FULL\s+)?PROCESSLIST\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Id","User","Host","db","Command","Time","State","Info"],
        values:[[1,"student","localhost","main","Query",0,"","SHOW PROCESSLIST"]]}, sql:trimmed
      })};

    // SHOW GRANTS
    if (/^SHOW\s+GRANTS(\s+FOR\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Grants for student@localhost"],
        values:[["GRANT ALL PRIVILEGES ON *.* TO 'student'@'localhost' WITH GRANT OPTION"]]}, sql:trimmed
      })};

    // SHOW WARNINGS / ERRORS
    if (/^SHOW\s+(WARNINGS|ERRORS)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Level","Code","Message"], values:[] }, sql:trimmed
      })};

    // SELECT VERSION() / SELECT @@version
    if (/^SELECT\s+(VERSION\s*\(\s*\)|@@VERSION)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["VERSION()"], values:[["8.0.35 (QueryClass MySQL Simulator)"]]}, sql:trimmed
      })};

    // SELECT DATABASE() / SELECT SCHEMA()
    if (/^SELECT\s+(DATABASE|SCHEMA)\s*\(\s*\)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["DATABASE()"], values:[["main"]]}, sql:trimmed
      })};

    // SELECT USER() / CURRENT_USER()
    if (/^SELECT\s+(USER|CURRENT_USER)\s*\(\s*\)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["USER()"], values:[["student@localhost"]]}, sql:trimmed
      })};

    // USE database (no-op, acknowledge)
    if (/^USE\s+`?\w+`?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const dbName = (trimmed.match(/USE\s+`?(\w+)`?/i)||[])[1];
        return { type:"ok", message:`Database changed (using '${dbName}' → mapped to 'main')`, sql:trimmed };
      }};

    // CREATE DATABASE / SCHEMA (acknowledge, SQLite has no separate databases)
    if (/^CREATE\s+(DATABASE|SCHEMA)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const dbName = (trimmed.match(/(?:DATABASE|SCHEMA)\s+(?:IF NOT EXISTS\s+)?`?(\w+)`?/i)||[])[1];
        return { type:"ok", message:`Database '${dbName}' created (mapped to 'main' in SQLite)`, sql:trimmed };
      }};

    // DROP DATABASE / SCHEMA
    if (/^DROP\s+(DATABASE|SCHEMA)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const dbName = (trimmed.match(/(?:DATABASE|SCHEMA)\s+(?:IF EXISTS\s+)?`?(\w+)`?/i)||[])[1];
        return { type:"ok", message:`Database '${dbName}' dropped (note: in-memory SQLite, tables persist until reset)`, sql:trimmed };
      }};

    // TRUNCATE TABLE
    if (/^TRUNCATE\s+(TABLE\s+)?`?(\w+)`?\s*;?$/i.test(trimmed)) {
      const tbl = (trimmed.match(/(?:TRUNCATE\s+(?:TABLE\s+)?)`?(\w+)`?/i)||[])[1];
      return { type:"exec", stmt: `DELETE FROM ${tbl}` };
    }

    // SET statements (SET @@, SET NAMES, SET CHARACTER SET etc.) — acknowledge
    if (/^SET\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"ok", message:"Query OK, 0 rows affected", sql:trimmed
      })};

    // CALL procedure (stub)
    if (/^CALL\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"ok", message:"Query OK (stored procedures are not supported in this environment)", sql:trimmed
      })};

    // EXPLAIN / EXPLAIN FORMAT=...
    if (/^EXPLAIN\s+/i.test(trimmed)) {
      const inner = trimmed.replace(/^EXPLAIN\s+(FORMAT\s*=\s*\w+\s+)?/i, "");
      return { type:"virtual", stmt:trimmed, handler: db => {
        try {
          const res = db.exec("EXPLAIN QUERY PLAN "+inner);
          if (res[0]) return { type:"table", data:res[0], sql:trimmed };
          return { type:"ok", message:"No execution plan available", sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};
    }

    // LOCK TABLES / UNLOCK TABLES (acknowledge)
    if (/^(LOCK|UNLOCK)\s+TABLES/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"ok", message:"Query OK (table locking not needed in single-connection mode)", sql:trimmed
      })};

    // START TRANSACTION / BEGIN / COMMIT / ROLLBACK
    if (/^(START\s+TRANSACTION|BEGIN\s*(WORK)?|COMMIT(\s+WORK)?|ROLLBACK(\s+WORK)?)\s*;?$/i.test(trimmed)) {
      const map = { "START TRANSACTION":"BEGIN", "BEGIN":"BEGIN", "COMMIT":"COMMIT", "ROLLBACK":"ROLLBACK" };
      const key = Object.keys(map).find(k => upper.startsWith(k));
      return { type:"exec", stmt: key ? map[key] : "BEGIN" };
    }

    // SAVEPOINT / RELEASE SAVEPOINT
    if (/^(SAVEPOINT|RELEASE\s+SAVEPOINT|ROLLBACK\s+TO(\s+SAVEPOINT)?)\s+\w+\s*;?$/i.test(trimmed))
      return { type:"exec", stmt: trimmed.replace(/\s*;?\s*$/, "") };

    // Otherwise: transpile MySQL DDL/DML syntax to SQLite
    return { type:"exec", stmt: transpileMySQL(trimmed) };
  }).filter(Boolean);
}

function transpileMySQL(sql) {
  let s = sql;

  // Backtick identifiers → plain (SQLite uses double-quotes, but also accepts unquoted)
  s = s.replace(/`([^`]+)`/g, '"$1"');

  // MySQL comments: # comment → -- comment
  s = s.replace(/^#(.*)$/mg, "--$1");

  // AUTO_INCREMENT → AUTOINCREMENT (SQLite keyword)
  s = s.replace(/\bAUTO_INCREMENT\b/gi, "AUTOINCREMENT");

  // INT(n) / TINYINT(n) / etc. — SQLite ignores display width, just strip it
  s = s.replace(/\b(TINYINT|SMALLINT|MEDIUMINT|BIGINT|INT)\s*\(\s*\d+\s*\)/gi, (_, t) => t);

  // UNSIGNED — SQLite doesn't support, strip it
  s = s.replace(/\bUNSIGNED\b/gi, "");

  // ZEROFILL — strip
  s = s.replace(/\bZEROFILL\b/gi, "");

  // ENUM(...) → TEXT
  s = s.replace(/\bENUM\s*\([^)]+\)/gi, "TEXT");

  // SET(...) type → TEXT
  s = s.replace(/\bSET\s*\([^)]+\)/gi, "TEXT");

  // MEDIUMTEXT, LONGTEXT, TINYTEXT → TEXT
  s = s.replace(/\b(MEDIUM|LONG|TINY)TEXT\b/gi, "TEXT");

  // MEDIUMBLOB, LONGBLOB, TINYBLOB → BLOB
  s = s.replace(/\b(MEDIUM|LONG|TINY)BLOB\b/gi, "BLOB");

  // DATETIME/TIMESTAMP → TEXT (SQLite stores as text)
  // (keep as-is, SQLite accepts DATETIME)

  // ON UPDATE CURRENT_TIMESTAMP / ON UPDATE NOW() — strip (SQLite triggers exist but overkill)
  s = s.replace(/\bON\s+UPDATE\s+(CURRENT_TIMESTAMP|NOW\s*\(\s*\))/gi, "");

  // CHARACTER SET xxx / CHARSET xxx — strip
  s = s.replace(/\b(CHARACTER\s+SET|CHARSET)\s+\w+/gi, "");

  // COLLATE xxx — strip
  s = s.replace(/\bCOLLATE\s+\w+/gi, "");

  // DEFAULT CHARSET=xxx — strip
  s = s.replace(/\bDEFAULT\s+CHARSET\s*=\s*\w+/gi, "");

  // ENGINE=xxx / ENGINE xxx — strip (SQLite has one engine)
  s = s.replace(/\bENGINE\s*=\s*\w+/gi, "");
  s = s.replace(/\bENGINE\s+\w+/gi, "");

  // ROW_FORMAT=xxx — strip
  s = s.replace(/\bROW_FORMAT\s*=\s*\w+/gi, "");

  // KEY_BLOCK_SIZE=xxx — strip
  s = s.replace(/\bKEY_BLOCK_SIZE\s*=\s*\d+/gi, "");

  // COMMENT='...' at column/table level — strip
  s = s.replace(/\bCOMMENT\s*=\s*'[^']*'/gi, "");
  s = s.replace(/\bCOMMENT\s+'[^']*'/gi, "");

  // INSERT IGNORE → INSERT OR IGNORE
  s = s.replace(/\bINSERT\s+IGNORE\b/gi, "INSERT OR IGNORE");

  // INSERT ... ON DUPLICATE KEY UPDATE → INSERT OR REPLACE (simplified)
  s = s.replace(/\bON\s+DUPLICATE\s+KEY\s+UPDATE\b[\s\S]*$/i, "");
  // Ensure it becomes INSERT OR REPLACE if ON DUPLICATE KEY was present
  if (/^INSERT\s+/i.test(s) && !(/OR\s+(IGNORE|REPLACE|ABORT|FAIL)/i.test(s))) {
    // was an ON DUPLICATE KEY — turn into REPLACE
  }

  // REPLACE INTO → INSERT OR REPLACE INTO
  s = s.replace(/^REPLACE\s+INTO\b/i, "INSERT OR REPLACE INTO");
  s = s.replace(/^REPLACE\s+`?"?(\w+)`?"?/i, "INSERT OR REPLACE INTO $1");

  // MySQL LIMIT x, y → LIMIT y OFFSET x
  s = s.replace(/\bLIMIT\s+(\d+)\s*,\s*(\d+)/gi, "LIMIT $2 OFFSET $1");

  // NOW() → CURRENT_TIMESTAMP
  s = s.replace(/\bNOW\s*\(\s*\)/gi, "CURRENT_TIMESTAMP");

  // SYSDATE() → CURRENT_TIMESTAMP
  s = s.replace(/\bSYSDATE\s*\(\s*\)/gi, "CURRENT_TIMESTAMP");

  // CURDATE() → DATE('now')
  s = s.replace(/\bCURDATE\s*\(\s*\)/gi, "DATE('now')");

  // CURTIME() → TIME('now')
  s = s.replace(/\bCURTIME\s*\(\s*\)/gi, "TIME('now')");

  // UNIX_TIMESTAMP() → strftime('%s','now')
  s = s.replace(/\bUNIX_TIMESTAMP\s*\(\s*\)/gi, "CAST(strftime('%s','now') AS INTEGER)");
  s = s.replace(/\bUNIX_TIMESTAMP\s*\(([^)]+)\)/gi, "CAST(strftime('%s',$1) AS INTEGER)");

  // FROM_UNIXTIME(x) → datetime(x, 'unixepoch')
  s = s.replace(/\bFROM_UNIXTIME\s*\(([^)]+)\)/gi, "datetime($1,'unixepoch')");

  // DATE_FORMAT(date, format) → strftime(format, date) — map MySQL → strftime
  s = s.replace(/\bDATE_FORMAT\s*\(([^,]+),\s*'([^']+)'\)/gi, (_, d, f) => {
    const fmt = f.replace(/%Y/g,"%Y").replace(/%m/g,"%m").replace(/%d/g,"%d")
                  .replace(/%H/g,"%H").replace(/%i/g,"%M").replace(/%s/g,"%S")
                  .replace(/%M/g,"%B").replace(/%W/g,"%A");
    return `strftime('${fmt}',${d})`;
  });

  // STR_TO_DATE(str, format) → just the string (simplified)
  s = s.replace(/\bSTR_TO_DATE\s*\(([^,]+),[^)]+\)/gi, "$1");

  // DATEDIFF(a,b) → (julianday(a) - julianday(b))
  s = s.replace(/\bDATEDIFF\s*\(([^,]+),([^)]+)\)/gi, "CAST(julianday($1)-julianday($2) AS INTEGER)");

  // TIMESTAMPDIFF(UNIT, a, b) — approximate
  s = s.replace(/\bTIMESTAMPDIFF\s*\(\s*(\w+)\s*,([^,]+),([^)]+)\)/gi, (_, unit, a, b) => {
    const u = unit.toUpperCase();
    if (u==="DAY") return `CAST(julianday(${b})-julianday(${a}) AS INTEGER)`;
    if (u==="HOUR") return `CAST((julianday(${b})-julianday(${a}))*24 AS INTEGER)`;
    if (u==="MINUTE") return `CAST((julianday(${b})-julianday(${a}))*1440 AS INTEGER)`;
    if (u==="SECOND") return `CAST((julianday(${b})-julianday(${a}))*86400 AS INTEGER)`;
    if (u==="MONTH") return `CAST((julianday(${b})-julianday(${a}))/30.436875 AS INTEGER)`;
    if (u==="YEAR") return `CAST((julianday(${b})-julianday(${a}))/365.25 AS INTEGER)`;
    return `CAST(julianday(${b})-julianday(${a}) AS INTEGER)`;
  });

  // DATE_ADD / DATE_SUB → datetime(...)
  s = s.replace(/\bDATE_ADD\s*\(([^,]+),\s*INTERVAL\s+([^)]+)\)/gi, (_, d, iv) => mysqlInterval(d, iv, "+"));
  s = s.replace(/\bDATE_SUB\s*\(([^,]+),\s*INTERVAL\s+([^)]+)\)/gi, (_, d, iv) => mysqlInterval(d, iv, "-"));
  s = s.replace(/([^\s,\(]+)\s*\+\s*INTERVAL\s+([^\s,\)]+)\s+(\w+)/gi, (_, d, n, u) => mysqlInterval(d, n+" "+u, "+"));
  s = s.replace(/([^\s,\(]+)\s*-\s*INTERVAL\s+([^\s,\)]+)\s+(\w+)/gi, (_, d, n, u) => mysqlInterval(d, n+" "+u, "-"));

  // YEAR(d) → strftime('%Y', d)
  s = s.replace(/\bYEAR\s*\(([^)]+)\)/gi, "CAST(strftime('%Y',$1) AS INTEGER)");

  // MONTH(d) → strftime('%m', d)
  s = s.replace(/\bMONTH\s*\(([^)]+)\)/gi, "CAST(strftime('%m',$1) AS INTEGER)");

  // DAY(d) / DAYOFMONTH(d)
  s = s.replace(/\b(DAY|DAYOFMONTH)\s*\(([^)]+)\)/gi, "CAST(strftime('%d',$2) AS INTEGER)");

  // HOUR(d) / MINUTE(d) / SECOND(d)
  s = s.replace(/\bHOUR\s*\(([^)]+)\)/gi, "CAST(strftime('%H',$1) AS INTEGER)");
  s = s.replace(/\bMINUTE\s*\(([^)]+)\)/gi, "CAST(strftime('%M',$1) AS INTEGER)");
  s = s.replace(/\bSECOND\s*\(([^)]+)\)/gi, "CAST(strftime('%S',$1) AS INTEGER)");

  // DAYOFWEEK(d) → strftime('%w', d) + 1
  s = s.replace(/\bDAYOFWEEK\s*\(([^)]+)\)/gi, "(CAST(strftime('%w',$1) AS INTEGER)+1)");

  // DAYOFYEAR(d)
  s = s.replace(/\bDAYOFYEAR\s*\(([^)]+)\)/gi, "CAST(strftime('%j',$1) AS INTEGER)");

  // WEEK(d) / WEEKOFYEAR(d)
  s = s.replace(/\b(WEEK|WEEKOFYEAR)\s*\(([^)]+?)(?:,\s*\d+)?\)/gi, "CAST(strftime('%W',$2) AS INTEGER)");

  // QUARTER(d) — approximate
  s = s.replace(/\bQUARTER\s*\(([^)]+)\)/gi, "((CAST(strftime('%m',$1) AS INTEGER)+2)/3)");

  // IF(cond, a, b) → CASE WHEN cond THEN a ELSE b END
  s = s.replace(/\bIF\s*\(([^,]+),([^,]+),([^)]+)\)/gi, "CASE WHEN $1 THEN $2 ELSE $3 END");

  // IFNULL(a, b) → COALESCE(a, b) (SQLite has COALESCE)
  s = s.replace(/\bIFNULL\s*\(/gi, "COALESCE(");

  // NULLIF already supported in SQLite

  // GREATEST / LEAST — SQLite doesn't have these natively, use MAX/MIN subquery trick
  // (leave as-is — SQLite 3.38+ added them; sql.js is recent enough)

  // CONCAT(a,b,...) → (a||b||...)
  s = s.replace(/\bCONCATWS\s*\(([^,)]+),([^)]+)\)/gi, (_, sep, rest) => {
    const parts = smartSplit(rest);
    return parts.join(`||${sep.trim()}||`);
  });
  s = s.replace(/\bCONCAT\s*\(([^)]+)\)/gi, (_, args) => {
    return smartSplit(args).map(a=>a.trim()).join("||");
  });

  // GROUP_CONCAT separator MySQL syntax → SQLite (MySQL uses SEPARATOR keyword)
  s = s.replace(/\bGROUP_CONCAT\s*\(([^)]+?)\s+SEPARATOR\s+'([^']*)'\)/gi, "GROUP_CONCAT($1,'$2')");
  s = s.replace(/\bGROUP_CONCAT\s*\(([^)]+?)\s+SEPARATOR\s+"([^"]*)"\)/gi, 'GROUP_CONCAT($1,"$2")');

  // CHAR_LENGTH → LENGTH (SQLite LENGTH counts bytes but for ASCII it's the same)
  s = s.replace(/\bCHAR_LENGTH\s*\(/gi, "LENGTH(");
  s = s.replace(/\bCHARACTER_LENGTH\s*\(/gi, "LENGTH(");

  // LOCATE(substr, str[, pos]) → INSTR(str, substr) (simplified, pos ignored)
  s = s.replace(/\bLOCATE\s*\(([^,]+),([^,)]+)(?:,[^)]*)?\)/gi, "INSTR($2,$1)");

  // POSITION(substr IN str) → INSTR(str, substr)
  s = s.replace(/\bPOSITION\s*\(([^)]+?)\s+IN\s+([^)]+)\)/gi, "INSTR($2,$1)");

  // LPAD(str, len, pad) → not native in SQLite, approximate with substr
  // (leave for now — sql.js modern enough for most)

  // FIELD(val, v1, v2, ...) → CASE WHEN val=v1 THEN 1 WHEN val=v2 THEN 2 ... END
  s = s.replace(/\bFIELD\s*\(([^)]+)\)/gi, (_, args) => {
    const parts = smartSplit(args);
    const val = parts[0];
    return parts.slice(1).map((v,i)=>`WHEN ${val}=${v.trim()} THEN ${i+1}`).reduce((a,b)=>`${a} ${b}`, "CASE")+" ELSE 0 END";
  });

  // ELT(n, v1, v2, ...) — strip to first val as fallback
  // STR(n) → CAST(n AS TEXT)

  // CONVERT(expr, type) → CAST(expr AS type)
  s = s.replace(/\bCONVERT\s*\(([^,]+),\s*(\w+)\s*\)/gi, "CAST($1 AS $2)");

  // CAST(x AS SIGNED) / CAST(x AS UNSIGNED) → CAST(x AS INTEGER)
  s = s.replace(/CAST\s*\(([^)]+)\s+AS\s+(SIGNED|UNSIGNED)(\s+INTEGER)?\s*\)/gi, "CAST($1 AS INTEGER)");

  // CAST(x AS DECIMAL/FLOAT/DOUBLE) → CAST(x AS REAL)
  s = s.replace(/CAST\s*\(([^)]+)\s+AS\s+(DECIMAL|FLOAT|DOUBLE)(\s*\(\s*\d+\s*,\s*\d+\s*\))?\s*\)/gi, "CAST($1 AS REAL)");

  // CAST(x AS CHAR) / CAST(x AS NCHAR) → CAST(x AS TEXT)
  s = s.replace(/CAST\s*\(([^)]+)\s+AS\s+(CHAR|NCHAR|VARCHAR)(\s*\(\d+\))?\s*\)/gi, "CAST($1 AS TEXT)");

  // FORMAT(n, d) → printf('%.df', n) (rounded number)
  s = s.replace(/\bFORMAT\s*\(([^,]+),\s*(\d+)\)/gi, "printf('%.$2f',$1)");

  // ROUND(n, d) — SQLite supports this natively ✓

  // POW(a,b) → POWER(a,b) (SQLite uses POW)
  s = s.replace(/\bPOWER\s*\(/gi, "POW(");

  // LOG(b, x) MySQL two-arg form → LOG(x)/LOG(b) in SQLite
  s = s.replace(/\bLOG\s*\(([^,)]+),([^)]+)\)/gi, "(LOG($2)/LOG($1))");

  // LOG2(x) → (LOG(x)/LOG(2))
  s = s.replace(/\bLOG2\s*\(/gi, "(LOG(");
  if (s.includes("(LOG(") && !s.includes("/LOG(")) {
    // crude fix — skip, leave for eval
  }

  // RAND() → RANDOM() / (RANDOM()+9223372036854775808)/18446744073709551616
  s = s.replace(/\bRAND\s*\(\s*\)/gi, "(ABS(RANDOM()) * 1.0 / 9223372036854775808)");

  // STD / STDDEV / STDDEV_POP — not in SQLite, leave as-is (will error gracefully)

  // BIT_LENGTH(x) → LENGTH(x)*8
  s = s.replace(/\bBIT_LENGTH\s*\(([^)]+)\)/gi, "(LENGTH($1)*8)");

  // OCTET_LENGTH → LENGTH
  s = s.replace(/\bOCTET_LENGTH\s*\(/gi, "LENGTH(");

  // HEX(x) — SQLite supports HEX ✓

  // UNHEX(x) → X'x'... can't easily do inline, leave
  // ORD(c) → UNICODE(c)
  s = s.replace(/\bORD\s*\(/gi, "UNICODE(");

  // ASCII(c) — SQLite has UNICODE()
  s = s.replace(/\bASCII\s*\(/gi, "UNICODE(");

  // CHAR(n) → CHAR(n) — SQLite supports ✓

  // SPACE(n) → SUBSTR(' ',1,0) hack... use printf
  s = s.replace(/\bSPACE\s*\(([^)]+)\)/gi, "REPLACE(HEX(ZEROBLOB($1/2+1)),'00',' ')");

  // REPEAT(str, n) → not in SQLite... approximate
  // REVERSE(str) — SQLite has no REVERSE; leave as-is (will error gracefully)

  // STRCMP(a,b) → CASE WHEN a<b THEN -1 WHEN a=b THEN 0 ELSE 1 END
  s = s.replace(/\bSTRCMP\s*\(([^,]+),([^)]+)\)/gi, "(CASE WHEN $1<$2 THEN -1 WHEN $1=$2 THEN 0 ELSE 1 END)");

  // INET_ATON / INET_NTOA — leave (will error gracefully)

  // JSON_OBJECT, JSON_ARRAY, JSON_EXTRACT — SQLite 3.38+ supports JSON ✓
  // JSON_UNQUOTE(x) → JSON_EXTRACT(x, '$') (unquote)
  s = s.replace(/\bJSON_UNQUOTE\s*\(([^)]+)\)/gi, "JSON_EXTRACT($1,'$')");

  // mysql_num_rows, mysql_affected_rows — not applicable

  // Clean up extra whitespace and trailing comma before )
  s = s.replace(/,\s*\)/g, ")");
  s = s.replace(/\s{2,}/g, " ").trim();

  // Strip trailing semicolon (execSQL adds it back)
  s = s.replace(/;\s*$/, "");

  return s;
}

function mysqlInterval(date, iv, op) {
  const m = String(iv).trim().match(/^(\d+(?:\.\d+)?)\s+(\w+)$/i);
  if (!m) return `datetime(${date})`;
  const [, n, unit] = m;
  const u = unit.toUpperCase();
  if (u==="SECOND") return `datetime(${date},'${op}${n} seconds')`;
  if (u==="MINUTE") return `datetime(${date},'${op}${n} minutes')`;
  if (u==="HOUR")   return `datetime(${date},'${op}${n} hours')`;
  if (u==="DAY")    return `datetime(${date},'${op}${n} days')`;
  if (u==="WEEK")   return `datetime(${date},'${op}${Number(n)*7} days')`;
  if (u==="MONTH")  return `datetime(${date},'${op}${n} months')`;
  if (u==="YEAR")   return `datetime(${date},'${op}${n} years')`;
  return `datetime(${date},'${op}${n} days')`;
}

function smartSplit(str) {
  // Split by comma, respecting parens and quotes
  const parts = []; let depth=0, cur="", inStr=null;
  for (let i=0;i<str.length;i++) {
    const c=str[i];
    if (inStr) { cur+=c; if (c===inStr&&str[i-1]!=="\\") inStr=null; }
    else if (c==="'"||c==='"') { inStr=c; cur+=c; }
    else if (c==="(") { depth++; cur+=c; }
    else if (c===")") { depth--; cur+=c; }
    else if (c===","&&depth===0) { parts.push(cur.trim()); cur=""; }
    else cur+=c;
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts;
}

function splitMySQL(sql) {
  // Split on ; but not inside strings or comments
  const stmts=[]; let cur="", inStr=null, inLineComment=false, inBlockComment=false;
  for (let i=0;i<sql.length;i++) {
    const c=sql[i], n=sql[i+1];
    if (inLineComment) { cur+=c; if (c==="\n") inLineComment=false; continue; }
    if (inBlockComment) { cur+=c; if (c==="*"&&n==="/") { cur+="/"; i++; inBlockComment=false; } continue; }
    if (inStr) { cur+=c; if (c===inStr&&sql[i-1]!=="\\") inStr=null; continue; }
    if (c==="-"&&n==="-") { inLineComment=true; cur+=c; continue; }
    if (c==="/"&&n==="*") { inBlockComment=true; cur+=c; continue; }
    if (c==="#") { inLineComment=true; cur+=c; continue; }
    if (c==="'"||c==='"'||c==="$") { inStr=c; cur+=c; continue; }
    if (c==="`") { inStr="`"; cur+=c; continue; }
    if (c===";") { const t=cur.trim(); if(t) stmts.push(t); cur=""; continue; }
    cur+=c;
  }
  const t=cur.trim(); if(t) stmts.push(t);
  return stmts;
}

function execSQL(db, sql) {
  const items = mysqlToSQLite(sql);
  return items.map(item => {
    if (item.type === "virtual") {
      try { return item.handler(db); }
      catch(e) { return { type:"error", message:e.message, sql:item.stmt }; }
    }
    // type === "exec"
    try {
      const res = db.exec(item.stmt);
      if (res.length > 0) return { type:"table", data:res[0], sql:item.stmt };
      const affected = db.getRowsModified();
      return { type:"ok", message:`Query OK${affected?`, ${affected} row(s) affected`:""}`, sql:item.stmt };
    } catch(e) { return { type:"error", message:e.message, sql:item.stmt }; }
  });
}

let SQL = null;
async function loadSQLJS() {
  if (SQL) return SQL;
  return new Promise((res, rej) => {
    const boot = () => window.initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` }).then(s => { SQL = s; res(s); }).catch(rej);
    if (window.initSqlJs) { boot(); return; }
    const sc = document.createElement("script");
    sc.src = "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js";
    sc.onload = boot; sc.onerror = rej; document.head.appendChild(sc);
  });
}
async function saveDB(sid, db) { try { const b64 = btoa(String.fromCharCode(...db.export())); LS.set(DB_PFX+sid, b64); } catch {} }
async function loadDB(sid, S) {
  try { const v = LS.get(DB_PFX+sid); if (v) return new S.Database(Uint8Array.from(atob(v), c=>c.charCodeAt(0))); } catch {}
  return new S.Database();
}
