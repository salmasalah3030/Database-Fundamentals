                                      <div key={st.id+"d"} style={{padding:"9px 12px",fontSize:10,color:T.muted,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center"}}>{sub?new Date(sub.submittedAt).toLocaleString():"—"}</div>,
                                      <div key={st.id+"s"} style={{padding:"9px 12px",fontSize:11,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",fontFamily:"'JetBrains Mono',monospace",color:sub?.marked?gradeColor(pct(sub.totalScore,totalPts)):T.muted}}>{sub?.marked?`${sub.totalScore}/${totalPts}`:sub?"Pending":"—"}</div>,
                                      <div key={st.id+"g"} style={{padding:"9px 12px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center"}}>{sub?.marked?<span className="grade-pill" style={{background:gradeColor(pct(sub.totalScore,totalPts))+"22",color:gradeColor(pct(sub.totalScore,totalPts))}}>{gradeLabel(pct(sub.totalScore,totalPts))}</span>:"—"}</div>,
                                      <div key={st.id+"a"} style={{padding:"6px 12px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center"}}>
                                        {sub?<button className="btn btn-purple btn-sm" onClick={()=>{setMarkingQuiz({quizId:curQuiz.id,studentId:st.id});setMarkScores({});setMarkFeedback(sub.feedback||{});setModal("marking");}}>{sub.marked?"✏ Re-mark":"✏ Mark"}</button>:<span style={{fontSize:10,color:T.dim}}>Not submitted</span>}
                                      </div>
                                    ];
                                  })}
                                </div>
                              </div>}
                          </>
                        )}
                      </>
                    );
                  })()}
                </div>
              </div>
            ):!curSess?<div className="reg-screen"><div className="reg-card"><div style={{fontSize:38,marginBottom:10}}>🔒</div><div style={{fontSize:17,fontWeight:800,marginBottom:5}}>Please sign in</div><div style={{fontSize:12,color:T.muted}}>Use the login page to access quizzes</div></div></div>
              :(()=>{
                if(!qReg) return <div className="reg-screen"><div className="reg-card"><div style={{fontSize:38,marginBottom:10}}>⏳</div><div style={{fontSize:17,fontWeight:800,marginBottom:5}}>Setting up...</div><div style={{fontSize:12,color:T.muted,marginBottom:14}}>Your quiz registration is being prepared</div><button className="btn btn-ghost" onClick={refreshQuizData}>↻ Refresh</button></div></div>;
                const myClass=classes.find(c=>c.id===qReg.classId);
                const myQuizzes=quizList.filter(q=>q.classId===qReg.classId);
                return (
                  <div style={{display:"grid",gridTemplateColumns:"192px 1fr",height:"100%",overflow:"hidden"}}>
                    <div className="sidebar">
                      <div className="sb-hdr">
                        <span>Quizzes</span>
                        {myClass&&<span style={{display:"inline-flex",alignItems:"center",gap:3,background:myClass.color+"22",borderRadius:8,padding:"1px 6px",fontSize:9,color:myClass.color,fontWeight:700}}>
                          <span className="class-dot" style={{background:myClass.color,width:6,height:6}}/>
                          {myClass.name}
                        </span>}
                      </div>
                      <div className="sb-list">
                        {myQuizzes.map(q=>{const sub=quizSubs[qReg.id]?.[q.id];const ti=timerInfo(q.id);const isLocked=q.locked&&!sub;return(
                          <div key={q.id} style={{flexDirection:"column",alignItems:"flex-start",gap:2,padding:"9px 10px",borderRadius:7,border:`1px solid ${curQuiz?.id===q.id?T.borderHi:isLocked?"#ff537033":"transparent"}`,marginBottom:4,background:curQuiz?.id===q.id?T.accentGlow:isLocked?"#1a0a0a":"transparent",cursor:isLocked?"not-allowed":"pointer",userSelect:"none",opacity:isLocked?0.6:1}} onClick={()=>loadQuiz(q.id)}>
                            <div style={{display:"flex",width:"100%",alignItems:"center",gap:5}}>
                              <span style={{fontSize:12,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:isLocked?"#ff5370":T.text}}>{isLocked?"🔒 ":""}{q.title}</span>
                              {sub&&<span className={`badge ${sub.marked?"b-done":"b-pend"}`} style={{fontSize:8}}>{sub.marked?`${sub.totalScore}/${q.totalPts}`:"✓"}</span>}
                            </div>
                            <div style={{fontSize:9,color:T.muted}}>{q.qCount}Q · {q.totalPts}pts</div>
                            {isLocked&&<div style={{fontSize:9,color:"#ff5370",marginTop:2}}>Locked by teacher</div>}
                            {!isLocked&&ti&&!ti.expired&&<div style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:ti.urgent?"#ff5370":ti.warn?"#ffb347":"#43d98c",marginTop:2}}>⏱ {ti.label}</div>}
                            {!isLocked&&ti?.expired&&!sub&&<div style={{fontSize:9,color:"#ff5370",marginTop:2}}>⏱ Closed</div>}
                          </div>
                        );})}
                        {myQuizzes.length===0&&<div style={{padding:"10px 8px",fontSize:10,color:T.dim}}>No quizzes yet</div>}
                      </div>
                      <div className="divider"/>
                      <div style={{padding:"8px 10px"}}>
                        <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>My Grades</div>
                        {myQuizzes.map(q=>{const sub=quizSubs[qReg.id]?.[q.id];if(!sub?.marked) return null;const p=pct(sub.totalScore,q.totalPts);return(
                          <div key={q.id} style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:4,color:T.muted}}>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{q.title.slice(0,14)}…</span>
                            <span className="grade-pill" style={{background:gradeColor(p)+"22",color:gradeColor(p),fontSize:9}}>{gradeLabel(p)}</span>
                          </div>
                        );}).filter(Boolean)}
                        {myQuizzes.every(q=>!quizSubs[qReg.id]?.[q.id]?.marked)&&<div style={{fontSize:9,color:T.dim}}>No grades yet</div>}
                      </div>
                    </div>
                    <div style={{overflow:"hidden",height:"100%"}}>
                      {!curQuiz?<div className="empty" style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div className="empty-ico">👈</div><div style={{fontSize:13}}>Select a quiz to begin</div></div>
                        :<StudentQuizTaker key={curQuiz.id} curQuiz={curQuiz} qReg={qReg} quizSubs={quizSubs} qAnswers={qAnswers} setQAnswers={setQAnswers} selQIdx={selQIdx} setSelQIdx={setSelQIdx} submitQuiz={submitQuiz} db={db} timerInfo={timerInfo(curQuiz.id)}/>}
                    </div>
                  </div>
                );
              })()}
          </div>
        )}
      </div>

      {/* ── MODALS ── */}
      {modal==="sessions"&&(()=>{
        // Students only see their own session (and can create a new one if none exists).
        // Teachers see all sessions.
        const teacherExists = sessions.some(s=>s.role==="teacher");
        const visibleSessions = curSess?.role==="teacher"
          ? sessions  // teacher sees all
          : curSess   // student: only their own
            ? sessions.filter(s=>s.id===curSess.id)
            : sessions.filter(s=>s.role!=="teacher"); // pre-login: show only student sessions (no peeking at teacher)
        return (
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhdr"><span>🎓 Sessions</span><button className="xbtn" onClick={()=>setModal(null)}>✕</button></div>
            <div className="mbody">
              <button className="btn btn-run btn-sm" style={{marginBottom:12,width:"100%",justifyContent:"center"}} onClick={()=>setModal("new-session")}>+ New Session</button>
              {visibleSessions.length===0
                ?<div className="empty"><div className="empty-ico">🎓</div><div>No session yet — create one to start</div></div>
                :visibleSessions.map(s=>(
                  <div key={s.id} className={`sc ${curSess?.id===s.id?"sc-active":""}`}
                    onClick={()=>{
                      // Students can only activate their own session
                      if(curSess && curSess.role==="student" && s.id!==curSess.id) return;
                      activateSession(s); setModal(null);
                    }}>
                    <div className="sc-ico" style={{background:s.color+"25"}}>{s.role==="teacher"?"👨‍🏫":"👨‍💻"}</div>
                    <div className="sc-info">
                      <div className="sc-name">
                        {s.name}
                        <span className={`tag ${s.role==="teacher"?"tag-t":"tag-s"}`}>{s.role}</span>
                        {s.classId&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:(classes.find(c=>c.id===s.classId)?.color||"#4fc3f7")+"22",color:classes.find(c=>c.id===s.classId)?.color||"#4fc3f7",fontWeight:700,marginLeft:4}}>{classes.find(c=>c.id===s.classId)?.name||"Class"}</span>}
                      </div>
                      <div className="sc-meta">{new Date(s.created).toLocaleDateString()}</div>
                    </div>
                    {curSess?.id===s.id&&<span style={{fontSize:10,color:T.green}}>● Active</span>}
                    {/* Students can only delete their own; teachers can delete any */}
                    {(curSess?.role==="teacher"||s.id===curSess?.id)&&
                      <button className="xbtn" onClick={e=>deleteSession(s.id,e)}>🗑</button>}
                  </div>
                ))}
            </div>
          </div>
        </div>
        );
      })()}

      {modal==="students"&&(
        <StudentsModal
          students={students}
          classes={classes}
          onClose={()=>setModal(null)}
          resetStudentPassword={resetStudentPassword}
          deleteStudent={deleteStudent}
          createStudentAccount={createStudentAccount}
          setStudents={setStudents}
        />
      )}

      {modal==="new-session"&&(
        <div className="overlay" onClick={()=>setModal("sessions")}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhdr"><span>New Session</span><button className="xbtn" onClick={()=>setModal("sessions")}>✕</button></div>
            <div className="mbody">
              <div className="fg"><label className="flabel">Your Name</label><input className="finput" autoFocus placeholder="e.g. Alice Johnson" value={newSess.name} onChange={e=>setNewSess(p=>({...p,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&createSession()}/><div className="fhint">Each session has its own isolated SQLite database</div></div>
              <div className="fg">
                <label className="flabel">Role</label>
                <div style={{display:"flex",gap:8}}>
                  <button className={`btn ${newSess.role==="student"?"btn-run":"btn-ghost"}`} onClick={()=>setNewSess(p=>({...p,role:"student"}))} style={{flex:1,justifyContent:"center"}}>👨‍💻 Student</button>
                  {!sessions.some(s=>s.role==="teacher")
                    ?<button className={`btn ${newSess.role==="teacher"?"btn-run":"btn-ghost"}`} onClick={()=>setNewSess(p=>({...p,role:"teacher",classId:null}))} style={{flex:1,justifyContent:"center"}}>👨‍🏫 Teacher</button>
                    :<div style={{flex:1,padding:"6px 12px",borderRadius:6,background:"#1a2535",border:"1px solid #1e2d3d",fontSize:11,color:"#2d4a66",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>👨‍🏫 Teacher <span style={{fontSize:9,color:"#ff5370"}}>already exists</span></div>
                  }
                </div>
              </div>
              {newSess.role==="student"&&(
                <div className="fg">
                  <label className="flabel">Class</label>
                  {classes.length===0
                    ?<div className="fhint" style={{color:"#ff5370"}}>No classes yet — ask your teacher to create one first</div>
                    :<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {classes.map(c=>(
                        <div key={c.id} onClick={()=>setNewSess(p=>({...p,classId:c.id}))}
                          style={{padding:"6px 14px",borderRadius:99,border:`2px solid ${newSess.classId===c.id?c.color:"#1e2d3d"}`,background:newSess.classId===c.id?c.color+"22":"transparent",cursor:"pointer",fontSize:12,fontWeight:700,color:newSess.classId===c.id?c.color:"#5a7a94",transition:"all .15s",display:"flex",alignItems:"center",gap:6}}>
                          <span style={{width:8,height:8,borderRadius:"50%",background:c.color,display:"inline-block"}}/>
                          {c.name}
                        </div>
                      ))}
                    </div>
                  }
                </div>
              )}
              <div className="fg"><label className="flabel">Colour</label><div style={{display:"flex",gap:8}}>{COLORS.map(c=><div key={c} onClick={()=>setNewSess(p=>({...p,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,cursor:"pointer",border:newSess.color===c?"3px solid white":"3px solid transparent",boxShadow:newSess.color===c?`0 0 0 2px ${c}`:"none",transition:"all .15s"}}/> )}</div></div>
            </div>
            <div className="mftr"><button className="btn btn-ghost btn-sm" onClick={()=>setModal("sessions")}>Cancel</button><button className="btn btn-run" onClick={createSession} disabled={!newSess.name.trim()||(newSess.role==="student"&&!newSess.classId&&classes.length>0)}>Create Session</button></div>
          </div>
        </div>
      )}

      {modal==="create-marathon"&&(
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
            <div className="mhdr"><span>🏁 {marathon?"Edit":"Create"} Marathon</span><button className="xbtn" onClick={()=>setModal(null)}>✕</button></div>
            <div className="mbody" style={{maxHeight:"65vh"}}>
              <div className="fg"><label className="flabel">Marathon Title</label><input className="finput" autoFocus placeholder="e.g. Lab 4 — Joins & Aggregates" value={newM.title} onChange={e=>setNewM(p=>({...p,title:e.target.value}))}/></div>
              <div className="section-hdr">Questions</div>
              {newM.questions.map((q,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-start"}}>
                  <div className="q-num" style={{marginTop:2,flexShrink:0}}>{i+1}</div>
                  <textarea className="finput" style={{flex:1}} placeholder="Question prompt…" value={q.prompt} onChange={e=>setNewM(p=>{const qs=[...p.questions];qs[i]={...qs[i],prompt:e.target.value};return{...p,questions:qs};})}/>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    <input className="finput" style={{width:58}} type="number" min={1} max={100} title="Points" value={q.points} onChange={e=>setNewM(p=>{const qs=[...p.questions];qs[i]={...qs[i],points:e.target.value};return{...p,questions:qs};})}/>
                    {newM.questions.length>1&&<button className="xbtn" style={{textAlign:"center"}} onClick={()=>setNewM(p=>({...p,questions:p.questions.filter((_,j)=>j!==i)}))}>✕</button>}
                  </div>
                </div>
              ))}
              <button className="btn btn-ghost btn-sm" onClick={()=>setNewM(p=>({...p,questions:[...p.questions,{prompt:"",points:1}]}))}>+ Add Question</button>
            </div>
            <div className="mftr"><button className="btn btn-ghost btn-sm" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-green btn-sm" onClick={saveMarathon} disabled={!newM.title.trim()||!newM.questions.some(q=>q.prompt.trim())}>Save Marathon</button></div>
          </div>
        </div>
      )}

      {modal==="create-quiz"&&<QuizBuilderModal newQuiz={newQuiz} setNewQuiz={setNewQuiz} saveQuiz={saveQuiz} onClose={()=>setModal(null)} classes={classes}/>}
      {modal==="marking"&&markingQuiz&&<MarkingModal markingQuiz={markingQuiz} quizSubs={quizSubs} quizStudents={quizStudents} markScores={markScores} setMarkScores={setMarkScores} markFeedback={markFeedback} setMarkFeedback={setMarkFeedback} saveMarking={saveMarking} onClose={()=>setModal(null)}/>}

      {modal==="manage-classes"&&<ClassManagerModal classes={classes} onSave={saveClass} onClose={()=>setModal(null)}/>}

      {modal==="firebase-setup"&&<FirebaseSetupModal
        connected={fbConnected}
        roomCode={fbRoomCode}
        onConnect={async(cfg)=>{
          const ok=await initFirebase(cfg);
          if(ok){
            subscribeSharedKeys();
            // Write config to Firebase so students can fetch it with just the DB URL + room
            await fbSet("_config", {apiKey:cfg.apiKey, databaseURL:cfg.databaseURL, roomCode:cfg.roomCode});
            setFbConnected(true);
            setFbRoomCode(cfg.roomCode);
            notify("🔥 Firebase connected! Room: "+cfg.roomCode);
            setModal(null);
          } else {
            return "Firebase connection failed — check your API key and database URL";
          }
        }}
        onDisconnect={()=>{
          LS.del("qc:fbconfig");
          _fbReady=false; _fbDB=null; _fbConfig=null;
          setFbConnected(false); setFbRoomCode("");
          setModal(null);
          notify("Firebase disconnected","⚠️");
        }}
        onClose={()=>setModal(null)}
      />}

      {/* ── Whiteboard ── */}
      {view==="whiteboard"&&(
        <div style={{position:"absolute",inset:"52px 0 0 0",overflow:"hidden"}}>
          <Whiteboard curSess={curSess} classes={classes} isTeacher={isTeacher} onClassAssigned={classId=>{const allSess=LS.get(SESSIONS_KEY)||[];const updated=allSess.map(s=>s.id===curSess.id?{...s,classId}:s);LS.set(SESSIONS_KEY,updated);setSessions(updated);setCurSess(p=>({...p,classId}));}}/>
        </div>
      )}

      {/* ── Rewards ── */}
      {view==="rewards"&&(
        <div style={{position:"absolute",inset:"52px 0 0 0",overflow:"hidden"}}>
          <RewardsView curSess={curSess} isTeacher={isTeacher} quizStudents={quizStudents} classes={classes}/>
        </div>
      )}

      {/* Notification toast */}
      {notif&&<div className="notif"><span style={{fontSize:14}}>{notif.icon}</span>{notif.msg}</div>}

      {/* Loading screen */}
      {confirmDeleteQuizId&&(()=>{
        const q = quizList.find(x=>x.id===confirmDeleteQuizId);
        return (
          <div className="overlay" style={{zIndex:500}} onClick={()=>setConfirmDeleteQuizId(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
              <div className="mhdr"><span>🗑 Delete Quiz</span></div>
              <div className="mbody" style={{textAlign:"center",padding:"24px 20px"}}>
                <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
                <div style={{fontSize:14,fontWeight:700,color:"#d6e4f0",marginBottom:8}}>
                  Delete {q ? '"'+q.title+'"' : "this quiz"}?
                </div>
                <div style={{fontSize:12,color:"#5a7a94"}}>This cannot be undone. All submissions will be lost.</div>
              </div>
              <div className="mftr" style={{gap:10}}>
                <button className="btn btn-ghost" onClick={()=>setConfirmDeleteQuizId(null)}>Cancel</button>
                <button className="btn" style={{background:"#ff5370",color:"#fff"}} onClick={()=>doDeleteQuiz(confirmDeleteQuizId)}>Delete Quiz</button>
              </div>
            </div>
          </div>
        );
      })()}

      {connectScreen&&(
        <ConnectScreen
          onConnected={()=>{ setConnectScreen(false); setLoginScreen(true); setFbConnected(true); setFbRoomCode(_fbConfig?.roomCode||""); }}
          onSkip={()=>{ setConnectScreen(false); setLoginScreen(true); }}
        />
      )}

      {loginScreen&&(
        <LoginScreen
          classes={classes}
          onLoginTeacher={loginTeacher}
          onLoginStudent={loginStudent}
          onRegisterStudent={registerStudent}
        />
      )}

      {loading&&(
        <div style={{position:"fixed",inset:0,background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,zIndex:200}}>
          <div style={{fontSize:42}}>⚡</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:T.text}}>QueryClass</div>
          <div style={{fontSize:12,color:T.muted,marginTop:-8}}>SQL Learning Platform</div>
          <div style={{width:200,height:3,background:T.border,borderRadius:2,overflow:"hidden",marginTop:8}}>
            <div style={{height:"100%",background:T.accent,borderRadius:2,animation:"lb 1.4s ease infinite"}}/>
          </div>
          <style>{`@keyframes lb{0%{width:0;transform:translateX(0)}50%{width:100%}100%{width:0;transform:translateX(200px)}}`}</style>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
