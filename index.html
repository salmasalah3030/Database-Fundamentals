function Whiteboard({curSess, classes, isTeacher, onClassAssigned}) {
  const [selClassId, setSelClassId]  = useState(null);
  const [prompt, setPrompt]          = useState("");
  const [notes, setNotes]            = useState([]);
  const [editingPrompt, setEditingPrompt] = useState(false);
  const [draftPrompt, setDraftPrompt]    = useState("");
  // Sticker picker: null | "board" | noteId (picking sticker for a specific note)
  const [stickerTarget, setStickerTarget] = useState(null);
  const pollRef   = useRef(null);
  const canvasRef = useRef(null);
  const dragRef   = useRef(null);

  // Auto-select class strictly from session classId — never fall back to first class
  useEffect(()=>{
    if(!curSess) return;
    if(isTeacher) {
      if(classes.length>0 && !selClassId) setSelClassId(classes[0].id);
    } else {
      // Students: only use classId stored on session. No guessing.
      setSelClassId(curSess.classId||null);
    }
  },[curSess ? curSess.id : null, curSess ? curSess.classId : null, isTeacher]);

  // Load & poll whiteboard data
  useEffect(()=>{
    if(!selClassId) return;
    loadBoard();
    pollRef.current = setInterval(loadBoard, 2000);
    return ()=>{
      clearInterval(pollRef.current);
      // clean up any lingering drag listeners
      if(onMouseMoveRef.current) window.removeEventListener("mousemove", onMouseMoveRef.current);
      if(onMouseUpRef.current)   window.removeEventListener("mouseup",   onMouseUpRef.current);
    };
  },[selClassId]);

  async function loadBoard(){
    if(!selClassId) return;
    const p = LS.get("__shared__"+WB_PFX+selClassId)   ||"";
    const n = LS.get("__shared__"+WB_NOTES_PFX+selClassId)||[];
    setPrompt(prev=>prev===p?prev:p);
    setNotes(prev=>JSON.stringify(prev)===JSON.stringify(n)?prev:n);
  }

  async function savePrompt(text){
    LS.set("__shared__"+WB_PFX+selClassId, text);
    setPrompt(text);
  }

  async function addNote(){
    if(!curSess||!selClassId) return;
    const existing = LS.get("__shared__"+WB_NOTES_PFX+selClassId)||[];
    // spread notes around canvas center
    const angle = Math.random()*Math.PI*2;
    const r = 180 + Math.random()*160;
    const cx = Math.max(0,(canvasRef.current?.clientWidth||800)/2-85);
    const cy = 260;
    const color = STICKY_COLORS[Math.floor(Math.random()*STICKY_COLORS.length)];
    const note = {
      id: curSess.id+"-n-"+Date.now(),
      authorId: curSess.id,
      authorName: curSess.name,
      color,
      text: "",
      x: Math.round(cx + Math.cos(angle)*r*0.6),
      y: Math.round(cy + Math.sin(angle)*r*0.4),
      w: 200,
      created: Date.now()
    };
    const upd = [...existing, note];
    LS.set("__shared__"+WB_NOTES_PFX+selClassId, upd);
    setNotes(upd);
  }

  async function updateNote(id, changes){
    const existing = LS.get("__shared__"+WB_NOTES_PFX+selClassId)||[];
    const upd = existing.map(n=>n.id===id?{...n,...changes}:n);
    LS.set("__shared__"+WB_NOTES_PFX+selClassId, upd);
    setNotes(upd);
  }

  async function deleteNote(id){
    const existing = LS.get("__shared__"+WB_NOTES_PFX+selClassId)||[];
    const upd = existing.filter(n=>n.id!==id);
    LS.set("__shared__"+WB_NOTES_PFX+selClassId, upd);
    setNotes(upd);
  }

  async function clearBoard(){
    if(!confirm("Clear all sticky notes on this board?")) return;
    LS.set("__shared__"+WB_NOTES_PFX+selClassId, []);
    LS.set("__shared__"+WB_PFX+selClassId, "");
    setNotes([]); setPrompt("");
  }

  // Place a free-floating sticker on the canvas
  async function addStickerToBoard(emoji){
    if(!curSess||!selClassId) return;
    const existing = LS.get("__shared__"+WB_NOTES_PFX+selClassId)||[];
    const cx = (canvasRef.current?.clientWidth||800)/2;
    const cy = 300 + Math.random()*200;
    const sticker = {
      id: curSess.id+"-st-"+Date.now(),
      authorId: curSess.id,
      authorName: curSess.name,
      kind: "sticker",           // distinguishes from text notes
      emoji,
      x: Math.round(cx - 36 + (Math.random()-0.5)*300),
      y: Math.round(cy + (Math.random()-0.5)*120),
      w: 72,
      created: Date.now()
    };
    const upd = [...existing, sticker];
    LS.set("__shared__"+WB_NOTES_PFX+selClassId, upd);
    setNotes(upd);
    setStickerTarget(null);
  }

  // Attach a sticker badge to an existing note
  async function addStickerToNote(noteId, emoji){
    const existing = LS.get("__shared__"+WB_NOTES_PFX+selClassId)||[];
    const upd = existing.map(n=>{
      if(n.id!==noteId) return n;
      const stickers = [...(n.stickers||[]), {emoji, by:curSess.name, at:Date.now()}];
      return {...n, stickers};
    });
    LS.set("__shared__"+WB_NOTES_PFX+selClassId, upd);
    setNotes(upd);
    setStickerTarget(null);
  }

  // ── Drag logic ────────────────────────────────────────────────────────────
  // Always use stable refs for handlers so add/remove pairs always match
  const onMouseMoveRef = useRef(null);
  const onMouseUpRef   = useRef(null);

  function removeDragListeners(){
    if(onMouseMoveRef.current) window.removeEventListener("mousemove", onMouseMoveRef.current);
    if(onMouseUpRef.current)   window.removeEventListener("mouseup",   onMouseUpRef.current);
    onMouseMoveRef.current = null;
    onMouseUpRef.current   = null;
  }

  function onMouseDown(e, note){
    if(e.target.classList.contains("sticky-body")) return;
    if(e.target.classList.contains("sticky-del"))  return;
    if(e.target.classList.contains("sticky-resize")) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    if(!canvas) return;
    const rect = canvas.getBoundingClientRect();
    dragRef.current = {
      noteId: note.id,
      startX: e.clientX - rect.left + canvas.scrollLeft,
      startY: e.clientY - rect.top  + canvas.scrollTop,
      origX:  note.x,
      origY:  note.y
    };
    setNotes(prev=>prev.map(n=>n.id===note.id ? {...n,_dragging:true} : n));

    // Define stable handler refs so removeEventListener works correctly
    removeDragListeners();

    onMouseMoveRef.current = function(ev){
      const d = dragRef.current;
      if(!d) return;
      const cvs = canvasRef.current;
      if(!cvs) return;
      const r  = cvs.getBoundingClientRect();
      const nx = Math.max(0, d.origX + (ev.clientX - r.left + cvs.scrollLeft) - d.startX);
      const ny = Math.max(0, d.origY + (ev.clientY - r.top  + cvs.scrollTop)  - d.startY);
      // Capture id/coords before setState to avoid stale dragRef inside callback
      const id = d.noteId;
      const fx = Math.round(nx);
      const fy = Math.round(ny);
      setNotes(prev=>prev.map(n=>n.id===id ? {...n,x:fx,y:fy} : n));
    };

    onMouseUpRef.current = function(){
      const d = dragRef.current;
      if(!d) return;
      const id = d.noteId;
      dragRef.current = null;
      removeDragListeners();
      setNotes(prev=>{
        const found = prev.find(n=>n.id===id);
        if(found) updateNote(id, {x:found.x, y:found.y, _dragging:false});
        return prev.map(n=>n.id===id ? {...n,_dragging:false} : n);
      });
    };

    window.addEventListener("mousemove", onMouseMoveRef.current);
    window.addEventListener("mouseup",   onMouseUpRef.current);
  }

  // Touch drag — same pattern: capture all values before setState callback
  function onTouchStart(e, note){
    if(e.target.classList.contains("sticky-body")) return;
    const t = e.touches[0];
    const canvas = canvasRef.current;
    if(!canvas) return;
    const rect = canvas.getBoundingClientRect();
    dragRef.current = {
      noteId: note.id,
      startX: t.clientX - rect.left + canvas.scrollLeft,
      startY: t.clientY - rect.top  + canvas.scrollTop,
      origX:  note.x,
      origY:  note.y
    };
  }
  function onTouchMove(e){
    const d = dragRef.current;
    if(!d) return;
    e.preventDefault();
    const t = e.touches[0];
    const canvas = canvasRef.current;
    if(!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const id = d.noteId;
    const fx = Math.max(0, Math.round(d.origX + (t.clientX - rect.left + canvas.scrollLeft) - d.startX));
    const fy = Math.max(0, Math.round(d.origY + (t.clientY - rect.top  + canvas.scrollTop)  - d.startY));
    setNotes(prev=>prev.map(n=>n.id===id ? {...n,x:fx,y:fy} : n));
  }
  function onTouchEnd(){
    const d = dragRef.current;
    if(!d) return;
    const id = d.noteId;
    dragRef.current = null;
    setNotes(prev=>{
      const found = prev.find(n=>n.id===id);
      if(found) updateNote(id, {x:found.x, y:found.y});
      return prev;
    });
  }

  // Determine canvas min-size to fit all notes
  const canvasW = Math.max(1200, ...notes.map(n=>(n.x||0)+(n.w||200)+40));
  const canvasH = Math.max(800,  ...notes.map(n=>(n.y||0)+220));

  const selClass = classes.find(c=>c.id===selClassId);
  const myNoteIds = notes.filter(n=>n.authorId===curSess?.id).map(n=>n.id);

  // Group notes by author for live presence
  const authors = [...new Map(notes.map(n=>[n.authorId,{id:n.authorId,name:n.authorName,count:notes.filter(x=>x.authorId===n.authorId).length}])).values()];

  // Save chosen class back onto the session so it persists everywhere
  function assignClassToSession(classId) {
    const allSess = LS.get(SESSIONS_KEY)||[];
    const updated = allSess.map(s=>s.id===curSess.id ? {...s, classId} : s);
    LS.set(SESSIONS_KEY, updated);
    setSelClassId(classId);
    if(onClassAssigned) onClassAssigned(classId);
  }

  if(!curSess) return (
    <div className="wb-no-class"><div style={{fontSize:42}}>🪧</div><div style={{fontSize:16,fontWeight:700}}>Open a session to use the Whiteboard</div></div>
  );

  if(classes.length===0) return (
    <div className="wb-no-class"><div style={{fontSize:42}}>🏫</div><div style={{fontSize:16,fontWeight:700}}>No classes yet</div><div style={{fontSize:13,color:"#5a7a94"}}>A teacher must create a class before the whiteboard is available</div></div>
  );

  // Student has no class assigned — show a picker before letting them in
  if(!isTeacher && !selClassId) return (
    <div className="wb-no-class" style={{gap:20}}>
      <div style={{fontSize:48}}>🏫</div>
      <div style={{fontSize:17,fontWeight:800,color:"#d6e4f0"}}>Which class are you in?</div>
      <div style={{fontSize:12,color:"#5a7a94",marginBottom:4}}>Your session wasn't linked to a class. Pick yours to continue.</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:320}}>
        {classes.map(c=>(
          <div key={c.id} onClick={()=>assignClassToSession(c.id)}
            style={{padding:"13px 20px",borderRadius:12,border:`2px solid ${c.color}`,background:c.color+"18",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background=c.color+"33"}
            onMouseLeave={e=>e.currentTarget.style.background=c.color+"18"}>
            <span style={{width:14,height:14,borderRadius:"50%",background:c.color,display:"inline-block",flexShrink:0}}/>
            <span style={{fontSize:14,fontWeight:700,color:c.color}}>{c.name}</span>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="wb-wrap">
      {/* Toolbar */}
      <div className="wb-toolbar">
        <span style={{fontSize:13,fontWeight:800,color:"#d6e4f0",marginRight:4}}>🪧 Whiteboard</span>
        {isTeacher ? (
          <div className="wb-class-pick">
            {classes.map(c=>(
              <div key={c.id} className="wb-cls-btn"
                style={{borderColor:c.color,background:selClassId===c.id?c.color+"33":"transparent",color:selClassId===c.id?c.color:"#5a7a94"}}
                onClick={()=>setSelClassId(c.id)}>
                <span style={{width:7,height:7,borderRadius:"50%",background:c.color,display:"inline-block",marginRight:5}}/>
                {c.name}
              </div>
            ))}
          </div>
        ) : (
          selClass&&<div style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}>
            <span style={{width:9,height:9,borderRadius:"50%",background:selClass.color,display:"inline-block"}}/>
            <span style={{color:selClass.color,fontWeight:700}}>{selClass.name}</span>
          </div>
        )}

        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {/* Live presence avatars */}
          {selClassId&&authors.length>0&&(
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <span className="wb-live-dot"/>
              <span style={{fontSize:10,color:"#43d98c",fontWeight:700,marginRight:4}}>{authors.length} active</span>
              {authors.slice(0,6).map(a=>(
                <div key={a.id} title={a.name+" ("+a.count+" notes)"} style={{width:24,height:24,borderRadius:"50%",background:notes.find(n=>n.authorId===a.id)?.color||"#2d4a66",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#0d1117",border:"2px solid #111720",marginLeft:-4}}>
                  {a.name.slice(0,2).toUpperCase()}
                </div>
              ))}
            </div>
          )}
          {isTeacher&&selClassId&&(
            <>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setEditingPrompt(true);setDraftPrompt(prompt);}}>✏️ {prompt?"Edit":"Set"} Prompt</button>
              <button className="btn btn-teal btn-sm" onClick={()=>setStickerTarget("board")}>🎨 Add Sticker</button>
              <button className="btn btn-red btn-sm" onClick={clearBoard}>🗑 Clear Board</button>
            </>
          )}
        </div>
      </div>

      {/* Edit prompt modal */}
      {editingPrompt&&(
        <div className="overlay" onClick={()=>setEditingPrompt(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
            <div className="mhdr"><span>✏️ Board Prompt / Question</span><button className="xbtn" onClick={()=>setEditingPrompt(false)}>✕</button></div>
            <div className="mbody">
              <div className="fg"><label className="flabel">Prompt shown to students</label>
                <textarea className="finput" autoFocus style={{minHeight:90}} placeholder="e.g. What are the key differences between INNER JOIN and LEFT JOIN? Add your sticky notes with examples…" value={draftPrompt} onChange={e=>setDraftPrompt(e.target.value)}/>
              </div>
            </div>
            <div className="mftr">
              <button className="btn btn-ghost btn-sm" onClick={()=>{savePrompt("");setEditingPrompt(false);}}>🗑 Remove Prompt</button>
              <div style={{flex:1}}/>
              <button className="btn btn-ghost btn-sm" onClick={()=>setEditingPrompt(false)}>Cancel</button>
              <button className="btn btn-purple btn-sm" onClick={()=>{savePrompt(draftPrompt.trim());setEditingPrompt(false);}}>Save Prompt</button>
            </div>
          </div>
        </div>
      )}

      {/* Sticker picker */}
      {stickerTarget&&(
        <StickerPicker
          onPick={em=>{
            const t = stickerTarget;

      {/* Canvas */}
      {selClassId&&(

                  onMouseDown={e=>canEdit&&onMouseDown(e,note)}

                </div>
              );

              // ── Sticky note ──
              return (
                <div key={note.id} className={"sticky"+(note._dragging?" dragging":"")}

                  {note.stickers&&note.stickers.length>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,marginBottom:6}}>
                      {note.stickers.map((s,si)=>(
                        <span key={si} title={s.by} style={{fontSize:20,lineHeight:1,filter:"drop-shadow(0 1px 3px rgba(0,0,0,.3))"}}>
                          {s.emoji}
                        </span>
                      ))}
                    </div>
                  )}

                  <div className="sticky-hdr">
                    <div className="sticky-avatar" style={{background:"rgba(0,0,0,.2)",color:"rgba(0,0,0,.7)"}}>
                      {note.authorName.slice(0,2).toUpperCase()}
                    </div>
                    <span style={{fontSize:10,color:"rgba(0,0,0,.6)",fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{note.authorName}</span>
                    {/* Teacher: sticker-on-note button */}
                    {isTeacher&&(
                      <span title="Add sticker to this note" onClick={e=>{e.stopPropagation();setStickerTarget(note.id);}}
                        style={{cursor:"pointer",fontSize:14,opacity:.6,transition:"opacity .1s",marginRight:4}}
                        onMouseEnter={e=>e.currentTarget.style.opacity=1}
                        onMouseLeave={e=>e.currentTarget.style.opacity=.6}>🎨</span>
                    )}
                    {canEdit&&(
                      <span className="sticky-del" onClick={()=>deleteNote(note.id)}>✕</span>
                    )}
                  </div>
                  <div
                    className="sticky-body"
                    contentEditable={canEdit}
                    suppressContentEditableWarning
                    style={{color:"rgba(0,0,0,.82)",cursor:canEdit?"text":"default"}}
                    onBlur={e=>{if(canEdit) updateNote(note.id,{text:e.target.innerText});}}
                    dangerouslySetInnerHTML={{__html:note.text.replace(/\n/g,"<br/>")}}
                  />
                  {canEdit&&<div className="sticky-resize">⇲</div>}
                  {!canEdit&&<div style={{position:"absolute",bottom:5,right:8,fontSize:8,color:"rgba(0,0,0,.35)"}}>{new Date(note.created).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Add note FAB */}
      {selClassId&&!isTeacher&&(
        <button className="wb-add-btn" onClick={addNote} title="Add sticky note">+</button>
      )}
      {selClassId&&isTeacher&&(
        <button className="wb-add-btn" style={{background:"#c792ea"}} onClick={addNote} title="Add teacher note">+</button>
      )}
    </div>
  );
}

  // ── Render an ER diagram to a PNG base64 string via offscreen canvas ──────
  function renderERtoPNG(erData, width=700, height=420) {
    return new Promise(resolve => {
      try {
        const { entities=[], relations=[] } = erData || {};
        if (!entities.length) { resolve(null); return; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#0d1117";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#1e2d3d";
        for (let x=0; x<width; x+=24) for (let y=0; y<height; y+=24) ctx.fillRect(x,y,1,1);

        const ENT_W=148, ENT_HDR=28, ROW_H=22;
        const entH = e => ENT_HDR + e.attributes.length*ROW_H;

        // Auto-layout if all at 0,0
        const allZero = entities.every(e=>!e.x&&!e.y);
        const positioned = entities.map((e,i)=>{
          if(allZero){const cols=Math.ceil(Math.sqrt(entities.length)),col=i%cols,row=Math.floor(i/cols);return{...e,x:20+col*190,y:20+row*170};}
          return e;
        });

        // Relations
        relations.forEach(r=>{
          const f=positioned.find(e=>e.id===r.from),t=positioned.find(e=>e.id===r.to);
          if(!f||!t) return;
          const fx=f.x+ENT_W/2,fy=f.y+entH(f)/2,tx=t.x+ENT_W/2,ty=t.y+entH(t)/2;
          ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty);
          ctx.strokeStyle="#2d4a66"; ctx.lineWidth=1.5;
          r.cardinality==="N:M"?ctx.setLineDash([6,3]):ctx.setLineDash([]);
          ctx.stroke(); ctx.setLineDash([]);
          const mx=(fx+tx)/2,my=(fy+ty)/2;
          ctx.fillStyle="#111720"; ctx.fillRect(mx-22,my-10,44,20);
          ctx.strokeStyle="#4fc3f7"; ctx.lineWidth=1; ctx.strokeRect(mx-22,my-10,44,20);
          ctx.fillStyle="#4fc3f7"; ctx.font="bold 10px monospace";
          ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(r.cardinality||"",mx,my);
        });

        // Entities
        positioned.forEach(ent=>{
          const h=entH(ent);
          ctx.fillStyle="rgba(0,0,0,.4)";
          if(ctx.roundRect){ctx.beginPath();ctx.roundRect(ent.x+3,ent.y+3,ENT_W,h,7);ctx.fill();}
          ctx.fillStyle="#181f2a"; ctx.strokeStyle="#2d4a66"; ctx.lineWidth=1.5;
          if(ctx.roundRect){ctx.beginPath();ctx.roundRect(ent.x,ent.y,ENT_W,h,7);ctx.fill();ctx.stroke();}
          else{ctx.fillRect(ent.x,ent.y,ENT_W,h);ctx.strokeRect(ent.x,ent.y,ENT_W,h);}
          ctx.fillStyle="#2d4a66";
          if(ctx.roundRect){ctx.beginPath();ctx.roundRect(ent.x,ent.y,ENT_W,ENT_HDR,[7,7,0,0]);ctx.fill();}
          else ctx.fillRect(ent.x,ent.y,ENT_W,ENT_HDR);
          ctx.fillStyle="#d6e4f0"; ctx.font="bold 12px Arial,sans-serif";
          ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(ent.name,ent.x+ENT_W/2,ent.y+ENT_HDR/2);
          ent.attributes.forEach((attr,ai)=>{
            const ay=ent.y+ENT_HDR+ai*ROW_H;
            ctx.strokeStyle="#1e2d3d"; ctx.lineWidth=0.5;
            ctx.beginPath(); ctx.moveTo(ent.x,ay); ctx.lineTo(ent.x+ENT_W,ay); ctx.stroke();
            const icon=attr.isPK?"PK":attr.isFK?"FK":"";
            if(icon){
              ctx.fillStyle=attr.isPK?"#ffe082":"#ffb347";
              ctx.font="bold 8px monospace"; ctx.textAlign="left"; ctx.textBaseline="middle";
              ctx.fillText(icon,ent.x+5,ay+ROW_H/2);
            }
            ctx.fillStyle=attr.isPK?"#ffe082":"#d6e4f0";
            ctx.font=attr.isPK?"bold 10px monospace":"10px monospace";
            ctx.textAlign="left"; ctx.textBaseline="middle";
            ctx.fillText(attr.name,ent.x+(icon?22:8),ay+ROW_H/2);
            ctx.fillStyle="#5a7a94"; ctx.font="9px monospace"; ctx.textAlign="right";
            ctx.fillText((attr.type||"").split("(")[0],ent.x+ENT_W-5,ay+ROW_H/2);
          });
        });

        resolve(canvas.toDataURL("image/png"));
      } catch(e){ resolve(null); }
    });
  }

  // ── Render a SQL code block to PNG ────────────────────────────────────────
  function renderSQLtoPNG(sqlText, width=700) {
    return new Promise(resolve=>{
      try {
        if(!sqlText||sqlText.trim()==="No answer submitted"){resolve(null);return;}
        const lines=sqlText.split("\n");
        const lineH=18, pad=14, lineNW=32;
        const height=Math.max(60, lines.length*lineH+pad*2);
        const canvas=document.createElement("canvas");
        canvas.width=width; canvas.height=height;
        const ctx=canvas.getContext("2d");
        ctx.fillStyle="#0d1117"; ctx.fillRect(0,0,width,height);
        // Line number gutter
        ctx.fillStyle="#111720"; ctx.fillRect(0,0,lineNW,height);
        ctx.strokeStyle="#1e2d3d"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(lineNW,0); ctx.lineTo(lineNW,height); ctx.stroke();

        // Simple syntax highlighting
        const KW=/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP BY|ORDER BY|HAVING|LIMIT|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|ALTER|DROP|INDEX|PRIMARY|KEY|FOREIGN|REFERENCES|NOT NULL|DEFAULT|AUTO_INCREMENT|AUTOINCREMENT|UNIQUE|AND|OR|IN|NOT|IS|NULL|AS|DISTINCT|UNION|ALL|CASE|WHEN|THEN|ELSE|END|BY|ASC|DESC|COUNT|SUM|AVG|MIN|MAX|SHOW|DESCRIBE|USE)\b/gi;
        const STR=/('(?:[^'])*'|"(?:[^"])*")/g;
        const CMT=/(--[^\n]*|\/\*[\s\S]*?\*\/)/g;
        const NUM=/\b(\d+(?:\.\d+)?)\b/g;

        ctx.font="13px 'Courier New',monospace";
        ctx.textBaseline="middle";

        lines.forEach((line,li)=>{
          const y=pad+li*lineH;
          // Line number
          ctx.fillStyle="#2d4a66"; ctx.font="11px monospace"; ctx.textAlign="right";
          ctx.fillText(li+1,lineNW-5,y+lineH/2);
          ctx.font="13px 'Courier New',monospace"; ctx.textAlign="left";

          // Tokenise and paint
          let x=lineNW+8;
          let rest=line;
          // Comments — entire line
          if(rest.trim().startsWith("--")||rest.trim().startsWith("#")){
            ctx.fillStyle="#5a7a94"; ctx.fillText(rest,x,y+lineH/2); return;
          }
          // Paint word by word (simple approach)
          const tokens=rest.split(/(\s+)/);
          tokens.forEach(tok=>{
            if(!tok){return;}
            if(/^\s+$/.test(tok)){x+=ctx.measureText(tok).width;return;}
            let color="#d6e4f0";
            if(KW.test(tok)){color="#4fc3f7";}
            else if(/^('.*'|".*")$/.test(tok)){color="#c3e88d";}
            else if(/^\d+$/.test(tok)){color="#f78c6c";}
            else if(/^[(),;*=<>!]+$/.test(tok)){color="#89ddff";}
            KW.lastIndex=0;
            ctx.fillStyle=color;
            ctx.fillText(tok,x,y+lineH/2);
            x+=ctx.measureText(tok).width;
          });
        });
        resolve(canvas.toDataURL("image/png"));
      } catch(e){resolve(null);}
    });
  }

  // ── Main export ───────────────────────────────────────────────────────────
  async function exportQuizExcel(quizId) {
    notify("⏳ Generating export…");
    await new Promise(r=>setTimeout(r,50)); // let notify render

    const quiz = await store.get(QUIZ_PFX+quizId, true);
    if(!quiz){notify("Quiz not found");return;}
    const allStudents = await store.get(QSTUDENTS_KEY, true) || [];
    const qs = quiz.classId ? allStudents.filter(s=>s.classId===quiz.classId) : allStudents;
    const totalPts = quiz.questions.reduce((s,q)=>s+(q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):q.points),0);
    const cls = classes.find(c=>c.id===quiz.classId);

    // ── Read all submissions correctly (shared prefix) ────────────────────
    const subMap = {}; // studentId → submission
    for(const st of qs){
      const sub = readSub(st.id, quizId);
      if(sub) subMap[st.id]=sub;
    }

    // ── Pre-render all images ─────────────────────────────────────────────
    const erPngs  = {}; // `${stId}_${qIdx}` → dataURL
    const sqlPngs = {}; // `${stId}_${qIdx}` → dataURL
    for(const st of qs){
      const sub=subMap[st.id]; if(!sub) continue;
      for(let i=0;i<quiz.questions.length;i++){
        const q=quiz.questions[i];
        if(q.type==="scenario"){
          if(sub.answers[i]?.er?.entities?.length>0)
            erPngs[`${st.id}_${i}`]=await renderERtoPNG(sub.answers[i].er);
          if(sub.answers[i]?.sql?.trim())
            sqlPngs[`${st.id}_${i}`]=await renderSQLtoPNG(sub.answers[i].sql);
        }
        if(q.type==="sql"&&sub.answers[i]?.trim())
          sqlPngs[`${st.id}_${i}`]=await renderSQLtoPNG(sub.answers[i]);
      }
    }

    // ════════════════════════════════════════════════════════════════════
    // Generate HTML Report (opens in browser & Excel)
    // ════════════════════════════════════════════════════════════════════
    const ranked=[...qs].sort((a,b)=>{
      const sa=subMap[a.id]?.marked?subMap[a.id].totalScore:-1;
      const sb=subMap[b.id]?.marked?subMap[b.id].totalScore:-1;
      return sb-sa;
    });

    const timerStart = quiz.timer?.startAt ? new Date(quiz.timer.startAt) : null;

    // ── Build grade table rows (pre-computed, no await needed) ────────────
    const qHeaders = quiz.questions.map((_,i) => "<th>Q"+(i+1)+"</th>").join("");
    const gradeRows = ranked.map(function(st, ri) {
      var sub = subMap[st.id];
      if(!sub) return "<tr><td class='rank'>"+(ri+1)+"</td><td>"+st.name+"</td><td colspan='"+(5+quiz.questions.length)+"'><span class='not-submitted'>Not submitted</span></td></tr>";
      var submittedAt = sub.submittedAt ? new Date(sub.submittedAt) : null;
      var timeTaken = "—";
      if(submittedAt && timerStart){ var diff=Math.round((submittedAt-timerStart)/1000); timeTaken=Math.floor(diff/60)+"m "+diff%60+"s"; }
      else if(submittedAt && quiz.created){ var diff2=Math.round((submittedAt-new Date(quiz.created))/1000); timeTaken=Math.floor(diff2/60)+"m "+diff2%60+"s"; }
      var p2 = sub.marked ? pct(sub.totalScore,totalPts) : null;
      var gc = p2!==null ? (p2>=90?"badge-a":p2>=80?"badge-b":p2>=60?"badge-c":"badge-f") : "badge-p";
      var gl = p2!==null ? gradeLabel(p2) : "Pending";
      var qS = quiz.questions.map(function(q,i){
        if(!sub.marked) return "<td><span class='badge badge-p'>—</span></td>";
        var s=0;
        if(q.type==="scenario") s=(Number(sub.feedback&&sub.feedback[i+"_er"]||0)+Number(sub.feedback&&sub.feedback[i+"_sql"]||0));
        else if(q.type==="sql") s=Number(sub.feedback&&sub.feedback[i+"_sql"]||0);
        else s=sub.answers[i]===q.correct?q.points:0;
        var mx=q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):q.points;
        var ok=s>=mx;
        return "<td style='text-align:center'><b style='color:"+(ok?"#059669":"#dc2626")+"'>"+s+"</b><span style='color:#94a3b8'>/"+mx+"</span></td>";
      }).join("");
      return "<tr><td class='rank'>"+(ri+1)+"</td><td><b>"+st.name+"</b></td>"
        +"<td style='color:#64748b;font-size:11px'>"+(submittedAt?submittedAt.toLocaleString():"—")+"</td>"
        +"<td style='font-family:monospace'>"+timeTaken+"</td>"
        +"<td><b>"+(sub.marked?sub.totalScore+"/"+totalPts:"Pending")+"</b></td>"
        +"<td>"+(p2!==null?p2+"%":"—")+"</td>"
        +"<td><span class='badge "+gc+"'>"+gl+"</span></td>"
        +qS+"</tr>";
    }).join("");

    // ── Build per-student answer sections (async — images already rendered) ─
    var studentSections = [];
    for(var si=0; si<qs.length; si++){
      var st = qs[si];
      var sub = subMap[st.id];
      if(!sub){
        studentSections.push("<div class='student-section'><div class='student-hdr'><h2>"+st.name+"</h2><span class='badge badge-ns'>Not Submitted</span></div></div>");
        continue;
      }
      var submittedAt = sub.submittedAt ? new Date(sub.submittedAt) : null;
      var markedAt    = sub.markedAt    ? new Date(sub.markedAt)    : null;
      var p3  = sub.marked ? pct(sub.totalScore,totalPts) : null;
      var gc3 = p3!==null ? (p3>=90?"badge-a":p3>=80?"badge-b":p3>=60?"badge-c":"badge-f") : "badge-p";
      var tT  = "—";
      if(submittedAt&&timerStart){var dd=Math.round((submittedAt-timerStart)/1000);tT=Math.floor(dd/60)+"m "+dd%60+"s";}
      else if(submittedAt&&quiz.created){var dd2=Math.round((submittedAt-new Date(quiz.created))/1000);tT=Math.floor(dd2/60)+"m "+dd2%60+"s";}

      var qBlocks = [];
      for(var qi2=0; qi2<quiz.questions.length; qi2++){
        var q   = quiz.questions[qi2];
        var idx = qi2;
        var qPts = q.type==="scenario" ? (q.erPoints||5)+(q.sqlPoints||5) : q.points;

        // Score html
        var scoreHtml = "";
        if(sub.marked){
          if(q.type==="scenario"){
            var erSc  = Number(sub.feedback&&sub.feedback[idx+"_er"]  ||0);
            var sqlSc = Number(sub.feedback&&sub.feedback[idx+"_sql"] ||0);
            var erFb  = (sub.feedback&&sub.feedback[idx+"_er"])  ||"";
            var sqlFb = (sub.feedback&&sub.feedback[idx+"_sql"]) ||"";
            scoreHtml = "<div class='score-row'><span>ER: <b>"+erSc+"/"+(q.erPoints||5)+"</b></span><span>SQL: <b>"+sqlSc+"/"+(q.sqlPoints||5)+"</b></span><span>Total: <b>"+(erSc+sqlSc)+"/"+qPts+"</b></span></div>";
            if(erFb||sqlFb) scoreHtml += "<div class='feedback-box'>&#128172; "+([erFb?"ER: "+erFb:"",sqlFb?"SQL: "+sqlFb:""].filter(Boolean).join(" &nbsp;|&nbsp; "))+"</div>";
          } else if(q.type==="sql"){
            var sc2 = Number(sub.feedback&&sub.feedback[idx+"_sql"]||0);
            var fb2 = (sub.feedback&&sub.feedback[idx+"_sql"])||"";
            scoreHtml = "<div class='score-row'><span>Score: <b>"+sc2+"/"+qPts+"</b></span></div>";
            if(fb2) scoreHtml += "<div class='feedback-box'>&#128172; "+fb2+"</div>";
          } else {
            var sc3 = sub.answers[idx]===q.correct ? q.points : 0;
            var fb3 = (sub.feedback&&sub.feedback[idx+"_mcq"])||"";
            var col = sc3>0?"#059669":"#dc2626";
            scoreHtml = "<div class='score-row'><span>Score: <b style='color:"+col+"'>"+sc3+"/"+qPts+"</b></span><span>"+(sc3>0?"&#9989; Correct":"&#10060; Wrong")+"</span></div>";
            if(fb3) scoreHtml += "<div class='feedback-box'>&#128172; "+fb3+"</div>";
          }
        }

        // Answer html
        var answerHtml = "";
        if(q.type==="mcq"){
          var chosen = sub.answers[idx];
          answerHtml = "<div class='label'>Student's Answer</div>";
          for(var oi=0;oi<q.options.length;oi++){
            var isChosen  = chosen===oi;
            var isCorrect = q.correct===oi;
            var cls2 = "mcq-opt"+(isChosen?" mcq-chosen":"")+(isCorrect?" mcq-correct":"");
            answerHtml += "<div class='"+cls2+"'>"+(isChosen?"&#9654; ":"&nbsp;&nbsp;&nbsp;")
              +String.fromCharCode(65+oi)+") "+q.options[oi]+(isCorrect?" &#10003;":"")+"</div>";
          }
          if(chosen===undefined) answerHtml += "<div class='answer-box wrong'>No answer selected</div>";
        }
        if(q.type==="sql"){
          var sqlAns = sub.answers[idx]||"";
          var sqlPng = sqlPngs[st.id+"_"+idx];
          answerHtml = "<div class='label'>Student's SQL Answer</div>";
          answerHtml += sqlPng
            ? "<img class='diagram' src='"+sqlPng+"' alt='SQL Answer'/>"
            : "<div class='answer-box'>"+(sqlAns||"No answer submitted")+"</div>";
        }
        if(q.type==="scenario"){
          var erData  = sub.answers[idx]&&sub.answers[idx].er;
          var erPng2  = erPngs[st.id+"_"+idx];
          var sqlPng2 = sqlPngs[st.id+"_"+idx];
          var scenSQL = (sub.answers[idx]&&sub.answers[idx].sql)||"";
          answerHtml  = "<div class='label'>Scenario</div><div class='answer-box'>"+(q.scenario||"")+"</div>";
          if(q.requirements&&q.requirements.length){
            answerHtml += "<div class='label'>Requirements</div><ol style='padding-left:18px;font-size:12px;line-height:1.8'>"
              +q.requirements.map(function(r){return "<li>"+r+"</li>";}).join("")+"</ol>";
          }
          answerHtml += "<div class='label'>ER Diagram</div>";
          if(erPng2) answerHtml += "<img class='diagram' src='"+erPng2+"' alt='ER Diagram'/>";
          else if(erData&&erData.entities&&erData.entities.length) answerHtml += "<div class='answer-box'>"+erData.entities.map(function(e){return "["+e.name+"]";}).join(" → ")+"</div>";
          else answerHtml += "<div class='answer-box wrong'>No ER diagram submitted</div>";
          answerHtml += "<div class='label'>SQL Answer</div>";
          answerHtml += sqlPng2
            ? "<img class='diagram' src='"+sqlPng2+"' alt='SQL Answer'/>"
            : "<div class='answer-box'>"+(scenSQL||"No SQL submitted")+"</div>";
        }

        var typeLabel = q.type==="mcq"?"MCQ":q.type==="sql"?"SQL":"Scenario";
        qBlocks.push(
          "<div class='q-block'>"
          +"<div class='q-hdr'>"
            +"<div class='q-num'>"+(idx+1)+"</div>"
            +"<span class='q-type qt-"+q.type+"'>"+typeLabel+"</span>"
            +"<b style='flex:1;font-size:13px'>"+(q.prompt||(q.scenario||"").slice(0,80)||"")+"</b>"
            +"<span style='color:#64748b;font-size:11px'>"+qPts+" pts</span>"
          +"</div>"
          +"<div class='q-body'>"+answerHtml+scoreHtml+"</div>"
          +"</div>"
        );
      }

      var scoreLabel = p3!==null ? (sub.totalScore+"/"+totalPts+" &middot; "+p3+"% &middot; "+gradeLabel(p3)) : "Submitted — Pending";
      studentSections.push(
        "<div class='student-section'>"
        +"<div class='student-hdr'><h2>"+st.name+"</h2><span class='badge "+gc3+"' style='font-size:13px'>"+scoreLabel+"</span></div>"
        +"<div class='student-body'>"
          +"<div style='display:flex;gap:24px;font-size:12px;color:#64748b;margin-bottom:16px;flex-wrap:wrap'>"
            +"<span>&#128197; Submitted: <b style='color:#1a2332'>"+(submittedAt?submittedAt.toLocaleString():"—")+"</b></span>"
            +"<span>&#9201; Time taken: <b style='color:#1a2332;font-family:monospace'>"+tT+"</b></span>"
            +(markedAt?"<span>&#9989; Marked: <b style='color:#1a2332'>"+markedAt.toLocaleString()+"</b></span>":"")
          +"</div>"
          +qBlocks.join("")
        +"</div>"
        +"</div>"
      );
    }
    var studentSectionsHtml = studentSections.join("");

    // ── Info cards ─────────────────────────────────────────────────────────
    var infoCards = ""
      +"<div class='info-card'><div class='key'>Total Students</div><div class='val'>"+qs.length+"</div></div>"
      +"<div class='info-card'><div class='key'>Submitted</div><div class='val'>"+Object.keys(subMap).length+"</div></div>"
      +"<div class='info-card'><div class='key'>Marked</div><div class='val'>"+qs.filter(function(s){return subMap[s.id]&&subMap[s.id].marked;}).length+"</div></div>"
      +"<div class='info-card'><div class='key'>Max Score</div><div class='val'>"+totalPts+" pts</div></div>"
      +"<div class='info-card'><div class='key'>Questions</div><div class='val'>"+quiz.questions.length+"</div></div>"
      +(timerStart?"<div class='info-card'><div class='key'>Quiz Started</div><div class='val' style='font-size:13px'>"+timerStart.toLocaleString()+"</div></div>":"");

    const CSS = "*{box-sizing:border-box;margin:0;padding:0}"
      +"body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f9;color:#1a2332;font-size:13px}"
      +".page{max-width:960px;margin:0 auto;padding:24px}"
      +"h1{font-size:22px;color:#1a2332;margin-bottom:4px}"
      +".meta{color:#5a7a94;font-size:12px;margin-bottom:24px}"
      +".badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}"
      +".badge-a{background:#d1fae5;color:#065f46}.badge-b{background:#dbeafe;color:#1e40af}"
      +".badge-c{background:#fef9c3;color:#854d0e}.badge-f{background:#fee2e2;color:#991b1b}"
      +".badge-p{background:#f3e8ff;color:#6b21a8}.badge-ns{background:#f1f5f9;color:#64748b}"
      +"table{width:100%;border-collapse:collapse;margin-bottom:24px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}"
      +"th{background:#1a2332;color:#fff;padding:9px 12px;font-size:12px;text-align:left;font-weight:600}"
      +"td{padding:9px 12px;border-bottom:1px solid #e8edf2;vertical-align:top}"
      +"tr:last-child td{border-bottom:none}tr:hover td{background:#f8fafc}"
      +".rank{font-weight:800;color:#4fc3f7;font-size:15px}"
      +".student-section{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:32px;overflow:hidden}"
      +".student-hdr{background:#1a2332;color:#fff;padding:14px 18px;display:flex;gap:16px;align-items:center}"
      +".student-hdr h2{font-size:16px;flex:1}"
      +".student-body{padding:18px}"
      +".q-block{margin-bottom:20px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}"
      +".q-hdr{background:#f1f5f9;padding:10px 14px;display:flex;gap:10px;align-items:center;border-bottom:1px solid #e2e8f0}"
      +".q-num{background:#1a2332;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}"
      +".q-body{padding:14px}"
      +".q-type{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;text-transform:uppercase}"
      +".qt-mcq{background:#dbeafe;color:#1e40af}.qt-sql{background:#d1fae5;color:#065f46}.qt-scenario{background:#f3e8ff;color:#6b21a8}"
      +".answer-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 14px;margin:8px 0;font-family:monospace;font-size:12px;white-space:pre-wrap;line-height:1.6}"
      +".wrong{color:#dc2626;font-weight:700}"
      +".label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:10px}"
      +".score-row{display:flex;gap:16px;background:#f1f5f9;border-radius:6px;padding:8px 12px;margin-top:10px;font-size:12px}"
      +".score-row b{color:#1a2332}"
      +"img.diagram{max-width:100%;border-radius:8px;border:1px solid #e2e8f0;display:block;margin:8px 0}"
      +".feedback-box{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px;margin-top:8px;font-size:12px;color:#92400e}"
      +".not-submitted{color:#94a3b8;font-style:italic;padding:24px;text-align:center}"
      +".section-title{font-size:14px;font-weight:700;color:#1a2332;margin:24px 0 10px;padding-bottom:6px;border-bottom:2px solid #e2e8f0}"
      +".info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px}"
      +".info-card{background:#fff;border-radius:8px;padding:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}"
      +".info-card .val{font-size:20px;font-weight:800;color:#1a2332;margin-top:4px}"
      +".info-card .key{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}"
      +".mcq-opt{padding:6px 10px;border-radius:5px;margin:3px 0;font-size:12px}"
      +".mcq-chosen{background:#fef9c3;border:1px solid #fde047}"
      +".mcq-correct{background:#d1fae5;border:1px solid #6ee7b7}"
      +".mcq-chosen.mcq-correct{background:#d1fae5;border:1px solid #059669}"
      +"@media print{body{background:#fff}.page{padding:0}table{box-shadow:none}}";

    const html = "<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'/>"
      +"<title>"+quiz.title+" — Quiz Report</title>"
      +"<style>"+CSS+"</style></head><body><div class='page'>"
      +"<h1>&#128221; "+quiz.title+"</h1>"
      +"<div class='meta'>"+(quiz.description||"")+" &nbsp;&middot;&nbsp; Class: <b>"+(cls?cls.name:"All")+"</b> &nbsp;&middot;&nbsp; Exported: "+new Date().toLocaleString()+"</div>"
      +"<div class='info-grid'>"+infoCards+"</div>"
      +"<div class='section-title'>&#128202; Grade Summary</div>"
      +"<table><thead><tr><th>#</th><th>Student</th><th>Submitted At</th><th>Time Taken</th><th>Score</th><th>%</th><th>Grade</th>"+qHeaders+"</tr></thead>"
      +"<tbody>"+gradeRows+"</tbody></table>"
      +"<div class='section-title'>&#128196; Student Answer Sheets</div>"
      +studentSectionsHtml
      +"</div></body></html>";

    // Download HTML via data URI (avoids CSP blob: restrictions)
    function dlDataURI(dataUri, filename) {
      var a = document.createElement("a");
      a.href = dataUri; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    var safeTitle = quiz.title.replace(/[^a-z0-9]/gi,"_");
    dlDataURI("data:text/html;base64," + btoa(unescape(encodeURIComponent(html))), safeTitle+"_report.html");

    // Also export Excel with accurate data
    const WB = XLSX.utils.book_new();

    // Sheet 1 — Grades (accurate)
    const summaryRows=[
      ["QUIZ REPORT"],["Title: "+quiz.title],["Class: "+(cls?cls.name:"All")],["Exported: "+new Date().toLocaleString()],["Total Points: "+totalPts],[],
      ["Rank","Student","Submitted At","Time Taken","Score","/ Total","Percentage","Grade",...quiz.questions.map((_,i)=>"Q"+(i+1))]
    ];
    ranked.forEach((st,ri)=>{
      const sub=subMap[st.id];
      if(!sub){summaryRows.push([ri+1,st.name,"Not submitted","—","—",totalPts,"—","—",...quiz.questions.map(()=>"")]);return;}
      const submittedAt=sub.submittedAt?new Date(sub.submittedAt):null;
      let timeTaken="—";
      if(submittedAt&&timerStart){const d=Math.round((submittedAt-timerStart)/1000);timeTaken=`${Math.floor(d/60)}m ${d%60}s`;}
      const p2=sub.marked?pct(sub.totalScore,totalPts):null;
      const qScores=quiz.questions.map((q,i)=>{
        if(!sub.marked) return "Pending";
        if(q.type==="scenario") return Number((sub.feedback&&sub.feedback[i+"_er"])||0)+Number((sub.feedback&&sub.feedback[i+"_sql"])||0);
        if(q.type==="sql") return Number((sub.feedback&&sub.feedback[i+"_sql"])||0);
        return sub.answers[i]===q.correct?q.points:0;
      });
      summaryRows.push([ri+1,st.name,submittedAt?submittedAt.toLocaleString():"—",timeTaken,sub.marked?sub.totalScore:"Pending",totalPts,p2!==null?(p2+"%"):"—",p2!==null?gradeLabel(p2):"—",...qScores]);
    });
    const ws1=XLSX.utils.aoa_to_sheet(summaryRows);
    ws1["!cols"]=[{wch:5},{wch:22},{wch:22},{wch:12},{wch:10},{wch:8},{wch:12},{wch:8},...quiz.questions.map(()=>({wch:10}))];
    XLSX.utils.book_append_sheet(WB,ws1,"Grades");

    // Sheet 2 — Answers (text)
    const ansRows=[["Student","Question #","Type","Question","Answer","Score","Max","Feedback","Submitted At","Marked At"]];
    for(const st of qs){
      const sub=subMap[st.id]; if(!sub) continue;
      quiz.questions.forEach((q,i)=>{
        const fbKey_er  = i+"_er";
        const fbKey_sql = i+"_sql";
        const fbKey_mcq = i+"_mcq";
        let ans="";
        if(q.type==="mcq") ans=sub.answers[i]!==undefined?(String.fromCharCode(65+sub.answers[i])+") "+q.options[sub.answers[i]]):"No answer";
        else if(q.type==="sql") ans=sub.answers[i]||"";
        else {
          const erLen=(sub.answers[i]&&sub.answers[i].er&&sub.answers[i].er.entities&&sub.answers[i].er.entities.length)||0;
          const relLen=(sub.answers[i]&&sub.answers[i].er&&sub.answers[i].er.relations&&sub.answers[i].er.relations.length)||0;
          const sqlPre=((sub.answers[i]&&sub.answers[i].sql)||"").slice(0,120);
          ans="[ER: "+erLen+" entities, "+relLen+" relations] SQL: "+sqlPre;
        }
        let score="Pending",fb="";
        if(sub.marked){
          const f=sub.feedback||{};
          if(q.type==="scenario"){
            score="ER:"+(f[fbKey_er]||0)+"/"+(q.erPoints||5)+" SQL:"+(f[fbKey_sql]||0)+"/"+(q.sqlPoints||5);
            fb=[f[fbKey_er]?"ER: "+f[fbKey_er]:"",f[fbKey_sql]?"SQL: "+f[fbKey_sql]:""].filter(Boolean).join(" | ");
          } else if(q.type==="sql"){
            score=(f[fbKey_sql]||0)+"/"+q.points; fb=f[fbKey_sql]||"";
          } else {
            score=sub.answers[i]===q.correct?q.points+"/"+q.points+" V":"0/"+q.points+" X"; fb=f[fbKey_mcq]||"";
          }
        }
        const qMax=q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):q.points;
        ansRows.push([st.name,i+1,q.type,q.prompt||q.scenario||"",ans,score,qMax,fb,sub.submittedAt?new Date(sub.submittedAt).toLocaleString():"",sub.markedAt?new Date(sub.markedAt).toLocaleString():"Not marked"]);
      });
    }
    const ws2=XLSX.utils.aoa_to_sheet(ansRows);
    ws2["!cols"]=[{wch:20},{wch:5},{wch:10},{wch:40},{wch:55},{wch:18},{wch:6},{wch:40},{wch:20},{wch:20}];
    XLSX.utils.book_append_sheet(WB,ws2,"Answers");

    // Download XLSX via data URI (avoids CSP blob: restrictions)
    var xlsxOut = XLSX.write(WB, {bookType:"xlsx", type:"base64"});
    dlDataURI("data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + xlsxOut, safeTitle+"_grades.xlsx");
    notify("📊 Report + Excel exported!");
  }

  async function loadQuiz(qid){

  }
  async function submitQuiz(){
    if(!qReg||!curQuiz) return;
    const autoScore=curQuiz.questions.reduce((sum,q,i)=>q.type==="mcq"?sum+(qAnswers[i]===q.correct?q.points:0):sum,0);
    const sub={studentId:qReg.id,quizId:curQuiz.id,answers:qAnswers,autoScore,submittedAt:new Date().toISOString(),marked:false,totalScore:null,feedback:{}};
    const allSubs=await store.get(QSUB_PFX+qReg.id,true)||{};
    allSubs[curQuiz.id]=sub;
    await store.set(QSUB_PFX+qReg.id,allSubs,true);
    setQuizSubs(p=>({...p,[qReg.id]:allSubs})); notify("Quiz submitted! 🎉");
  }
  async function saveMarking(){
    if(!markingQuiz) return;
    const {quizId,studentId}=markingQuiz;
    const allSubs=await store.get(QSUB_PFX+studentId,true)||{};
    const sub=allSubs[quizId]; if(!sub) return;
    const quiz=await store.get(QUIZ_PFX+quizId,true);
    const total=quiz.questions.reduce((s,q,i)=>{
      if(q.type==="mcq"){const auto=sub.answers[i]===q.correct?q.points:0;return s+(markScores[`${i}_mcq`]!==undefined?Number(markScores[`${i}_mcq`]):auto);}
      if(q.type==="sql") return s+(markScores[`${i}_sql`]!==undefined?Number(markScores[`${i}_sql`]):0);
      if(q.type==="scenario") return s+(markScores[`${i}_er`]!==undefined?Number(markScores[`${i}_er`]):0)+(markScores[`${i}_sql`]!==undefined?Number(markScores[`${i}_sql`]):0);
      return s;
    },0);
    sub.totalScore=total; sub.feedback=markFeedback; sub.marked=true; sub.markedAt=new Date().toISOString();
    allSubs[quizId]=sub;
    await store.set(QSUB_PFX+studentId,allSubs,true);
    setQuizSubs(p=>({...p,[studentId]:allSubs}));
    // ── Auto-award reward points based on teacher-set quiz reward pts ──────
    const qRptsAll = LS.get("__shared__"+QUIZ_RPTS_KEY)||{};
    const qRptsForQuiz = qRptsAll[quizId]||{};
    let totalReward = 0;
    const rewardLines = [];
    quiz.questions.forEach((q,i)=>{
      const rewardPts = Number(qRptsForQuiz[i])||0;
      if(rewardPts<=0) return;
      // Determine if student got this question right / answered it
      let gotIt = false;
      if(q.type==="mcq") gotIt = (sub.answers[i]===q.correct);
      else if(q.type==="sql") gotIt = (Number(markScores[i+"_sql"]||0)>0);
      else if(q.type==="scenario") gotIt = ((Number(markScores[i+"_er"]||0)+Number(markScores[i+"_sql"]||0))>0);
      if(gotIt){ totalReward+=rewardPts; rewardLines.push("Q"+(i+1)+": +"+rewardPts+"pts"); }
    });
    if(totalReward>0){
      const stuName=(quizStudents.find(s=>s.id===studentId)||{name:studentId}).name;
      givePoints(studentId, stuName, totalReward, "Quiz: "+quiz.title+" ("+rewardLines.join(", ")+")", "quiz");
    }
    setModal(null); setMarkingQuiz(null); notify("Marks saved! 💾"+(totalReward>0?" +"+totalReward+" reward pts 🌟":""));
  }

  function refreshTables(database){
    try{const r=database.exec("SELECT name FROM sqlite_master WHERE type='table' ORDER BY name");setTables(r[0]?.values?.map(v=>v[0])||[]);}catch{setTables([]);}
  }

    if(!newSess.name.trim()||!sqlJS) return;
    const s={id:uid(),name:newSess.name.trim(),role:newSess.role,color:newSess.color,classId:newSess.classId||null,created:new Date().toISOString()};

                  <button className="btn btn-purple" style={{width:"100%",justifyContent:"center",padding:"8px 0",fontSize:13}}

                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{q.title.slice(0,14)}…</span>
                            <span className="grade-pill" style={{background:gradeColor(p)+"22",color:gradeColor(p),fontSize:9}}>{gradeLabel(p)}</span>

              <button className="btn btn-ghost btn-sm" onClick={()=>setNewM(p=>({...p,questions:[...p.questions,{prompt:"",points:1}]}))}>+ Add Question</button>
            </div>
            <div className="mftr"><button className="btn btn-ghost btn-sm" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-green btn-sm" onClick={saveMarathon} disabled={!newM.title.trim()||!newM.questions.some(q=>q.prompt.trim())}>Save Marathon</button></div>
          </div>
        </div>
      )}

      {modal==="create-quiz"&&<QuizBuilderModal newQuiz={newQuiz} setNewQuiz={setNewQuiz} saveQuiz={saveQuiz} onClose={()=>setModal(null)} classes={classes}/>}
      {modal==="marking"&&markingQuiz&&<MarkingModal markingQuiz={markingQuiz} quizSubs={quizSubs} quizStudents={quizStudents} markScores={markScores} setMarkScores={setMarkScores} markFeedback={markFeedback} setMarkFeedback={setMarkFeedback} saveMarking={saveMarking} onClose={()=>setModal(null)}/>}

      {modal==="manage-classes"&&<ClassManagerModal classes={classes} onSave={saveClass} onDelete={deleteClass} onClose={()=>setModal(null)}/>}

      {/* ── Whiteboard ── */}
      {view==="whiteboard"&&(
        <div style={{position:"absolute",inset:"52px 0 0 0",overflow:"hidden"}}>
          <Whiteboard curSess={curSess} classes={classes} isTeacher={isTeacher} onClassAssigned={classId=>{const allSess=LS.get(SESSIONS_KEY)||[];const updated=allSess.map(s=>s.id===curSess.id?{...s,classId}:s);LS.set(SESSIONS_KEY,updated);setSessions(updated);setCurSess(p=>({...p,classId}));}}/>
        </div>
      )}

      {/* ── Rewards ── */}
      {view==="rewards"&&(
        <div style={{position:"absolute",inset:"52px 0 0 0",overflow:"hidden"}}>
          <RewardsView curSess={curSess} isTeacher={isTeacher} quizStudents={quizStudents} classes={classes}/>
        </div>
      )}

      {/* Notification toast */}
      {notif&&<div className="notif"><span style={{fontSize:14}}>{notif.icon}</span>{notif.msg}</div>}

      {/* Loading screen */}
      {loading&&(
        <div style={{position:"fixed",inset:0,background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,zIndex:200}}>
          <div style={{fontSize:42}}>⚡</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:T.text}}>QueryClass</div>
          <div style={{fontSize:12,color:T.muted,marginTop:-8}}>SQL Learning Platform</div>
          <div style={{width:200,height:3,background:T.border,borderRadius:2,overflow:"hidden",marginTop:8}}>
            <div style={{height:"100%",background:T.accent,borderRadius:2,animation:"lb 1.4s ease infinite"}}/>
          </div>
          <style>{`@keyframes lb{0%{width:0;transform:translateX(0)}50%{width:100%}100%{width:0;transform:translateX(200px)}}`}</style>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
