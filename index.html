// ─── ER Canvas ────────────────────────────────────────────────────────────────
function ERCanvas({ value, onChange, readOnly=false }) {
  const svgRef = useRef(null);
  const [entities, setEntities] = useState(value?.entities||[]);
  const [relations, setRelations] = useState(value?.relations||[]);
  const [tool, setTool] = useState("select");
  const [selected, setSelected] = useState(null);
  const [dragging, setDragging] = useState(null);
  const [relStart, setRelStart] = useState(null);
  const [hoverEnt, setHoverEnt] = useState(null);
  const [editingLabel, setEditingLabel] = useState(null);
  const [pan, setPan] = useState({x:0,y:0});
  const [isPanning, setIsPanning] = useState(false);
  const panStart = useRef(null);

  useEffect(()=>{ setEntities(value?.entities||[]); setRelations(value?.relations||[]); },[value?.entities?.length,value?.relations?.length]);

  const emit=(ents,rels)=>{ if(onChange) onChange({entities:ents,relations:rels}); };
  const svgPt=(e)=>{ const r=svgRef.current.getBoundingClientRect(); return {x:e.clientX-r.left-pan.x,y:e.clientY-r.top-pan.y}; };

  const handleSvgClick=(e)=>{
    if(readOnly) return;
    if(e.target===svgRef.current||e.target.classList.contains("canvas-bg")){
      if(tool==="entity"){ const pt=svgPt(e); const ent={id:uid(),name:"Entity",x:pt.x-60,y:pt.y-20,attributes:[{id:uid(),name:"id",isPK:true,isFK:false,type:"INT"}]}; const ne=[...entities,ent]; setEntities(ne); emit(ne,relations); setSelected({type:"entity",id:ent.id}); setTool("select"); }
      else { setSelected(null); setRelStart(null); }
    }
  };

  const handleMouseDown=(e,entId)=>{
    if(readOnly) return;
    e.stopPropagation();
    if(tool==="relation"){
      if(!relStart){ setRelStart(entId); setHoverEnt(entId); }
      else if(relStart!==entId){ const rel={id:uid(),from:relStart,to:entId,label:"relates to",cardinality:"1:N"}; const nr=[...relations,rel]; setRelations(nr); emit(entities,nr); setRelStart(null); setTool("select"); setSelected({type:"relation",id:rel.id}); }
      else { setRelStart(null); }
      return;
    }
    const ent=entities.find(en=>en.id===entId);
    setDragging({id:entId,ox:e.clientX-ent.x,oy:e.clientY-ent.y});
    setSelected({type:"entity",id:entId});
  };

  const handleMouseMove=useCallback((e)=>{
    if(dragging){ const nx=e.clientX-dragging.ox,ny=e.clientY-dragging.oy; setEntities(ents=>ents.map(en=>en.id===dragging.id?{...en,x:nx,y:ny}:en)); }
    if(isPanning&&panStart.current) setPan({x:e.clientX-panStart.current.ox,y:e.clientY-panStart.current.oy});
  },[dragging,isPanning]);

  const handleMouseUp=useCallback(()=>{
    if(dragging){ emit(entities,relations); setDragging(null); }
    if(isPanning){ setIsPanning(false); panStart.current=null; }
  },[dragging,isPanning,entities,relations]);

  useEffect(()=>{
    window.addEventListener("mousemove",handleMouseMove);
    window.addEventListener("mouseup",handleMouseUp);
    return()=>{ window.removeEventListener("mousemove",handleMouseMove); window.removeEventListener("mouseup",handleMouseUp); };
  },[handleMouseMove,handleMouseUp]);

  const addAttr=(entId)=>{ const ne=entities.map(en=>en.id===entId?{...en,attributes:[...en.attributes,{id:uid(),name:"attr",isPK:false,isFK:false,type:"VARCHAR(100)"}]}:en); setEntities(ne); emit(ne,relations); };
  const updateAttr=(entId,attrId,field,val)=>{ const ne=entities.map(en=>en.id===entId?{...en,attributes:en.attributes.map(a=>a.id===attrId?{...a,[field]:val}:a)}:en); setEntities(ne); emit(ne,relations); };
  const removeAttr=(entId,attrId)=>{ const ne=entities.map(en=>en.id===entId?{...en,attributes:en.attributes.filter(a=>a.id!==attrId)}:en); setEntities(ne); emit(ne,relations); };
  const updateEntity=(id,field,val)=>{ const ne=entities.map(en=>en.id===id?{...en,[field]:val}:en); setEntities(ne); emit(ne,relations); };
  const removeEntity=(id)=>{ const ne=entities.filter(en=>en.id!==id); const nr=relations.filter(r=>r.from!==id&&r.to!==id); setEntities(ne); setRelations(nr); emit(ne,nr); setSelected(null); };
  const updateRelation=(id,field,val)=>{ const nr=relations.map(r=>r.id===id?{...r,[field]:val}:r); setRelations(nr); emit(entities,nr); };
  const removeRelation=(id)=>{ const nr=relations.filter(r=>r.id!==id); setRelations(nr); emit(entities,nr); setSelected(null); };

  const entH=(ent)=>34+ent.attributes.length*22;
  const entW=152;
  const relMid=(r)=>{ const f=entities.find(e=>e.id===r.from),t=entities.find(e=>e.id===r.to); if(!f||!t) return null; const fx=f.x+entW/2,fy=f.y+entH(f)/2,tx=t.x+entW/2,ty=t.y+entH(t)/2; return{x:(fx+tx)/2,y:(fy+ty)/2,fx,fy,tx,ty}; };

  const selEnt=selected?.type==="entity"?entities.find(e=>e.id===selected.id):null;
  const selRel=selected?.type==="relation"?relations.find(r=>r.id===selected.id):null;
  const SQL_TYPES=["INT","BIGINT","VARCHAR(50)","VARCHAR(100)","VARCHAR(255)","TEXT","DATE","DATETIME","DECIMAL(10,2)","BOOLEAN","FLOAT"];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.bg}}>
      {!readOnly&&(
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:T.surface,borderBottom:`1px solid ${T.border}`,flexShrink:0,flexWrap:"wrap"}}>
          {[["select","🖱 Select"],["entity","📦 Add Entity"],["relation","🔗 Add Relation"]].map(([t,l])=>(
            <button key={t} className={`btn btn-sm ${tool===t?"btn-run":"btn-ghost"}`} onClick={()=>{setTool(t);setRelStart(null);}}>{l}</button>
          ))}
          <div style={{flex:1}}/>
          {relStart&&<span style={{fontSize:10,color:T.orange,fontWeight:600}}>📍 Click target entity…</span>}
          {selected&&<button className="btn btn-red btn-sm" onClick={()=>{if(selEnt)removeEntity(selEnt.id);if(selRel)removeRelation(selRel.id);}}>🗑 Delete</button>}
          <button className="btn btn-ghost btn-sm" onClick={()=>{setEntities([]);setRelations([]);emit([],[]);setSelected(null);}}>Clear</button>
        </div>
      )}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <svg ref={svgRef} width="100%" height="100%"
          style={{flex:1,background:T.bg,cursor:tool==="entity"?"crosshair":tool==="relation"?"cell":"default",userSelect:"none",minWidth:0}}
          onClick={handleSvgClick}>
          <defs>
            <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse" x={pan.x%24} y={pan.y%24}>
              <path d="M 24 0 L 0 0 0 24" fill="none" stroke={T.border} strokeWidth="0.5" opacity="0.4"/>
            </pattern>
            <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill={T.muted}/></marker>
            <marker id="arr-s" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill={T.accent}/></marker>
          </defs>
          <rect width="100%" height="100%" fill="url(#grid)" className="canvas-bg"/>
          <g transform={`translate(${pan.x},${pan.y})`}>
            {relations.map(r=>{
              const m=relMid(r); if(!m) return null;
              const isSel=selected?.id===r.id; const color=isSel?T.accent:T.muted;
              return (
                <g key={r.id} onClick={e=>{e.stopPropagation();if(!readOnly)setSelected({type:"relation",id:r.id});}}>
                  <line x1={m.fx} y1={m.fy} x2={m.tx} y2={m.ty} stroke={color} strokeWidth={isSel?2.5:1.5} strokeDasharray={r.cardinality==="N:M"?"6 3":"none"} markerEnd={`url(#arr${isSel?"-s":""})`} style={{cursor:"pointer"}}/>
                  <rect x={m.x-28} y={m.y-11} width={56} height={22} rx={5} fill={T.surface} stroke={color} strokeWidth={isSel?1.5:1} style={{cursor:"pointer"}}/>
                  <text x={m.x} y={m.y+5} textAnchor="middle" fontSize={10} fill={color} style={{pointerEvents:"none",fontFamily:"'Syne',sans-serif",fontWeight:700}}>{r.cardinality}</text>
                </g>
              );
            })}
            {entities.map(ent=>{
              const isSel=selected?.id===ent.id; const isRelSrc=relStart===ent.id;
              const isHov=hoverEnt===ent.id&&tool==="relation"&&relStart&&relStart!==ent.id;
              const h=entH(ent); const bc=isRelSrc?T.orange:isSel?T.accent:isHov?T.green:T.border;
              return (
                <g key={ent.id} transform={`translate(${ent.x},${ent.y})`}
                  onMouseDown={e=>handleMouseDown(e,ent.id)}
                  onMouseEnter={()=>setHoverEnt(ent.id)} onMouseLeave={()=>setHoverEnt(null)}
                  style={{cursor:tool==="relation"?"pointer":"move"}}>
                  <rect x={3} y={3} width={entW} height={h} rx={7} fill="rgba(0,0,0,.4)"/>
                  <rect width={entW} height={h} rx={7} fill={T.surfaceAlt} stroke={bc} strokeWidth={isSel?2:1.5}/>
                  <rect width={entW} height={28} rx={7} fill={isSel?T.accent:T.borderHi}/>
                  <rect y={22} width={entW} height={6} fill={isSel?T.accent:T.borderHi}/>
                  {editingLabel?.type==="entity"&&editingLabel.id===ent.id?(
                    <foreignObject x={6} y={4} width={entW-12} height={22}>
                      <input xmlns="http://www.w3.org/1999/xhtml"
                        style={{width:"100%",background:"transparent",border:"none",outline:"none",color:isSel?T.bg:T.text,fontWeight:800,fontSize:12,fontFamily:"'Syne',sans-serif",textAlign:"center"}}
                        defaultValue={ent.name} autoFocus
                        onBlur={e=>{updateEntity(ent.id,"name",e.target.value);setEditingLabel(null);}}
                        onKeyDown={e=>{if(e.key==="Enter"){updateEntity(ent.id,"name",e.target.value);setEditingLabel(null);}e.stopPropagation();}}
                        onClick={e=>e.stopPropagation()}/>
                    </foreignObject>
                  ):(
                    <text x={entW/2} y={18} textAnchor="middle" fontSize={12} fontWeight={800} fill={isSel?T.bg:T.text}
                      fontFamily="'Syne',sans-serif" style={{pointerEvents:readOnly?"none":"all",cursor:"text"}}
                      onDoubleClick={e=>{e.stopPropagation();if(!readOnly)setEditingLabel({type:"entity",id:ent.id});}}>
                      {ent.name}
                    </text>
                  )}
                  {ent.attributes.map((attr,ai)=>(
                    <g key={attr.id} transform={`translate(0,${28+ai*22})`}>
                      <line x1={0} y1={0} x2={entW} y2={0} stroke={T.border} strokeWidth={0.5}/>
                      {attr.isPK&&<text x={6} y={15} fontSize={9} fill={T.yellow}>🔑</text>}
                      {attr.isFK&&!attr.isPK&&<text x={6} y={15} fontSize={9} fill={T.orange}>🔗</text>}
                      <text x={attr.isPK||attr.isFK?22:8} y={15} fontSize={10} fill={attr.isPK?T.yellow:T.text}
                        fontFamily="'JetBrains Mono',monospace" fontWeight={attr.isPK?700:400}>{attr.name}</text>
                      <text x={entW-6} y={15} textAnchor="end" fontSize={9} fill={T.muted} fontFamily="'JetBrains Mono',monospace">{attr.type.split("(")[0]}</text>
                    </g>
                  ))}
                </g>
              );
            })}
          </g>
        </svg>

        {/* Properties panel */}
        {!readOnly&&(selEnt||selRel)&&(
          <div style={{width:220,background:T.surface,borderLeft:`1px solid ${T.border}`,overflow:"auto",flexShrink:0,fontSize:11}}>
            {selEnt&&(
              <div style={{padding:10}}>
                <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:T.accent}}>📦 Entity</div>
                <div className="fg"><label className="flabel">Name</label><input className="finput" style={{fontSize:11}} value={selEnt.name} onChange={e=>updateEntity(selEnt.id,"name",e.target.value)}/></div>
                <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Attributes</div>
                {selEnt.attributes.map(attr=>(
                  <div key={attr.id} style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:5,padding:7,marginBottom:5}}>
                    <div style={{display:"flex",gap:4,marginBottom:4}}>
                      <input className="finput" style={{flex:1,fontSize:10}} value={attr.name} onChange={e=>updateAttr(selEnt.id,attr.id,"name",e.target.value)} placeholder="name"/>
                      <button className="xbtn" onClick={()=>removeAttr(selEnt.id,attr.id)}>✕</button>
                    </div>
                    <select className="finput" style={{fontSize:10,marginBottom:4}} value={attr.type} onChange={e=>updateAttr(selEnt.id,attr.id,"type",e.target.value)}>
                      {["INT","BIGINT","VARCHAR(50)","VARCHAR(100)","VARCHAR(255)","TEXT","DATE","DATETIME","DECIMAL(10,2)","BOOLEAN","FLOAT"].map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                    <div style={{display:"flex",gap:8}}>
                      <label style={{display:"flex",gap:4,alignItems:"center",fontSize:10,cursor:"pointer",color:attr.isPK?T.yellow:T.muted}}><input type="checkbox" checked={attr.isPK} onChange={e=>updateAttr(selEnt.id,attr.id,"isPK",e.target.checked)}/> PK</label>
                      <label style={{display:"flex",gap:4,alignItems:"center",fontSize:10,cursor:"pointer",color:attr.isFK?T.orange:T.muted}}><input type="checkbox" checked={attr.isFK} onChange={e=>updateAttr(selEnt.id,attr.id,"isFK",e.target.checked)}/> FK</label>
                    </div>
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" style={{width:"100%",justifyContent:"center",marginTop:2}} onClick={()=>addAttr(selEnt.id)}>+ Attribute</button>
              </div>
            )}
            {selRel&&(
              <div style={{padding:10}}>
                <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:T.accent}}>🔗 Relationship</div>
                <div className="fg"><label className="flabel">Label</label><input className="finput" style={{fontSize:11}} value={selRel.label} onChange={e=>updateRelation(selRel.id,"label",e.target.value)}/></div>
                <div className="fg"><label className="flabel">Cardinality</label>
                  <div style={{display:"flex",gap:5}}>
                    {["1:1","1:N","N:M"].map(c=><button key={c} className={`btn btn-sm ${selRel.cardinality===c?"btn-run":"btn-ghost"}`} onClick={()=>updateRelation(selRel.id,"cardinality",c)}>{c}</button>)}
                  </div>
                </div>
                <div style={{fontSize:10,color:T.muted}}>{entities.find(e=>e.id===selRel.from)?.name} → {entities.find(e=>e.id===selRel.to)?.name}</div>
              </div>
            )}
          </div>
        )}
        {readOnly&&entities.length>0&&(
          <div style={{width:155,background:T.surface,borderLeft:`1px solid ${T.border}`,padding:10,overflow:"auto",flexShrink:0}}>
            <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Entities</div>
            {entities.map(e=>(
              <div key={e.id} style={{marginBottom:7}}>
                <div style={{fontSize:11,fontWeight:700,color:T.text,marginBottom:2}}>{e.name}</div>
                {e.attributes.map(a=><div key={a.id} style={{fontSize:9,color:a.isPK?T.yellow:T.muted,fontFamily:"'JetBrains Mono',monospace",paddingLeft:6}}>{a.isPK?"🔑 ":a.isFK?"🔗 ":"• "}{a.name}</div>)}
              </div>
            ))}
            <div style={{height:1,background:T.border,margin:"7px 0"}}/>
            <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Relations</div>
            {relations.map(r=>{ const f=entities.find(e=>e.id===r.from),t=entities.find(e=>e.id===r.to); return <div key={r.id} style={{fontSize:9,color:T.muted,marginBottom:3}}>{f?.name} <span style={{color:T.accent}}>{r.cardinality}</span> {t?.name}</div>; })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Scenario Answer Component ────────────────────────────────────────────────
function ScenarioAnswer({qi,answer,onChange,readOnly,db}) {
  const [tab,setTab]=useState("scenario");
  const [sqlText,setSqlText]=useState(answer?.sql||"");
  const [sqlResults,setSqlResults]=useState([]);
  const [sqlStatus,setSqlStatus]=useState({type:"idle",msg:"Ready"});
  const taRef=useRef(null);
  const lines=sqlText.split("\n").map((_,i)=>i+1).join("\n");

  const runSQL=()=>{
    if(!db) return;
    const res=execSQL(db,sqlText); setSqlResults(res);
    const err=res.some(r=>r.type==="error");
    setSqlStatus({type:err?"err":"ok",msg:err?"Error in query":`${res.length} statement(s) executed`});
    if(!readOnly&&onChange) onChange({...answer,sql:sqlText});
  };

  const handleKey=(e)=>{
    if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();runSQL();}
    if(e.key==="Tab"){ e.preventDefault(); const{selectionStart:s,selectionEnd:en}=taRef.current; const v=sqlText.slice(0,s)+"  "+sqlText.slice(en); setSqlText(v); setTimeout(()=>{taRef.current.selectionStart=taRef.current.selectionEnd=s+2;},0); }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <div style={{display:"flex",background:T.surface,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        {[["scenario","📖 Scenario"],["er","🗂 ER Diagram"],["sql","💻 SQL Database"]].map(([t,l])=>(
          <div key={t} onClick={()=>setTab(t)} style={{padding:"9px 16px",fontSize:11,fontWeight:700,cursor:"pointer",color:tab===t?T.accent:T.muted,borderBottom:`2px solid ${tab===t?T.accent:"transparent"}`,transition:"all .15s",whiteSpace:"nowrap",userSelect:"none"}}>{l}</div>
        ))}
        <div style={{flex:1}}/>
        {!readOnly&&tab==="sql"&&<div style={{padding:"8px 12px",fontSize:9,color:T.muted,display:"flex",alignItems:"center"}}>Ctrl+Enter to run</div>}
      </div>

      {tab==="scenario"&&(
        <div style={{flex:1,overflow:"auto",padding:20}}>
          <div style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:10,padding:20,maxWidth:760}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:T.teal,marginBottom:10}}>📖 Scenario</div>
            <div style={{fontSize:14,lineHeight:1.8,color:T.text,whiteSpace:"pre-wrap"}}>{qi.scenario}</div>
            {qi.requirements?.length>0&&(
              <div style={{marginTop:16}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:T.orange,marginBottom:8}}>Requirements</div>
                {qi.requirements.map((req,i)=>(
                  <div key={i} style={{display:"flex",gap:9,marginBottom:6,fontSize:13,color:T.text}}>
                    <span style={{color:T.accent,fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{req}</span>
                  </div>
                ))}
              </div>
            )}
            {qi.hints&&(
              <div style={{marginTop:14,padding:"10px 14px",background:`rgba(79,195,247,.06)`,border:`1px solid ${T.borderHi}`,borderRadius:7}}>
                <span style={{fontSize:10,fontWeight:700,color:T.accent}}>💡 Hint: </span>
                <span style={{fontSize:11,color:T.muted}}>{qi.hints}</span>
              </div>
            )}
          </div>
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setTab("er")}>→ Draw ER Diagram</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setTab("sql")}>→ Write SQL</button>
          </div>
        </div>
      )}

      {tab==="er"&&(
        <div style={{flex:1,overflow:"hidden"}}><ERCanvas value={answer?.er||{}} onChange={v=>!readOnly&&onChange&&onChange({...answer,er:v})} readOnly={readOnly}/></div>
      )}

      {tab==="sql"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {!readOnly&&(
            <div style={{display:"flex",gap:7,padding:"6px 12px",background:T.surface,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
              <button className="btn btn-run btn-sm" onClick={runSQL} disabled={!db}>▶ Run SQL</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setSqlText("")}>Clear</button>
            </div>
          )}
          <div style={{flex:"0 0 55%",position:"relative",minHeight:100}}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:40,padding:"14px 5px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.7,color:T.dim,background:T.bg,borderRight:`1px solid ${T.border}`,userSelect:"none",whiteSpace:"pre",pointerEvents:"none",overflowY:"hidden"}}>{lines}</div>
            {readOnly?(
              <div style={{position:"absolute",inset:0,overflow:"auto",fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.7,padding:"14px 14px 14px 52px",color:T.text,whiteSpace:"pre-wrap"}}>{answer?.sql||<em style={{color:T.dim}}>No SQL submitted</em>}</div>
            ):(
              <textarea ref={taRef} style={{position:"absolute",inset:0,width:"100%",height:"100%",background:T.bg,color:T.text,border:"none",outline:"none",resize:"none",fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.7,padding:"14px 14px 14px 52px",tabSize:2}}
                value={sqlText} onChange={e=>{setSqlText(e.target.value);if(onChange)onChange({...answer,sql:e.target.value});}}
                onKeyDown={handleKey} spellCheck={false} placeholder={"-- Create your database here\nCREATE TABLE ..."}/>
            )}
          </div>
          <div style={{flex:1,overflow:"auto",borderTop:`1px solid ${T.border}`,background:T.surface,padding:"8px 10px",minHeight:70}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:T.muted,marginBottom:5}}>
              Results {sqlStatus.type!=="idle"&&<span className={sqlStatus.type==="ok"?"s-ok":"s-err"} style={{marginLeft:8}}>— {sqlStatus.msg}</span>}
            </div>
            {sqlResults.length===0&&<div style={{fontSize:10,color:T.dim}}>Run SQL to see results…</div>}
            {sqlResults.map((r,i)=>(
              <div key={i} style={{marginBottom:7}}>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.dim,marginBottom:3,padding:"2px 6px",background:T.bg,borderRadius:3,borderLeft:`2px solid ${T.border}`}}>{r.sql?.slice(0,80)}</div>
                {r.type==="ok"&&<div className="r-ok">✓ {r.message}</div>}
                {r.type==="error"&&<div className="r-err">✗ {r.message}</div>}
                {r.type==="table"&&<div className="tbl-wrap"><table className="rtbl"><thead><tr>{r.data.columns.map(c=><th key={c}>{c}</th>)}</tr></thead><tbody>{r.data.values.map((row,ri)=><tr key={ri}>{row.map((cell,ci)=><td key={ci}>{cell===null?<em style={{color:T.dim}}>NULL</em>:String(cell)}</td>)}</tr>)}</tbody></table></div>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Editor Panel (defined outside App so it never remounts on parent re-render)
function EditorPanel({query,setQuery,taRef,lines,handleKey,db,curSess,results,status,tables,onRun,runLabel="▶ Run"}) {
  return (
    <div className="editor-wrap" style={{flex:1}}>
      <div className="toolbar">
        <button className="btn btn-run" onClick={onRun} disabled={!db}>{runLabel}</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>setQuery("")}>Clear</button>
        <div style={{flex:1}}/>
        <span style={{fontSize:9,color:T.dim}}>Ctrl+Enter to run</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
        <div className="ed-pane" style={{flex:"0 0 52%"}}>
          <div className="gutter">{lines}</div>
          <textarea ref={taRef} className="code-ta" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={handleKey} spellCheck={false} disabled={!curSess} placeholder={curSess?"":"← Create or select a session first"}/>
        </div>
        <div className="results-pane">
          <div className="res-hdr"><span>Results</span>{results.length>0&&<span style={{fontWeight:400,color:T.dim}}>{results.length} stmt</span>}</div>
          <div className="res-scroll">
            {results.length===0
              ?<div style={{padding:"10px 0",fontSize:10,color:T.dim,textAlign:"center"}}>Run a query to see results</div>
              :results.map((r,i)=>(
                <div key={i} className="r-block">
                  <div className="r-sql">{r.sql?.slice(0,100)}</div>
                  {r.type==="ok"&&<div className="r-ok">✓ {r.message}</div>}
                  {r.type==="error"&&<div className="r-err">✗ {r.message}</div>}
                  {r.type==="table"&&<div className="tbl-wrap"><table className="rtbl"><thead><tr>{r.data.columns.map(c=><th key={c}>{c}</th>)}</tr></thead><tbody>{r.data.values.map((row,ri)=><tr key={ri}>{row.map((cell,ci)=><td key={ci}>{cell===null?<em style={{color:T.dim}}>NULL</em>:String(cell)}</td>)}</tr>)}</tbody></table></div>}
                </div>
              ))}
          </div>
        </div>
      </div>
      <div className="status-bar">
        <span className={status.type==="ok"?"s-ok":status.type==="err"?"s-err":""}>{status.type==="ok"?"✓":status.type==="err"?"✗":"●"} {status.msg}</span>
        {curSess&&<span>{curSess.name}</span>}
        {tables.length>0&&<span>{tables.length} table{tables.length!==1?"s":""}</span>}
        <span style={{marginLeft:"auto",color:T.dim}}>MySQL 8.0 compat</span>
      </div>
    </div>
  );
}

// ─── Class Manager Modal ──────────────────────────────────────────────────────
const CLASS_COLORS=["#4fc3f7","#43d98c","#c792ea","#ffb347","#ff5370","#80cbc4","#f07178","#89ddff"];
function ClassManagerModal({classes,onSave,onDelete,onClose}){
  const [name,setName]=useState("");
  const [color,setColor]=useState(CLASS_COLORS[0]);
  const [editId,setEditId]=useState(null);
  function startEdit(c){setName(c.name);setColor(c.color);setEditId(c.id);}
  function cancel(){setName("");setColor(CLASS_COLORS[0]);setEditId(null);}
  function submit(){if(!name.trim())return;onSave(name.trim(),color,editId);cancel();}
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
        <div className="mhdr"><span>🏫 Manage Classes</span><button className="xbtn" onClick={onClose}>✕</button></div>
        <div className="mbody">
          {/* Existing classes */}
          {classes.length>0&&<>
            <div className="section-hdr" style={{marginBottom:8}}>Your Classes</div>
            {classes.map(c=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:8,marginBottom:6}}>
                <span className="class-dot" style={{background:c.color,width:12,height:12,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,fontWeight:600}}>{c.name}</span>
                <button className="btn btn-ghost btn-sm" style={{padding:"2px 8px"}} onClick={()=>startEdit(c)}>✏</button>
                <button className="btn btn-ghost btn-sm" style={{padding:"2px 8px",color:"#ff5370"}} onClick={()=>{if(confirm(`Delete class "${c.name}"?`)){onDelete(c.id);}}}>🗑</button>
              </div>
            ))}
            <div className="divider" style={{margin:"12px 0"}}/>
          </>}
          {/* Add / Edit form */}
          <div className="section-hdr" style={{marginBottom:8}}>{editId?"Edit Class":"New Class"}</div>
          <div className="fg"><label className="flabel">Class Name</label>
            <input className="finput" autoFocus placeholder="e.g. Class A, Monday Group…" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>
          <div className="fg">
            <label className="flabel">Colour</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {CLASS_COLORS.map(c=>(
                <div key={c} onClick={()=>setColor(c)} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:color===c?"3px solid white":"3px solid transparent",boxShadow:color===c?`0 0 0 2px ${c}`:"none",transition:"all .15s"}}/>
              ))}
            </div>
          </div>
        </div>
        <div className="mftr">
          {editId&&<button className="btn btn-ghost btn-sm" onClick={cancel}>Cancel Edit</button>}
          <div style={{flex:1}}/>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>Close</button>
          <button className="btn btn-purple btn-sm" onClick={submit} disabled={!name.trim()}>{editId?"Save Changes":"+ Add Class"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Timer Controls (teacher) ─────────────────────────────────────────────────
function TimerControls({quizId,ti,onStart,onStop}) {
  const [dur,setDur]=useState(30);
  if(ti&&!ti.expired) return (
    <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,83,112,.06)",border:`1px solid rgba(255,83,112,.25)`,borderRadius:8,padding:"4px 10px"}}>
      <span className={`timer-display ${ti.urgent?"timer-urgent":ti.warn?"timer-warn":"timer-ok"}`} style={{fontSize:15}}>{ti.label}</span>
      <div style={{width:80,height:4,background:"#1e2d3d",borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:2,background:ti.urgent?"#ff5370":ti.warn?"#ffb347":"#43d98c",width:`${ti.pctLeft}%`,transition:"width 1s linear"}}/>
      </div>
      <button className="btn btn-red btn-sm" onClick={()=>onStop(quizId)}>■ Stop</button>
    </div>
  );
  return (
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <input type="number" min={1} max={180} className="finput" style={{width:58,fontSize:11,padding:"4px 7px"}} value={dur} onChange={e=>setDur(Number(e.target.value)||1)}/>
      <span style={{fontSize:10,color:"#5a7a94"}}>min</span>
      <button className="btn btn-orange btn-sm" onClick={()=>onStart(quizId,dur)}>⏱ Start Timer</button>
    </div>
  );
}

// ─── Quiz Builder Modal ───────────────────────────────────────────────────────
function QuizBuilderModal({newQuiz,setNewQuiz,saveQuiz,onClose,classes}) {
  if(!newQuiz) return null;
  const updateQ=(i,field,val)=>setNewQuiz(p=>{const qs=[...p.questions];qs[i]={...qs[i],[field]:val};return{...p,questions:qs};});
  const updateOpt=(qi,oi,val)=>setNewQuiz(p=>{const qs=[...p.questions];const opts=[...qs[qi].options];opts[oi]=val;qs[qi]={...qs[qi],options:opts};return{...p,questions:qs};});
  const addReq=(qi)=>setNewQuiz(p=>{const qs=[...p.questions];qs[qi]={...qs[qi],requirements:[...(qs[qi].requirements||[]),""]};return{...p,questions:qs};});
  const updateReq=(qi,ri,val)=>setNewQuiz(p=>{const qs=[...p.questions];const reqs=[...(qs[qi].requirements||[])];reqs[ri]=val;qs[qi]={...qs[qi],requirements:reqs};return{...p,questions:qs};});
  const removeReq=(qi,ri)=>setNewQuiz(p=>{const qs=[...p.questions];qs[qi]={...qs[qi],requirements:(qs[qi].requirements||[]).filter((_,j)=>j!==ri)};return{...p,questions:qs};});
  const addQ=(type)=>setNewQuiz(p=>({...p,questions:[...p.questions,
    type==="mcq"?{type:"mcq",prompt:"",options:["","","",""],correct:0,points:1}
    :type==="sql"?{type:"sql",prompt:"",points:2}
    :{type:"scenario",prompt:"",scenario:"",requirements:[],hints:"",erPoints:5,sqlPoints:5}
  ]}));
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-xl" onClick={e=>e.stopPropagation()} style={{maxHeight:"94vh"}}>
        <div className="mhdr"><span>📝 {newQuiz.id?"Edit":"New"} Quiz</span><button className="xbtn" onClick={onClose}>✕</button></div>
        <div className="mbody" style={{maxHeight:"72vh"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div className="fg" style={{marginBottom:0}}><label className="flabel">Title</label><input className="finput" autoFocus placeholder="e.g. Week 3 — Relational Design" value={newQuiz.title} onChange={e=>setNewQuiz(p=>({...p,title:e.target.value}))}/></div>
            <div className="fg" style={{marginBottom:0}}><label className="flabel">Description</label><input className="finput" placeholder="Brief description for students" value={newQuiz.description||""} onChange={e=>setNewQuiz(p=>({...p,description:e.target.value}))}/></div>
          </div>
          {classes&&classes.length>0&&(
            <div className="fg" style={{marginBottom:14}}>
              <label className="flabel">Assign to Class</label>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <div onClick={()=>setNewQuiz(p=>({...p,classId:null}))} style={{padding:"4px 12px",borderRadius:16,border:`1px solid ${!newQuiz.classId?T.purple:T.border}`,background:!newQuiz.classId?"rgba(199,146,234,.15)":"transparent",cursor:"pointer",fontSize:11,color:!newQuiz.classId?T.purple:T.muted,fontWeight:600}}>None</div>
                {classes.map(c=>(
                  <div key={c.id} onClick={()=>setNewQuiz(p=>({...p,classId:c.id}))} style={{padding:"4px 12px",borderRadius:16,border:`1px solid ${newQuiz.classId===c.id?c.color:T.border}`,background:newQuiz.classId===c.id?c.color+"22":"transparent",cursor:"pointer",fontSize:11,color:newQuiz.classId===c.id?c.color:T.muted,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:c.color,display:"inline-block"}}/>
                    {c.name}
                  </div>
                ))}
              </div>
            </div>
          )}
          <div className="section-hdr">Questions</div>
          {newQuiz.questions.map((qi,i)=>(
            <div key={i} style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:9,padding:"13px 15px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div className="q-num">{i+1}</div>
                <span className={`badge ${qi.type==="mcq"?"b-marked":qi.type==="sql"?"b-partial":"b-scenario"}`}>{qi.type==="mcq"?"Multiple Choice":qi.type==="sql"?"SQL Query":"🗂 Scenario (ER + SQL)"}</span>
                {newQuiz.questions.length>1&&<button className="btn btn-red btn-sm" style={{marginLeft:"auto"}} onClick={()=>setNewQuiz(p=>({...p,questions:p.questions.filter((_,j)=>j!==i)}))}>✕ Remove</button>}
              </div>
              {(qi.type==="mcq"||qi.type==="sql")&&(
                <div style={{display:"flex",gap:8,marginBottom:qi.type==="mcq"?8:0}}>
                  <textarea className="finput" style={{flex:1}} placeholder="Question prompt…" value={qi.prompt} onChange={e=>updateQ(i,"prompt",e.target.value)}/>
                  <input className="finput" style={{width:58}} type="number" min={1} max={100} title="Points" value={qi.points} onChange={e=>updateQ(i,"points",Number(e.target.value)||1)}/>
                </div>
              )}
              {qi.type==="mcq"&&(
                <div style={{paddingLeft:8}}>
                  <div style={{fontSize:9,color:T.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Options — click ○ to mark correct answer</div>
                  {qi.options.map((opt,oi)=>(
                    <div key={oi} style={{display:"flex",gap:7,marginBottom:6,alignItems:"center"}}>
                      <div onClick={()=>updateQ(i,"correct",oi)} style={{width:17,height:17,borderRadius:"50%",border:`2px solid ${qi.correct===oi?T.green:T.border}`,background:qi.correct===oi?T.green:"transparent",cursor:"pointer",flexShrink:0,transition:"all .1s"}}/>
                      <input className="finput" style={{flex:1}} placeholder={`Option ${String.fromCharCode(65+oi)}`} value={opt} onChange={e=>updateOpt(i,oi,e.target.value)}/>
                    </div>
                  ))}
                </div>
              )}
              {qi.type==="scenario"&&(
                <div>
                  <div className="fg"><label className="flabel">Question Title / Prompt</label><input className="finput" placeholder="e.g. Design a Hospital Database" value={qi.prompt||""} onChange={e=>updateQ(i,"prompt",e.target.value)}/></div>
                  <div className="fg"><label className="flabel">Scenario Text</label><textarea className="finput" style={{minHeight:100}} placeholder="Describe the business scenario in detail…" value={qi.scenario||""} onChange={e=>updateQ(i,"scenario",e.target.value)}/></div>
                  <div className="fg">
                    <label className="flabel">Requirements</label>
                    {(qi.requirements||[]).map((req,ri)=>(
                      <div key={ri} style={{display:"flex",gap:6,marginBottom:5}}>
                        <input className="finput" placeholder={`Requirement ${ri+1}…`} value={req} onChange={e=>updateReq(i,ri,e.target.value)}/>
                        <button className="xbtn" onClick={()=>removeReq(i,ri)}>✕</button>
                      </div>
                    ))}
                    <button className="btn btn-ghost btn-sm" onClick={()=>addReq(i)}>+ Add Requirement</button>
                  </div>
                  <div className="fg"><label className="flabel">Hint (optional)</label><input className="finput" placeholder="Optional hint shown to students…" value={qi.hints||""} onChange={e=>updateQ(i,"hints",e.target.value)}/></div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    <div><label className="flabel">ER Points</label><input className="finput" type="number" min={0} max={100} value={qi.erPoints||5} onChange={e=>updateQ(i,"erPoints",Number(e.target.value)||5)}/></div>
                    <div><label className="flabel">SQL Points</label><input className="finput" type="number" min={0} max={100} value={qi.sqlPoints||5} onChange={e=>updateQ(i,"sqlPoints",Number(e.target.value)||5)}/></div>
                    <div><label className="flabel">Total</label><input className="finput" readOnly value={(qi.erPoints||5)+(qi.sqlPoints||5)} style={{color:T.muted}}/></div>
                  </div>
                </div>
              )}
            </div>
          ))}
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>addQ("mcq")}>+ Multiple Choice</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>addQ("sql")}>+ SQL Question</button>
            <button className="btn btn-teal btn-sm" onClick={()=>addQ("scenario")}>+ 🗂 Scenario (ER + SQL)</button>
          </div>
        </div>
        <div className="mftr">
          <button className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-purple btn-sm" onClick={saveQuiz} disabled={!newQuiz.title.trim()||!newQuiz.questions.some(q=>q.prompt?.trim()||q.scenario?.trim())}>💾 Save Quiz</button>
        </div>
      </div>
    </div>
  );
}

// ─── Marking Modal ────────────────────────────────────────────────────────────
function MarkingModal({markingQuiz,quizSubs,quizStudents,markScores,setMarkScores,markFeedback,setMarkFeedback,saveMarking,onClose}) {
  const {quizId,studentId}=markingQuiz;
  const sub=quizSubs[studentId]?.[quizId];
  const [quiz,setQuiz]=useState(null);
  const [markTab,setMarkTab]=useState({});
  const st=quizStudents.find(s=>s.id===studentId);
  useEffect(()=>{store.get(QUIZ_PFX+quizId,true).then(setQuiz);},[quizId]);
  if(!quiz||!sub) return <div className="overlay"><div className="modal"><div className="mbody"><div className="empty"><div className="empty-ico">⏳</div>Loading…</div></div></div></div>;
  const totalPts=quiz.questions.reduce((s,q)=>s+(q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):q.points),0);
  const currentTotal=quiz.questions.reduce((s,q,i)=>{
    if(q.type==="mcq"){const auto=sub.answers[i]===q.correct?q.points:0;return s+(markScores[`${i}_mcq`]!==undefined?Number(markScores[`${i}_mcq`]):auto);}
    if(q.type==="sql") return s+(markScores[`${i}_sql`]!==undefined?Number(markScores[`${i}_sql`]):0);
    if(q.type==="scenario") return s+(markScores[`${i}_er`]!==undefined?Number(markScores[`${i}_er`]):0)+(markScores[`${i}_sql`]!==undefined?Number(markScores[`${i}_sql`]):0);
    return s;
  },0);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-xl" onClick={e=>e.stopPropagation()} style={{maxHeight:"95vh"}}>
        <div className="mhdr">
          <span>✏️ Marking — <strong>{st?.name}</strong> · {quiz.title}</span>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:12,color:T.muted}}>Total: <strong style={{color:T.accent}}>{currentTotal}/{totalPts}</strong></span>
            <button className="xbtn" onClick={onClose}>✕</button>
          </div>
        </div>
        <div className="mbody" style={{maxHeight:"74vh"}}>
          {quiz.questions.map((qi,i)=>(
            <div key={i} className="mark-row">
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                  <div className="q-num">{i+1}</div>
                  <span style={{fontSize:12,fontWeight:700}}>{qi.prompt}</span>
                  <span className={`badge ${qi.type==="mcq"?"b-marked":qi.type==="sql"?"b-partial":"b-scenario"}`}>{qi.type==="mcq"?"MCQ":qi.type==="sql"?"SQL":"🗂 Scenario"}</span>
                </div>
                {qi.type==="mcq"&&(
                  <div>
                    <div style={{fontSize:11,color:T.muted,marginBottom:5}}>
                      Correct: <strong style={{color:T.green}}>{qi.options[qi.correct]}</strong>{" · "}
                      Student: <strong style={{color:sub.answers[i]===qi.correct?T.green:T.red}}>{sub.answers[i]!==undefined?qi.options[sub.answers[i]]:"No answer"}</strong>
                      <span className={`badge ${sub.answers[i]===qi.correct?"b-done":"b-err"}`} style={{marginLeft:7}}>{sub.answers[i]===qi.correct?"✓ Correct":"✗ Wrong"}</span>
                    </div>
                    <input className="feedback-input" placeholder="Feedback comment…" value={markFeedback[`${i}_mcq`]||""} onChange={e=>setMarkFeedback(p=>({...p,[`${i}_mcq`]:e.target.value}))}/>
                  </div>
                )}
                {qi.type==="sql"&&(
                  <div>
                    <div className="sub-code">{sub.answers[i]||<em style={{color:T.dim}}>No answer submitted</em>}</div>
                    <input className="feedback-input" placeholder="Feedback comment…" value={markFeedback[`${i}_sql`]||""} onChange={e=>setMarkFeedback(p=>({...p,[`${i}_sql`]:e.target.value}))}/>
                  </div>
                )}
                {qi.type==="scenario"&&(
                  <div>
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      {[["er","🗂 ER Diagram"],["sql","💻 SQL"]].map(([t,l])=>(
                        <button key={t} className={`btn btn-sm ${(markTab[i]||"er")===t?"btn-teal":"btn-ghost"}`} onClick={()=>setMarkTab(p=>({...p,[i]:t}))}>{l}</button>
                      ))}
                    </div>
                    {(markTab[i]||"er")==="er"&&(
                      <div>
                        <div style={{fontSize:10,color:T.muted,marginBottom:5}}>Student's ER Diagram</div>
                        <div style={{height:280,border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
                          {sub.answers[i]?.er?.entities?.length>0
                            ?<ERCanvas value={sub.answers[i]?.er||{}} onChange={()=>{}} readOnly={true}/>
                            :<div className="empty" style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}><div><div className="empty-ico">📭</div><div>No ER diagram submitted</div></div></div>}
                        </div>
                        <input className="feedback-input" placeholder="ER Diagram feedback…" value={markFeedback[`${i}_er`]||""} onChange={e=>setMarkFeedback(p=>({...p,[`${i}_er`]:e.target.value}))}/>
                      </div>
                    )}
                    {(markTab[i]||"er")==="sql"&&(
                      <div>
                        <div style={{fontSize:10,color:T.muted,marginBottom:5}}>Student's SQL</div>
                        <div className="sub-code">{sub.answers[i]?.sql||<em style={{color:T.dim}}>No SQL submitted</em>}</div>
                        <input className="feedback-input" placeholder="SQL feedback…" value={markFeedback[`${i}_sql`]||""} onChange={e=>setMarkFeedback(p=>({...p,[`${i}_sql`]:e.target.value}))}/>
                      </div>
                    )}
                  </div>
                )}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,paddingTop:2,flexShrink:0}}>
                {qi.type==="scenario"?(
                  <div style={{display:"flex",flexDirection:"column",gap:7,alignItems:"center"}}>
                    <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.teal,textTransform:"uppercase",marginBottom:3}}>ER</div><input className="score-input" type="number" min={0} max={qi.erPoints||5} value={markScores[`${i}_er`]!==undefined?markScores[`${i}_er`]:0} onChange={e=>setMarkScores(p=>({...p,[`${i}_er`]:e.target.value}))}/><div style={{fontSize:8,color:T.dim}}>/{qi.erPoints||5}</div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.orange,textTransform:"uppercase",marginBottom:3}}>SQL</div><input className="score-input" type="number" min={0} max={qi.sqlPoints||5} value={markScores[`${i}_sql`]!==undefined?markScores[`${i}_sql`]:0} onChange={e=>setMarkScores(p=>({...p,[`${i}_sql`]:e.target.value}))}/><div style={{fontSize:8,color:T.dim}}>/{qi.sqlPoints||5}</div></div>
                  </div>
                ):(
                  <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.muted,textTransform:"uppercase",marginBottom:3}}>Score</div><input className="score-input" type="number" min={0} max={qi.points} value={markScores[`${i}_${qi.type}`]!==undefined?markScores[`${i}_${qi.type}`]:(qi.type==="mcq"&&sub.answers[i]===qi.correct?qi.points:0)} onChange={e=>setMarkScores(p=>({...p,[`${i}_${qi.type}`]:e.target.value}))}/><div style={{fontSize:8,color:T.dim}}>/{qi.points}</div></div>
                )}
              </div>
            </div>
          ))}
        </div>
        <div className="mftr">
          <div style={{flex:1,display:"flex",alignItems:"center",gap:10}}>
            <span className="grade-pill" style={{background:gradeColor(pct(currentTotal,totalPts))+"22",color:gradeColor(pct(currentTotal,totalPts)),fontSize:13}}>{gradeLabel(pct(currentTotal,totalPts))} · {pct(currentTotal,totalPts)}%</span>
            <span style={{fontSize:11,color:T.muted}}>{currentTotal} / {totalPts} pts</span>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-purple btn-sm" onClick={saveMarking}>💾 Save Marks</button>
        </div>
      </div>
    </div>
  );
}

// ─── Student Quiz Taker ───────────────────────────────────────────────────────
function StudentQuizTaker({curQuiz,qReg,quizSubs,qAnswers,setQAnswers,selQIdx,setSelQIdx,submitQuiz,db,timerInfo}) {
  const sub=qReg?quizSubs[qReg.id]?.[curQuiz.id]:null;
  const isSubmitted=!!sub;
  const isExpired=timerInfo?.expired&&!isSubmitted;
  const qi=curQuiz.questions[selQIdx];
  const totalPts=curQuiz.questions.reduce((s,q)=>s+(q.type==="scenario"?(q.erPoints||5)+(q.sqlPoints||5):q.points),0);
  const allAnswered=curQuiz.questions.every((q,i)=>{
    if(q.type==="mcq") return qAnswers[i]!==undefined;
    if(q.type==="sql") return qAnswers[i]?.trim?.()?.length>0;
    if(q.type==="scenario") return qAnswers[i]?.sql?.trim?.()?.length>0||qAnswers[i]?.er?.entities?.length>0;
    return true;
  });

  // Auto-submit when timer expires
  useEffect(()=>{
    if(timerInfo?.expired&&!isSubmitted&&qReg) submitQuiz();
  },[timerInfo?.expired]);

  if(isExpired) return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{fontSize:44}}>🔒</div>
      <div style={{fontSize:18,fontWeight:800,color:T.red}}>Quiz Closed</div>
      <div style={{fontSize:12,color:T.muted}}>The timer has ended. Your answers have been auto-submitted.</div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {/* Timer bar */}
      {timerInfo&&!timerInfo.expired&&(
        <div className="timer-bar">
          <span style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:1}}>⏱ Time left</span>
          <span className={`timer-display ${timerInfo.urgent?"timer-urgent":timerInfo.warn?"timer-warn":"timer-ok"}`}>{timerInfo.label}</span>
          <div className="timer-prog">
            <div className="timer-prog-bar" style={{width:`${timerInfo.pctLeft}%`,background:timerInfo.urgent?T.red:timerInfo.warn?T.orange:T.green}}/>
          </div>
          <span style={{fontSize:9,color:T.muted}}>{timerInfo.pctLeft}%</span>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 210px",flex:1,overflow:"hidden"}}>
      <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"8px 14px",background:T.surface,borderBottom:`1px solid ${T.border}`,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:9,color:T.muted,marginRight:4,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Q:</span>
          {curQuiz.questions.map((q,i)=>{
            const hasAns=q.type==="mcq"?(isSubmitted?sub.answers[i]!==undefined:qAnswers[i]!==undefined):q.type==="scenario"?(qAnswers[i]?.sql?.trim?.()?.length>0||qAnswers[i]?.er?.entities?.length>0):(isSubmitted?sub.answers[i]?.trim?.()?.length>0:qAnswers[i]?.trim?.()?.length>0);
            const icon=q.type==="scenario"?"🗂":q.type==="sql"?"💻":"";
            return <div key={i} className={`mq-pip ${hasAns?"pip-done":i===selQIdx?"pip-active":"pip-pend"}`} onClick={()=>setSelQIdx(i)} title={q.type}>{icon||i+1}</div>;
          })}
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {qi?.type==="mcq"&&(
            <div style={{flex:1,overflow:"auto",padding:"14px 16px"}}>
              <div style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:9,padding:"13px 15px",marginBottom:13}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:T.muted,marginBottom:5}}>Q{selQIdx+1} · Multiple Choice · {qi.points}pt{qi.points!==1?"s":""}</div>
                <div style={{fontSize:14,fontWeight:600,lineHeight:1.6}}>{qi.prompt}</div>
                {isSubmitted&&sub?.feedback?.[`${selQIdx}_mcq`]&&<div style={{marginTop:9,padding:"7px 10px",background:T.surface,borderRadius:6,border:`1px solid ${T.purple}44`,fontSize:11,color:T.purple}}>💬 {sub.feedback[`${selQIdx}_mcq`]}</div>}
              </div>
              {qi.options.map((opt,oi)=>{
                const myAns=isSubmitted?sub.answers[selQIdx]:qAnswers[selQIdx];
                let cls="opt-btn";
                if(isSubmitted){if(oi===qi.correct)cls+=" correct";else if(oi===myAns&&oi!==qi.correct)cls+=" wrong";}
                else if(myAns===oi)cls+=" selected";
                return (
                  <button key={oi} className={cls} onClick={()=>!isSubmitted&&setQAnswers(p=>({...p,[selQIdx]:oi}))}>
                    <div className="opt-letter" style={{background:(!isSubmitted&&myAns===oi)?T.accent:T.border,color:(!isSubmitted&&myAns===oi)?T.bg:T.muted}}>{String.fromCharCode(65+oi)}</div>
                    <span style={{flex:1}}>{opt}</span>
                    {isSubmitted&&oi===qi.correct&&<span style={{color:T.green}}>✓</span>}
                  </button>
                );
              })}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:14,gap:8}}>
                <button className="btn btn-ghost btn-sm" disabled={selQIdx===0} onClick={()=>setSelQIdx(i=>i-1)}>← Prev</button>
                {selQIdx<curQuiz.questions.length-1?<button className="btn btn-run btn-sm" onClick={()=>setSelQIdx(i=>i+1)}>Next →</button>
                  :!isSubmitted&&<button className="btn btn-green btn-sm" disabled={!allAnswered} onClick={submitQuiz}>Submit Quiz ✓</button>}
              </div>
            </div>
          )}
          {qi?.type==="sql"&&(
            <div style={{flex:1,overflow:"auto",padding:"14px 16px"}}>
              <div style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:9,padding:"13px 15px",marginBottom:13}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:T.muted,marginBottom:5}}>Q{selQIdx+1} · SQL Query · {qi.points}pt{qi.points!==1?"s":""}</div>
                <div style={{fontSize:14,fontWeight:600,lineHeight:1.6}}>{qi.prompt}</div>
                {isSubmitted&&sub?.feedback?.[`${selQIdx}_sql`]&&<div style={{marginTop:9,padding:"7px 10px",background:T.surface,borderRadius:6,border:`1px solid ${T.purple}44`,fontSize:11,color:T.purple}}>💬 {sub.feedback[`${selQIdx}_sql`]}</div>}
              </div>
              {isSubmitted?<div className="sub-code">{sub.answers[selQIdx]||<em style={{color:T.dim}}>No answer</em>}</div>
                :<textarea className="finput" style={{minHeight:130}} placeholder="Write your SQL here…" value={qAnswers[selQIdx]||""} onChange={e=>setQAnswers(p=>({...p,[selQIdx]:e.target.value}))}/>}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:13,gap:8}}>
                <button className="btn btn-ghost btn-sm" disabled={selQIdx===0} onClick={()=>setSelQIdx(i=>i-1)}>← Prev</button>
                {selQIdx<curQuiz.questions.length-1?<button className="btn btn-run btn-sm" onClick={()=>setSelQIdx(i=>i+1)}>Next →</button>
                  :!isSubmitted&&<button className="btn btn-green btn-sm" disabled={!allAnswered} onClick={submitQuiz}>Submit Quiz ✓</button>}
              </div>
            </div>
          )}
          {qi?.type==="scenario"&&(
            <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
              <div style={{flex:1,overflow:"hidden"}}><ScenarioAnswer key={selQIdx} qi={qi} answer={isSubmitted?sub.answers[selQIdx]:(qAnswers[selQIdx]||{})} onChange={val=>!isSubmitted&&setQAnswers(p=>({...p,[selQIdx]:val}))} readOnly={isSubmitted} db={db}/></div>
              {!isSubmitted&&(
                <div style={{padding:"8px 14px",background:T.surface,borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",flexShrink:0}}>
                  <button className="btn btn-ghost btn-sm" disabled={selQIdx===0} onClick={()=>setSelQIdx(i=>i-1)}>← Prev</button>
                  {selQIdx<curQuiz.questions.length-1?<button className="btn btn-run btn-sm" onClick={()=>setSelQIdx(i=>i+1)}>Next →</button>
                    :<button className="btn btn-green btn-sm" disabled={!allAnswered} onClick={submitQuiz}>Submit Quiz ✓</button>}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
      <div className="rpanel">
        <div style={{padding:"11px 11px 8px",borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontSize:12,fontWeight:700}}>{curQuiz.title}</div>
          {curQuiz.description&&<div style={{fontSize:9,color:T.muted,marginTop:2}}>{curQuiz.description}</div>}
        </div>
        <div className="pcontent">
          {isSubmitted&&(
            <div style={{marginBottom:13,padding:"11px 12px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:8}}>
              {sub.marked?(
                <>
                  <div style={{fontSize:9,color:T.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Your Score</div>
                  <div className="score-big" style={{color:gradeColor(pct(sub.totalScore,totalPts))}}>{sub.totalScore}</div>
                  <div style={{fontSize:10,color:T.muted}}>/ {totalPts} pts</div>
                  <div style={{marginTop:6}}><span className="grade-pill" style={{background:gradeColor(pct(sub.totalScore,totalPts))+"22",color:gradeColor(pct(sub.totalScore,totalPts))}}>{gradeLabel(pct(sub.totalScore,totalPts))} · {pct(sub.totalScore,totalPts)}%</span></div>
                </>
              ):(
                <div style={{textAlign:"center",padding:"5px 0"}}>
                  <div style={{fontSize:20,marginBottom:4}}>✅</div>
                  <div style={{fontSize:12,fontWeight:700}}>Submitted!</div>
                  <div style={{fontSize:10,color:T.muted,marginTop:2}}>Awaiting teacher review</div>
                </div>
              )}
            </div>
          )}
          {curQuiz.questions.map((q,i)=>{
            const hasAns=isSubmitted?true:q.type==="mcq"?qAnswers[i]!==undefined:q.type==="scenario"?(qAnswers[i]?.sql?.trim?.()?.length>0||qAnswers[i]?.er?.entities?.length>0):qAnswers[i]?.trim?.()?.length>0;
            const icon=q.type==="scenario"?"🗂":q.type==="sql"?"💻":"●";
            return (
              <div key={i} onClick={()=>setSelQIdx(i)} style={{padding:"6px 8px",borderRadius:6,background:i===selQIdx?T.accentGlow:"transparent",border:`1px solid ${i===selQIdx?T.borderHi:"transparent"}`,cursor:"pointer",marginBottom:3}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div className="q-num" style={{width:18,height:18,fontSize:9,background:hasAns?T.green:T.dim}}>{i+1}</div>
                  <span style={{fontSize:9,marginRight:2}}>{icon}</span>
                  <span style={{fontSize:10,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(q.prompt||q.scenario||"").slice(0,24)}…</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
    </div>
  );
}

// ─── Rewards & Badges System ─────────────────────────────────────────────────
const BADGES = [
  {id:"first_blood",  emoji:"🩸", name:"First Points",    desc:"Earn your first point",           check:p=>p.total>=1},
  {id:"ten",          emoji:"⭐", name:"10 Points",        desc:"Reach 10 total points",            check:p=>p.total>=10},
  {id:"fifty",        emoji:"🌟", name:"50 Points",        desc:"Reach 50 total points",            check:p=>p.total>=50},
  {id:"century",      emoji:"💯", name:"Century",          desc:"Reach 100 total points",           check:p=>p.total>=100},
  {id:"legend",       emoji:"👑", name:"Legend",           desc:"Reach 500 total points",           check:p=>p.total>=500},
  {id:"quiz_ace",     emoji:"🎯", name:"Quiz Ace",         desc:"Get reward pts from a quiz",       check:p=>(p.log||[]).some(l=>l.source==="quiz")},
  {id:"hat_trick",    emoji:"🎩", name:"Hat Trick",        desc:"3 quiz reward entries",            check:p=>(p.log||[]).filter(l=>l.source==="quiz").length>=3},
  {id:"team_player",  emoji:"🤝", name:"Team Player",      desc:"Earn whiteboard participation pts",check:p=>(p.log||[]).some(l=>l.source==="manual"&&(l.reason||"").toLowerCase().includes("whiteboard"))},
  {id:"on_a_roll",    emoji:"🔥", name:"On a Roll",        desc:"5 reward log entries",             check:p=>(p.log||[]).length>=5},
  {id:"overachiever", emoji:"🚀", name:"Overachiever",     desc:"10 reward log entries",            check:p=>(p.log||[]).length>=10},
  {id:"gifted",       emoji:"🎁", name:"Gifted",           desc:"Receive a manual bonus",           check:p=>(p.log||[]).some(l=>l.source==="manual")},
  {id:"consistent",   emoji:"📅", name:"Consistent",       desc:"Entries on 3 different days",      check:p=>{const days=new Set((p.log||[]).map(l=>new Date(l.at).toDateString()));return days.size>=3;}},
];

function earnedBadges(profile) {
  if(!profile) return [];
  const safe = {total:0, log:[], ...profile};
  return BADGES.filter(b=>{ try{return b.check(safe);}catch{return false;} }).map(b=>b.id);
}

// BadgeGrid — defined at module level (not inside RewardsView) to avoid Babel nested-component issues
function BadgeGrid({profile}) {
  const earned = earnedBadges(profile);
  return (
    <div className="badge-grid">
      {BADGES.map(b=>{
        const has = earned.includes(b.id);
        return (
          <div key={b.id} className={"badge-card"+(has?" earned":"")}>
            <span className="badge-ico">{b.emoji}</span>
            <div className="badge-name">{b.name}</div>
            <div className="badge-desc">{b.desc}</div>
            {has&&<div style={{marginTop:6,fontSize:9,color:"#ffd700",fontWeight:700}}>✓ Earned</div>}
          </div>
        );
      })}
    </div>
  );
}

// Give points helper (shared storage)
function givePoints(studentId, studentName, pts, reason, source="manual") {
  const all = LS.get("__shared__"+POINTS_KEY) || {};
  const prev = all[studentId] || {name:studentName, total:0, log:[]};
  const entry = {pts, reason, source, at:new Date().toISOString()};
  const updated = {...prev, name:studentName, total:(prev.total||0)+pts, log:[entry,...(prev.log||[])]};
  all[studentId] = updated;
  LS.set("__shared__"+POINTS_KEY, all);
  return updated;
}

// ─── Rewards View Component ───────────────────────────────────────────────────
function RewardsView({curSess, isTeacher, quizStudents, classes}) {
  const [tab, setTab]           = useState("leaderboard");
  const [allPoints, setAllPoints] = useState({});
  const [manualStudent, setManualStudent] = useState("");
  const [manualPts, setManualPts]         = useState(5);
  const [manualReason, setManualReason]   = useState("");
  const [quizRpts, setQuizRpts]           = useState({});
  const [quizList, setQuizList]           = useState([]);
  const [selQuizId, setSelQuizId]         = useState(null);
  const [selClassFilter, setSelClassFilter] = useState(null); // teacher class filter for leaderboard
  const pollRef = useRef(null);

  useEffect(()=>{
    load();
    pollRef.current = setInterval(load, 3000);
    return ()=>clearInterval(pollRef.current);
  },[]);

  // Set class filter strictly from session — never guess for students
  useEffect(()=>{
    if(!curSess) return;
    if(isTeacher && classes.length>0 && !selClassFilter) setSelClassFilter(classes[0].id);
    if(!isTeacher) setSelClassFilter(curSess.classId||null);
  },[curSess ? curSess.id : null, curSess ? curSess.classId : null, isTeacher]);

  async function load() {
    const pts = LS.get("__shared__"+POINTS_KEY)||{};
    setAllPoints(prev=>JSON.stringify(prev)===JSON.stringify(pts)?prev:pts);
    const rpts = LS.get("__shared__"+QUIZ_RPTS_KEY)||{};
    setQuizRpts(prev=>JSON.stringify(prev)===JSON.stringify(rpts)?prev:rpts);
    const ql = LS.get("__shared__"+QUIZZES_KEY)||[];
    setQuizList(ql);
    if(!selQuizId && ql.length>0) setSelQuizId(ql[0].id);
  }

  // Get all sessions to know which students belong to which class
  const allSessions = LS.get(SESSIONS_KEY)||[];

  // Build set of student IDs in the selected class
  function studentIdsInClass(classId) {
    if(!classId) return null; // null = all
    // Sessions with classId, plus quizStudents with classId
    const fromSessions = allSessions.filter(s=>s.classId===classId&&s.role==="student").map(s=>s.id);
    const fromQStudents = quizStudents.filter(s=>s.classId===classId).map(s=>s.id);
    return new Set([...fromSessions, ...fromQStudents]);
  }

  // Leaderboard: filtered by class, sorted by total pts
  const classStudentIds = selClassFilter ? studentIdsInClass(selClassFilter) : null;
  const leaderboard = Object.entries(allPoints)
    .map(([id,p])=>({id,...p}))
    .filter(e=> !classStudentIds || classStudentIds.has(e.id))
    .sort((a,b)=>(b.total||0)-(a.total||0));

  // Students list for give-points: filtered by selected class
  const filteredStudents = selClassFilter
    ? quizStudents.filter(s=>s.classId===selClassFilter)
    : quizStudents;

  const myProfile = curSess ? (allPoints[curSess.id]||{name:curSess.name,total:0,log:[]}) : null;
  const myBadges  = earnedBadges(myProfile);
  const myRank    = leaderboard.findIndex(r=>r.id===curSess?.id)+1;

  function handleGivePoints(e) {
    e.preventDefault();
    if(!manualStudent||!manualPts) return;
    // Look up in sessions too (not just quizStudents)
    const fromQ = quizStudents.find(s=>s.id===manualStudent);
    const fromS = allSessions.find(s=>s.id===manualStudent);
    const stu = fromQ||fromS||{id:manualStudent,name:manualStudent};
    givePoints(stu.id, stu.name, Number(manualPts), manualReason||"Manual bonus", "manual");
    load();
    setManualReason("");
  }

  function setQuizRewardPts(quizId, qIdx, pts) {
    const all = LS.get("__shared__"+QUIZ_RPTS_KEY)||{};
    if(!all[quizId]) all[quizId]={};
    all[quizId][qIdx] = Number(pts)||0;
    LS.set("__shared__"+QUIZ_RPTS_KEY, all);
    setQuizRpts({...all});
  }

  const selQuiz = quizList.find(q=>q.id===selQuizId);
  const selClassObj = classes.find(c=>c.id===selClassFilter);

  return (
    <div className="rw-wrap">
      {/* Sidebar nav */}
      <div className="rw-sidebar">
        <div className="rw-sb-hdr">Rewards</div>
        {[
          ["leaderboard","🏆 Leaderboard"],
          ["badges","🎖️ Badges"],
          ...(isTeacher?[["give","🎁 Give Points"],["quiz_pts","📝 Quiz Rewards"]]:[["mypoints","⭐ My Points"]]),
        ].map(([id,label])=>(
          <div key={id} className={"rw-sb-item"+(tab===id?" active":"")} onClick={()=>setTab(id)}>{label}</div>
        ))}
      </div>

      <div className="rw-main">

        {/* ── Leaderboard ── */}
        {tab==="leaderboard"&&(
          <div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>🏆 Leaderboard</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#5a7a94"}}>Class:</span>
              {isTeacher&&<div onClick={()=>setSelClassFilter(null)} style={{padding:"4px 12px",borderRadius:99,border:`1px solid ${!selClassFilter?"#4fc3f7":"#1e2d3d"}`,background:!selClassFilter?"#0d1e2e":"transparent",cursor:"pointer",fontSize:11,fontWeight:700,color:!selClassFilter?"#4fc3f7":"#5a7a94"}}>All</div>}
              {classes.map(c=>(
                <div key={c.id} onClick={()=>setSelClassFilter(c.id)} style={{padding:"4px 12px",borderRadius:99,border:`1px solid ${selClassFilter===c.id?c.color:"#1e2d3d"}`,background:selClassFilter===c.id?c.color+"22":"transparent",cursor:"pointer",fontSize:11,fontWeight:700,color:selClassFilter===c.id?c.color:"#5a7a94",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:7,height:7,borderRadius:"50%",background:c.color,display:"inline-block"}}/>
                  {c.name}
                </div>
              ))}
              <span style={{fontSize:10,color:"#2d4a66",marginLeft:4}}>• updates every 3s</span>
            </div>
            {leaderboard.length===0&&<div style={{color:"#2d4a66",fontSize:13,textAlign:"center",padding:"40px 0"}}>No points awarded yet — be the first! 🚀</div>}
            {leaderboard.map((entry,i)=>{
              const rank=i+1;
              const isMe=entry.id===curSess?.id;
              const badges=earnedBadges(entry);
              const rankCls=rank===1?"top1":rank===2?"top2":rank===3?"top3":"";
              return (
                <div key={entry.id} className={"lb-row"+(isMe?" me":"")}>
                  <div className={"lb-rank "+rankCls}>
                    {rank<=3?["🥇","🥈","🥉"][rank-1]:rank}
                  </div>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#d6e4f0"}}>{entry.name}{isMe&&<span style={{marginLeft:6,fontSize:9,color:"#4fc3f7",background:"#0d1e2e",padding:"1px 6px",borderRadius:99,fontWeight:700}}>YOU</span>}</div>
                    <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>
                      {badges.slice(0,6).map(bid=>{
                        const b=BADGES.find(x=>x.id===bid);
                        return b?<span key={bid} title={b.name} style={{fontSize:14}}>{b.emoji}</span>:null;
                      })}
                      {badges.length>6&&<span style={{fontSize:10,color:"#5a7a94"}}>+{badges.length-6}</span>}
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#5a7a94",textAlign:"right",paddingRight:4}}>
                    {(entry.log||[]).length} entries
                  </div>
                  <div className="lb-pts">{entry.total||0}<span style={{fontSize:10,color:"#5a7a94",fontWeight:400,marginLeft:2}}>pts</span></div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── Badges ── */}
        {tab==="badges"&&(
          <div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>🎖️ Badges</div>
            {isTeacher?(
              <div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#5a7a94"}}>Class:</span>
                  <div onClick={()=>setSelClassFilter(null)} style={{padding:"3px 10px",borderRadius:99,border:`1px solid ${!selClassFilter?"#4fc3f7":"#1e2d3d"}`,background:!selClassFilter?"#0d1e2e":"transparent",cursor:"pointer",fontSize:11,fontWeight:700,color:!selClassFilter?"#4fc3f7":"#5a7a94"}}>All</div>
                  {classes.map(c=>(
                    <div key={c.id} onClick={()=>setSelClassFilter(c.id)} style={{padding:"3px 10px",borderRadius:99,border:`1px solid ${selClassFilter===c.id?c.color:"#1e2d3d"}`,background:selClassFilter===c.id?c.color+"22":"transparent",cursor:"pointer",fontSize:11,fontWeight:700,color:selClassFilter===c.id?c.color:"#5a7a94",display:"flex",alignItems:"center",gap:4}}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:c.color,display:"inline-block"}}/>{c.name}
                    </div>
                  ))}
                </div>
                {leaderboard.length===0&&<div style={{color:"#2d4a66",fontSize:13}}>No students have points yet{selClassFilter?" for this class":""}</div>}
                {leaderboard.map(entry=>(
                  <div key={entry.id} className="rw-card" style={{marginBottom:12}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                      {entry.name}
                      <span style={{fontSize:11,color:"#4fc3f7"}}>{entry.total} pts</span>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {BADGES.map(b=>{
                        const has=earnedBadges(entry).includes(b.id);
                        return <span key={b.id} title={b.name+(has?" ✓":"")} style={{fontSize:22,opacity:has?1:.18,filter:has?"none":"grayscale(1)"}}>{b.emoji}</span>;
                      })}
                    </div>
                  </div>
                ))}
              </div>
            ):(
              <div>
                <div style={{fontSize:12,color:"#5a7a94",marginBottom:20}}>
                  {myBadges.length}/{BADGES.length} badges earned
                  {myRank>0&&<span style={{marginLeft:12}}>Your rank: <strong style={{color:"#4fc3f7"}}>#{myRank}</strong></span>}
                </div>
                <BadgeGrid profile={myProfile}/>
              </div>
            )}
          </div>
        )}

        {/* ── My Points (student) ── */}
        {tab==="mypoints"&&myProfile&&(
          <div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>⭐ My Points</div>
            <div style={{margin:"16px 0 24px"}}>
              <div className="rw-total-badge">⭐ {myProfile.total||0} <span style={{fontSize:13,fontWeight:400,color:"#8baab8"}}>total points</span></div>
              {myRank>0&&<div style={{marginTop:10,fontSize:12,color:"#5a7a94"}}>Rank <strong style={{color:"#4fc3f7"}}>#{myRank}</strong> of {leaderboard.length}</div>}
            </div>
            <div className="rw-section-hdr">Points History</div>
            {(myProfile.log||[]).length===0&&<div style={{color:"#2d4a66",fontSize:13}}>No points yet — answer quiz questions and participate!</div>}
            {(myProfile.log||[]).map((l,i)=>(
              <div key={i} className="pts-log">
                <span className="pts-reason">{l.reason}</span>
                <span className="pts-time">{new Date(l.at).toLocaleDateString()} {new Date(l.at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
                <span className="pts-amt">+{l.pts}</span>
              </div>
            ))}
          </div>
        )}

        {/* ── Give Points (teacher) ── */}
        {tab==="give"&&isTeacher&&(
          <div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>🎁 Give Points</div>
            <div style={{fontSize:12,color:"#5a7a94",marginBottom:20}}>Award manual bonus points to any student</div>

            <div className="rw-card">
              <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:"#d6e4f0"}}>Award Points</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {isTeacher&&classes.length>0&&(
                  <div>
                    <label className="flabel">Filter by Class</label>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <div onClick={()=>setSelClassFilter(null)} style={{padding:"4px 12px",borderRadius:99,border:`1px solid ${!selClassFilter?"#4fc3f7":"#1e2d3d"}`,background:!selClassFilter?"#0d1e2e":"transparent",cursor:"pointer",fontSize:11,fontWeight:700,color:!selClassFilter?"#4fc3f7":"#5a7a94"}}>All</div>
                      {classes.map(c=>(
                        <div key={c.id} onClick={()=>{setSelClassFilter(c.id);setManualStudent("");}} style={{padding:"4px 12px",borderRadius:99,border:`1px solid ${selClassFilter===c.id?c.color:"#1e2d3d"}`,background:selClassFilter===c.id?c.color+"22":"transparent",cursor:"pointer",fontSize:11,fontWeight:700,color:selClassFilter===c.id?c.color:"#5a7a94",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{width:7,height:7,borderRadius:"50%",background:c.color,display:"inline-block"}}/>{c.name}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div>
                  <label className="flabel">Student{selClassObj?<span style={{color:selClassObj.color,marginLeft:4}}>({selClassObj.name})</span>:null}</label>
                  <select className="finput" value={manualStudent} onChange={e=>setManualStudent(e.target.value)}>
                    <option value="">— Select student —</option>
                    {(selClassFilter?filteredStudents:quizStudents).map(s=>(
                      <option key={s.id} value={s.id}>{s.name}</option>
                    ))}
                    {/* Also include session-based students in the class */}
                    {(selClassFilter?allSessions.filter(s=>s.classId===selClassFilter&&s.role==="student"&&!quizStudents.find(q=>q.id===s.id)):[]).map(s=>(
                      <option key={s.id} value={s.id}>{s.name} (session)</option>
                    ))}
                  </select>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 120px",gap:10}}>
                  <div>
                    <label className="flabel">Reason</label>
                    <input className="finput" placeholder="e.g. Great whiteboard participation" value={manualReason} onChange={e=>setManualReason(e.target.value)}/>
                  </div>
                  <div>
                    <label className="flabel">Points</label>
                    <input className="finput" type="number" min={1} max={500} value={manualPts} onChange={e=>setManualPts(e.target.value)}/>
                  </div>
                </div>
                <button className="btn btn-purple" onClick={handleGivePoints} disabled={!manualStudent||!manualPts} style={{alignSelf:"flex-start"}}>🎁 Give Points</button>

              {quizList.map(q=>(
                <div key={q.id} className={"wb-cls-btn"} style={{borderColor:selQuizId===q.id?"#c792ea":"#1e2d3d",background:selQuizId===q.id?"#c792ea22":"transparent",color:selQuizId===q.id?"#c792ea":"#5a7a94",cursor:"pointer",padding:"5px 13px",borderRadius:16,border:"1px solid",fontSize:11,fontWeight:700}}
                  onClick={()=>setSelQuizId(q.id)}>
                  📝 {q.title}
                </div>
              ))}
            </div>

            {selQuiz&&(()=>{
              const qRptsForQuiz = quizRpts[selQuizId]||{};
              const fullQuiz = LS.get("__shared__"+QUIZ_PFX+selQuizId);
              if(!fullQuiz) return <div style={{color:"#5a7a94",fontSize:12}}>Loading quiz…</div>;
              return (
                <div className="rw-card">
                  <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>{selQuiz.title}</div>
                  <div style={{fontSize:11,color:"#5a7a94",marginBottom:12}}>Set reward points per question (separate from quiz score — these go on the leaderboard)</div>
                  {fullQuiz.questions.map((q,i)=>{
                    const typeLabel=q.type==="mcq"?"MCQ":q.type==="sql"?"SQL":"Scenario";
                    return (
                      <div key={i} className="quiz-rpts-row">
                        <div className={"q-num"} style={{flexShrink:0}}>{i+1}</div>
                        <span className={"tag qt-"+q.type} style={{flexShrink:0}}>{typeLabel}</span>
                        <span style={{flex:1,color:"#8baab8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(q.prompt||q.scenario||"").slice(0,70)}</span>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                          <span style={{fontSize:10,color:"#5a7a94"}}>Reward pts:</span>
                          <input className="finput" type="number" min={0} max={100} style={{width:64,padding:"3px 8px",fontSize:11}}
                            value={qRptsForQuiz[i]!==undefined?qRptsForQuiz[i]:0}
                            onChange={e=>setQuizRewardPts(selQuizId,i,e.target.value)}/>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{marginTop:12,fontSize:11,color:"#43d98c"}}>
                    ✓ Total reward pts for this quiz: <strong>{Object.values(qRptsForQuiz).reduce((s,v)=>s+(Number(v)||0),0)}</strong>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

      </div>
    </div>
  );
}
