<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Storage ──────────────────────────────────────────────────────────────────
// Local  (per-device): localStorage — sessions, current session ID, DB binaries
// Shared (cross-device): Firebase Realtime Database under /{roomCode}/
//
// roomCode is set by teacher on first launch and shared with students.
// All sh=true reads/writes go through Firebase; sh=false stays in localStorage.

const LS = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
};

// ── Firebase helpers ─────────────────────────────────────────────────────────
let _fbConfig = null;   // { apiKey, databaseURL, roomCode }
let _fbReady = false;
let _fbDB = null;       // firebase.database() instance
const _fbListeners = {}; // key → { ref, callback }

function fbPath(k) {
  // Convert key to a safe Firebase path segment (no . # $ [ ])
  const room = _fbConfig?.roomCode || "default";
  return room + "/" + k.replace(/[.#$[\]]/g, "_");
}

async function fbGet(k) {
  if (!_fbReady || !_fbDB) return null;
  try {
    const snap = await _fbDB.ref(fbPath(k)).once("value");
    return snap.val();
  } catch { return null; }
}

async function fbSet(k, v) {
  if (!_fbReady || !_fbDB) return;
  try { await _fbDB.ref(fbPath(k)).set(v); } catch {}
}

async function fbDel(k) {
  if (!_fbReady || !_fbDB) return;
  try { await _fbDB.ref(fbPath(k)).remove(); } catch {}
}

// Subscribe to real-time updates for a key; callback(value) fires on change
function fbSubscribe(k, callback) {
  if (!_fbReady || !_fbDB) return;
  const path = fbPath(k);
  if (_fbListeners[k]) {
    try { _fbDB.ref(_fbListeners[k].path).off("value", _fbListeners[k].fn); } catch {}
  }
  const fn = snap => callback(snap.val());
  _fbDB.ref(path).on("value", fn);
  _fbListeners[k] = { path, fn };
}

function fbUnsubscribe(k) {
  if (_fbListeners[k] && _fbDB) {
    try { _fbDB.ref(_fbListeners[k].path).off("value", _fbListeners[k].fn); } catch {}
    delete _fbListeners[k];
  }
}

async function initFirebase(config) {
  // config = { apiKey, databaseURL, roomCode }
  if (!config?.apiKey || !config?.databaseURL) return false;
  try {
    if (typeof firebase === "undefined") {
      await new Promise((res, rej) => {
        const s1 = document.createElement("script");
        s1.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";
        s1.onload = res; s1.onerror = rej;
        document.head.appendChild(s1);
      });
      await new Promise((res, rej) => {
        const s2 = document.createElement("script");
        s2.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";
        s2.onload = res; s2.onerror = rej;
        document.head.appendChild(s2);
      });
    }
    if (!firebase.apps?.length) {
      firebase.initializeApp({ apiKey: config.apiKey, databaseURL: config.databaseURL });
    }
    _fbDB = firebase.database();
    _fbConfig = config;
    _fbReady = true;
    // Persist config locally so page reloads reconnect automatically
    LS.set("qc:fbconfig", config);
    return true;
  } catch(e) {
    console.error("Firebase init failed:", e);
    return false;
  }
}

// Try to restore saved Firebase config on page load
async function tryRestoreFirebase() {
  const saved = LS.get("qc:fbconfig");
  if (saved?.apiKey && saved?.databaseURL) return initFirebase(saved);
  return false;
}

// ── Unified async store ───────────────────────────────────────────────────────
// sh=false → localStorage only
// sh=true  → Firebase (falls back to localStorage cache if offline)
const store = {
  get: async (k, sh=false) => {
    if (!sh) return LS.get(k);
    if (_fbReady) {
      const v = await fbGet(k);
      if (v !== null && v !== undefined) { LS.set("__cache__"+k, v); return v; }
    }
    return LS.get("__cache__"+k);  // offline fallback
  },
  set: async (k, v, sh=false) => {
    if (!sh) { LS.set(k, v); return; }
    LS.set("__cache__"+k, v);  // always update local cache
    if (_fbReady) await fbSet(k, v);
  },
  del: async (k, sh=false) => {
    if (!sh) { LS.del(k); return; }
    LS.del("__cache__"+k);
    if (_fbReady) await fbDel(k);
  },
};

// ── Sync LS.get/set("__shared__"...) calls through Firebase too ──────────────
// Many internal functions call LS directly with "__shared__" prefix.
// We keep a local cache (__cache__key) that store.set always updates,
// and patch LS to read from cache for __shared__ keys.
const _origLSget = LS.get.bind(LS);
const _origLSset = LS.set.bind(LS);
const _origLSdel = LS.del.bind(LS);
LS.get = (k) => {
  if (k.startsWith("__shared__")) {
    const bare = k.slice("__shared__".length);
    // Return from local cache (kept fresh by store.set + real-time subscriptions)
    const cached = _origLSget("__cache__"+bare);
    return cached;
  }
  return _origLSget(k);
};
LS.set = (k, v) => {
  if (k.startsWith("__shared__")) {
    const bare = k.slice("__shared__".length);
    _origLSset("__cache__"+bare, v);
    // Fire-and-forget to Firebase
    if (_fbReady) fbSet(bare, v).catch(()=>{});
    return;
  }
  _origLSset(k, v);
};
LS.del = (k) => {
  if (k.startsWith("__shared__")) {
    const bare = k.slice("__shared__".length);
    _origLSdel("__cache__"+bare);
    if (_fbReady) fbDel(bare).catch(()=>{});
    return;
  }
  _origLSdel(k);
};

// Subscribe to all shared keys and keep local cache fresh in real-time
const SHARED_SUBSCRIBE_KEYS = [
  "mysqlide:classes","mysqlide:students","mysqlide:teacher",
  "mysqlide:quizzes","mysqlide:qstudents","mysqlide:points","mysqlide:qrpts",
  "mysqlide:marathon","mysqlide:mstudents","mysqlide:shared-db",
  // Whiteboard keys for both class groups (a and b are the permanent group IDs)
  "mysqlide:wb:a","mysqlide:wb:b",
  "mysqlide:wbn:a","mysqlide:wbn:b",
  "mysqlide:wb:shared","mysqlide:wbn:shared",
  // Quiz submissions by student (dynamic — subscribed when student logs in)
];
function subscribeSharedKeys(extraKeys=[]) {
  const keys = [...SHARED_SUBSCRIBE_KEYS, ...extraKeys];
  keys.forEach(k => {
    fbSubscribe(k, val => {
      if (val !== null && val !== undefined) _origLSset("__cache__"+k, val);
    });
  });
}


// ─── Storage keys ─────────────────────────────────────────────────────────────
const DB_PFX        = "mysqlide:db:";
const SHARED_DB_KEY = "mysqlide:shared-db";  // teacher's tables shared with all students
const SESSIONS_KEY  = "mysqlide:sessions";
const STUDENTS_KEY  = "mysqlide:students";   // shared: [{id,name,passHash,classId,color,created}]
const TEACHER_KEY   = "mysqlide:teacher";    // shared: {passHash} — set on first teacher login
const CURRENT_KEY   = "mysqlide:current";
const MARATHON_KEY  = "mysqlide:marathon";
const M_PROG_PFX    = "mysqlide:mprog:";
const M_STUDENTS    = "mysqlide:mstudents";
const QUIZZES_KEY   = "mysqlide:quizzes";
const QUIZ_PFX      = "mysqlide:quiz:";
const QSUB_PFX      = "mysqlide:qsub:";
const QSTUDENTS_KEY = "mysqlide:qstudents";
const CLASSES_KEY   = "mysqlide:classes";  // kept for migration
const CLASS_GROUPS_KEY = "mysqlide:classgroups"; // {a:{id:"a",name,code}, b:{id:"b",name,code}}
const WB_PFX        = "mysqlide:wb:";      // WB_PFX+classId → whiteboard state
const WB_NOTES_PFX  = "mysqlide:wbn:";    // WB_NOTES_PFX+classId → array of sticky notes
const POINTS_KEY    = "mysqlide:points";   // shared → { studentId: { name, total, log:[{pts,reason,at}] } }
const QUIZ_RPTS_KEY = "mysqlide:qrpts";    // shared → { quizId: { qIdx: rewardPts } }

// ─── MySQL → SQLite Transpiler ─────────────────────────────────────────────
// Intercepts MySQL shell commands and syntax, translates to SQLite equivalents.
// Supports: SHOW, DESCRIBE/DESC, USE, DROP DATABASE, CREATE DATABASE,
//   AUTO_INCREMENT, ENGINE=, CHARSET=, UNSIGNED, backtick identifiers,
//   IF NOT EXISTS / IF EXISTS, TRUNCATE TABLE, INSERT IGNORE,
//   SHOW CREATE TABLE, EXPLAIN, CALL (stub), SET (stub),
//   multi-line comments, -- comments, MySQL string functions (aliases),
//   LIMIT x OFFSET y, ON UPDATE CURRENT_TIMESTAMP (stripped).

// ── Rebuild a SQLite table to add/drop PK or FK constraints ─────────────────
// SQLite doesn't support ALTER TABLE ADD/DROP CONSTRAINT, so we:
// 1. Read current DDL and data
// 2. Modify the DDL
// 3. Rename old table, create new, copy data, drop old
function rebuildTableWithConstraint(db, tbl, op) {
  // Get current DDL
  const ddlRes = db.exec(`SELECT sql FROM sqlite_master WHERE type='table' AND name='${tbl}'`);
  if (!ddlRes[0]) return { type:"error", message:`Table '${tbl}' not found`, sql:"" };
  let ddl = ddlRes[0].values[0][0];

  // Get column info
  const colRes = db.exec(`PRAGMA table_info(${tbl})`);
  const cols = colRes[0]?.values||[];  // [cid, name, type, notnull, dflt, pk]

  // Get existing FKs
  const fkRes = db.exec(`PRAGMA foreign_key_list(${tbl})`);
  // [id, seq, table, from, to, on_update, on_delete, match]
  const existingFKs = [];
  const fkMap = {};
  (fkRes[0]?.values||[]).forEach(r=>{
    if(!fkMap[r[0]]) { fkMap[r[0]]={id:r[0],refTable:r[2],from:[],to:[],onUpdate:r[5],onDelete:r[6]}; existingFKs.push(fkMap[r[0]]); }
    fkMap[r[0]].from.push(r[3]); fkMap[r[0]].to.push(r[4]);
  });

  // Determine PK columns
  let pkCols = cols.filter(r=>r[5]>0).map(r=>r[1]);

  // Apply operation
  if(op.addPK) {
    pkCols = op.addPK;
  }
  if(op.dropPK) {
    pkCols = [];
  }

  let newFKs = [...existingFKs];
  if(op.addFK) {
    newFKs.push({ refTable:op.addFK.refTable, from:op.addFK.from, to:op.addFK.refCol, onDelete:'NO ACTION', onUpdate:'NO ACTION', actions:op.addFK.actions||'' });
  }
  if(op.dropFK) {
    // Drop by constraint name — SQLite stores no names, so try to match by from-col name
    // We'll drop the FK whose from-col matches the name, or just the first if not found
    const fkName = op.dropFK.toLowerCase();
    // Try matching by name pattern or column name
    const idx = newFKs.findIndex(f=>f.from.join('_').toLowerCase()===fkName||('fk_'+tbl+'_'+f.from.join('_')).toLowerCase()===fkName);
    if(idx>=0) newFKs.splice(idx,1);
    else if(newFKs.length) newFKs.pop(); // fallback: remove last FK
  }

  let modifiedCols = cols;
  if(op.modifyCol) {
    // Replace column definition
    modifiedCols = cols.map(r=> r[1]===op.modifyCol.name ? [r[0],r[1],'__MODIFIED__',r[3],r[4],r[5]] : r);
  }

  // Build new CREATE TABLE statement
  const colDefs = modifiedCols.map(r=>{
    const name=r[1], type=r[2]==='__MODIFIED__'?op.modifyCol.def:r[2];
    const notNull=r[3]?' NOT NULL':'', dflt=r[4]!=null?` DEFAULT ${r[4]}`:'';
    // PK inline only if single-column PK
    if(pkCols.length===1 && pkCols[0]===name) return `"${name}" ${type}${notNull}${dflt} PRIMARY KEY`;
    return `"${name}" ${type}${notNull}${dflt}`;
  });

  // Multi-column PK as table constraint
  if(pkCols.length>1) colDefs.push(`PRIMARY KEY (${pkCols.map(c=>`"${c}"`).join(', ')})`);

  // FK table constraints
  newFKs.forEach(fk=>{
    let fkDef = `FOREIGN KEY (${fk.from.map(c=>`"${c}"`).join(',')}) REFERENCES "${fk.refTable}"(${fk.to.map(c=>`"${c}"`).join(',')})`;
    if(fk.actions) fkDef += ' '+fk.actions;
    else {
      if(fk.onDelete && fk.onDelete!=='NO ACTION') fkDef+=` ON DELETE ${fk.onDelete}`;
      if(fk.onUpdate && fk.onUpdate!=='NO ACTION') fkDef+=` ON UPDATE ${fk.onUpdate}`;
    }
    colDefs.push(fkDef);
  });

  const newDDL = `CREATE TABLE "${tbl}_new" (${colDefs.join(', ')})`;

  // Execute rebuild
  db.run("PRAGMA foreign_keys = OFF");
  try {
    db.run("BEGIN");
    db.run(newDDL);
    const colNames = modifiedCols.map(r=>`"${r[1]}"`).join(',');
    db.run(`INSERT INTO "${tbl}_new" SELECT ${colNames} FROM "${tbl}"`);
    db.run(`DROP TABLE "${tbl}"`);
    db.run(`ALTER TABLE "${tbl}_new" RENAME TO "${tbl}"`);
    db.run("COMMIT");
  } catch(e) {
    try { db.run("ROLLBACK"); } catch {}
    db.run("PRAGMA foreign_keys = ON");
    return { type:"error", message:e.message, sql:"" };
  }
  db.run("PRAGMA foreign_keys = ON");

  const action = op.addPK?"PRIMARY KEY added":op.dropPK?"PRIMARY KEY dropped":op.addFK?"FOREIGN KEY added":op.dropFK?"FOREIGN KEY dropped":op.modifyCol?"Column modified":"Table rebuilt";
  return { type:"ok", message:`Query OK — ${action} on '${tbl}' (${modifiedCols.length} columns)`, sql:"" };
}

function mysqlToSQLite(raw) {
  // Returns array of {type:"exec"|"virtual", stmt, handler?}
  const stmts = splitMySQL(raw);
  return stmts.map(stmt => {
    const trimmed = stmt.trim();
    if (!trimmed) return null;

    // ── Shell / DDL meta commands ──────────────────────────────────────────
    const upper = trimmed.replace(/\/\*.*?\*\//gs, "").replace(/--[^\n]*/g, "").trim().toUpperCase();

    // SHOW DATABASES / SHOW SCHEMAS
    if (/^SHOW\s+(DATABASES|SCHEMAS)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        return { type:"table", data:{ columns:["Database"], values:[["main"]] }, sql:trimmed };
      }};

    // SHOW TABLES [FROM db] [LIKE pattern]
    if (/^SHOW\s+(FULL\s+)?TABLES(\s+FROM\s+\S+)?(\s+LIKE\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        try {
          const like = (trimmed.match(/LIKE\s+'([^']+)'/i)||[])[1];
          let sql = "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name";
          const res = db.exec(sql);
          let vals = res[0]?.values||[];
          if (like) { const re=new RegExp("^"+like.replace(/%/g,".*").replace(/_/g,".")+"$","i"); vals=vals.filter(r=>re.test(r[0])); }
          return { type:"table", data:{ columns:["Tables_in_main"], values:vals }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW FULL COLUMNS / SHOW COLUMNS FROM tbl
    if (/^SHOW\s+(FULL\s+)?COLUMNS\s+(FROM|IN)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/(?:FROM|IN)\s+`?(\w+)`?/i)||[])[1];
        if (!tbl) return { type:"error", message:"Table name required", sql:trimmed };
        try {
          const res = db.exec(`PRAGMA table_info(${tbl})`);
          if (!res[0]) return { type:"error", message:`Table '${tbl}' doesn't exist`, sql:trimmed };
          const fkRes = db.exec(`PRAGMA foreign_key_list(${tbl})`);
          const fkCols = new Set((fkRes[0]?.values||[]).map(r=>r[3]));
          const rows = res[0].values.map(r => {
            const isPK = !!r[5]; const isFK = fkCols.has(r[1]);
            return [r[1], r[2], r[3]?"NO":"YES", isPK?"PRI":isFK?"MUL":"", r[4]??'NULL', isPK&&r[2]==="INTEGER"?"auto_increment":""];
          });
          return { type:"table", data:{ columns:["Field","Type","Null","Key","Default","Extra"], values:rows }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // DESCRIBE / DESC tablename
    if (/^(DESCRIBE|DESC)\s+`?(\w+)`?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/(?:DESCRIBE|DESC)\s+`?(\w+)`?/i)||[])[1];
        try {
          const res = db.exec(`PRAGMA table_info(${tbl})`);
          if (!res[0]) return { type:"error", message:`Table '${tbl}' doesn't exist`, sql:trimmed };
          // Get FK columns
          const fkRes = db.exec(`PRAGMA foreign_key_list(${tbl})`);
          const fkCols = new Set((fkRes[0]?.values||[]).map(r=>r[3])); // r[3] = from column
          const rows = res[0].values.map(r => {
            const isPK = !!r[5];
            const isFK = fkCols.has(r[1]);
            const key = isPK ? "PRI" : isFK ? "MUL" : "";
            return [r[1], r[2], r[3]?"NO":"YES", key, r[4]??'NULL', isPK&&r[2]==="INTEGER"?"auto_increment":""];
          });
          return { type:"table", data:{ columns:["Field","Type","Null","Key","Default","Extra"], values:rows }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW CREATE TABLE
    if (/^SHOW\s+CREATE\s+TABLE\s+`?(\w+)`?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/TABLE\s+`?(\w+)`?/i)||[])[1];
        try {
          const res = db.exec(`SELECT sql FROM sqlite_master WHERE type='table' AND name='${tbl}'`);
          const ddl = res[0]?.values[0]?.[0];
          if (!ddl) return { type:"error", message:`Table '${tbl}' doesn't exist`, sql:trimmed };
          return { type:"table", data:{ columns:["Table","Create Table"], values:[[tbl, ddl]] }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW FOREIGN KEYS FROM tbl (MySQL-style info)
    if (/^SHOW\s+FOREIGN\s+KEYS?\s+(FROM|IN)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/(?:FROM|IN)\s+`?(\w+)`?/i)||[])[1];
        try {
          const res = db.exec(`PRAGMA foreign_key_list(${tbl})`);
          const rows = (res[0]?.values||[]).map(r => [
            'fk_'+tbl+'_'+r[3], tbl, r[3], r[2], r[4], r[6], r[5]
          ]);
          return { type:"table", data:{ columns:["Constraint","Table","Column","Ref Table","Ref Column","On Delete","On Update"], values:rows }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW INDEX / SHOW INDEXES / SHOW KEYS FROM tbl
    if (/^SHOW\s+(INDEX|INDEXES|KEYS)\s+(FROM|IN)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const tbl = (trimmed.match(/(?:FROM|IN)\s+`?(\w+)`?/i)||[])[1];
        try {
          const res = db.exec(`PRAGMA index_list(${tbl})`);
          const rows = (res[0]?.values||[]).map(r => {
            const idx = db.exec(`PRAGMA index_info(${r[1]})`);
            const cols = (idx[0]?.values||[]).map(c=>c[2]).join(", ");
            return [tbl, r[2]?0:1, r[1], 1, cols, "A", 0, null, null, "", "BTREE", "", ""];
          });
          // Also add PK if present
          const pkRes = db.exec(`PRAGMA table_info(${tbl})`);
          const pkCols = (pkRes[0]?.values||[]).filter(r=>r[5]).map(r=>r[1]);
          if (pkCols.length) rows.unshift([tbl,0,"PRIMARY",1,pkCols.join(", "),"A",0,null,null,"","BTREE","",""]);
          return { type:"table", data:{ columns:["Table","Non_unique","Key_name","Seq_in_index","Column_name","Collation","Cardinality","Sub_part","Packed","Null","Index_type","Comment","Index_comment"], values:rows }, sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};

    // SHOW VARIABLES
    if (/^SHOW\s+(GLOBAL\s+|SESSION\s+)?VARIABLES(\s+LIKE\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const vars = [
          ["version","8.0.35-simulated"],["version_comment","QueryClass MySQL Simulator"],
          ["character_set_client","utf8mb4"],["collation_connection","utf8mb4_unicode_ci"],
          ["max_connections","151"],["innodb_buffer_pool_size","134217728"],
          ["sql_mode","STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"],
          ["time_zone","SYSTEM"],["autocommit","ON"],["foreign_key_checks","ON"],
        ];
        const like = (trimmed.match(/LIKE\s+'([^']+)'/i)||[])[1];
        let vals = vars;
        if (like) { const re=new RegExp("^"+like.replace(/%/g,".*").replace(/_/g,".")+"$","i"); vals=vars.filter(r=>re.test(r[0])); }
        return { type:"table", data:{ columns:["Variable_name","Value"], values:vals }, sql:trimmed };
      }};

    // SHOW STATUS
    if (/^SHOW\s+(GLOBAL\s+|SESSION\s+)?STATUS(\s+LIKE\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const vars = [["Uptime","3600"],["Threads_connected","1"],["Questions","42"],["Slow_queries","0"],["Opens","100"],["Flush_commands","1"],["Open_tables","20"],["Queries_per_second_avg","0.01"]];
        return { type:"table", data:{ columns:["Variable_name","Value"], values:vars }, sql:trimmed };
      }};

    // SHOW ENGINES
    if (/^SHOW\s+ENGINES\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Engine","Support","Comment","Transactions","XA","Savepoints"],
        values:[["InnoDB","DEFAULT","Supports transactions, row-level locking","YES","YES","YES"],
                ["MyISAM","YES","MyISAM storage engine","NO","NO","NO"],
                ["MEMORY","YES","Hash based, stored in memory","NO","NO","NO"],
                ["CSV","YES","CSV storage engine","NO","NO","NO"]]}, sql:trimmed
      })};

    // SHOW PROCESSLIST
    if (/^SHOW\s+(FULL\s+)?PROCESSLIST\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Id","User","Host","db","Command","Time","State","Info"],
        values:[[1,"student","localhost","main","Query",0,"","SHOW PROCESSLIST"]]}, sql:trimmed
      })};

    // SHOW GRANTS
    if (/^SHOW\s+GRANTS(\s+FOR\s+.+)?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Grants for student@localhost"],
        values:[["GRANT ALL PRIVILEGES ON *.* TO 'student'@'localhost' WITH GRANT OPTION"]]}, sql:trimmed
      })};

    // SHOW WARNINGS / ERRORS
    if (/^SHOW\s+(WARNINGS|ERRORS)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["Level","Code","Message"], values:[] }, sql:trimmed
      })};

    // SELECT VERSION() / SELECT @@version
    if (/^SELECT\s+(VERSION\s*\(\s*\)|@@VERSION)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["VERSION()"], values:[["8.0.35 (QueryClass MySQL Simulator)"]]}, sql:trimmed
      })};

    // SELECT DATABASE() / SELECT SCHEMA()
    if (/^SELECT\s+(DATABASE|SCHEMA)\s*\(\s*\)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["DATABASE()"], values:[["main"]]}, sql:trimmed
      })};

    // SELECT USER() / CURRENT_USER()
    if (/^SELECT\s+(USER|CURRENT_USER)\s*\(\s*\)\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"table", data:{ columns:["USER()"], values:[["student@localhost"]]}, sql:trimmed
      })};

    // USE database (no-op, acknowledge)
    if (/^USE\s+`?\w+`?\s*;?$/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const dbName = (trimmed.match(/USE\s+`?(\w+)`?/i)||[])[1];
        return { type:"ok", message:`Database changed (using '${dbName}' → mapped to 'main')`, sql:trimmed };
      }};

    // CREATE DATABASE / SCHEMA (acknowledge, SQLite has no separate databases)
    if (/^CREATE\s+(DATABASE|SCHEMA)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const dbName = (trimmed.match(/(?:DATABASE|SCHEMA)\s+(?:IF NOT EXISTS\s+)?`?(\w+)`?/i)||[])[1];
        return { type:"ok", message:`Database '${dbName}' created (mapped to 'main' in SQLite)`, sql:trimmed };
      }};

    // DROP DATABASE / SCHEMA
    if (/^DROP\s+(DATABASE|SCHEMA)\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => {
        const dbName = (trimmed.match(/(?:DATABASE|SCHEMA)\s+(?:IF EXISTS\s+)?`?(\w+)`?/i)||[])[1];
        return { type:"ok", message:`Database '${dbName}' dropped (note: in-memory SQLite, tables persist until reset)`, sql:trimmed };
      }};

    // TRUNCATE TABLE
    if (/^TRUNCATE\s+(TABLE\s+)?`?(\w+)`?\s*;?$/i.test(trimmed)) {
      const tbl = (trimmed.match(/(?:TRUNCATE\s+(?:TABLE\s+)?)`?(\w+)`?/i)||[])[1];
      return { type:"exec", stmt: `DELETE FROM ${tbl}` };
    }

    // SET statements (SET @@, SET NAMES, SET CHARACTER SET etc.) — acknowledge
    if (/^SET\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"ok", message:"Query OK, 0 rows affected", sql:trimmed
      })};

    // CALL procedure (stub)
    if (/^CALL\s+/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"ok", message:"Query OK (stored procedures are not supported in this environment)", sql:trimmed
      })};

    // EXPLAIN / EXPLAIN FORMAT=...
    if (/^EXPLAIN\s+/i.test(trimmed)) {
      const inner = trimmed.replace(/^EXPLAIN\s+(FORMAT\s*=\s*\w+\s+)?/i, "");
      return { type:"virtual", stmt:trimmed, handler: db => {
        try {
          const res = db.exec("EXPLAIN QUERY PLAN "+inner);
          if (res[0]) return { type:"table", data:res[0], sql:trimmed };
          return { type:"ok", message:"No execution plan available", sql:trimmed };
        } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
      }};
    }

    // LOCK TABLES / UNLOCK TABLES (acknowledge)
    if (/^(LOCK|UNLOCK)\s+TABLES/i.test(trimmed))
      return { type:"virtual", stmt:trimmed, handler: db => ({
        type:"ok", message:"Query OK (table locking not needed in single-connection mode)", sql:trimmed
      })};

    // START TRANSACTION / BEGIN / COMMIT / ROLLBACK
    if (/^(START\s+TRANSACTION|BEGIN\s*(WORK)?|COMMIT(\s+WORK)?|ROLLBACK(\s+WORK)?)\s*;?$/i.test(trimmed)) {
      const map = { "START TRANSACTION":"BEGIN", "BEGIN":"BEGIN", "COMMIT":"COMMIT", "ROLLBACK":"ROLLBACK" };
      const key = Object.keys(map).find(k => upper.startsWith(k));
      return { type:"exec", stmt: key ? map[key] : "BEGIN" };
    }

    // SAVEPOINT / RELEASE SAVEPOINT
    if (/^(SAVEPOINT|RELEASE\s+SAVEPOINT|ROLLBACK\s+TO(\s+SAVEPOINT)?)\s+\w+\s*;?$/i.test(trimmed))
      return { type:"exec", stmt: trimmed.replace(/\s*;?\s*$/, "") };

    // ── ALTER TABLE ADD/DROP PRIMARY KEY / FOREIGN KEY ──────────────────────
    // SQLite doesn't support ALTER TABLE ADD CONSTRAINT — we intercept and rebuild
    if (/^ALTER\s+TABLE\s+/i.test(trimmed)) {
      const alterUpper = trimmed.toUpperCase().replace(/\s+/g,' ');

      // ALTER TABLE t ADD PRIMARY KEY (col, ...)
      const addPK = trimmed.match(/^ALTER\s+TABLE\s+`?(\w+)`?\s+ADD\s+(?:CONSTRAINT\s+`?\w+`?\s+)?PRIMARY\s+KEY\s*\(([^)]+)\)/i);
      if (addPK) {
        return { type:"virtual", stmt:trimmed, handler: db => {
          try {
            const tbl = addPK[1];
            const pkCols = addPK[2].split(',').map(c=>c.trim().replace(/`/g,''));
            return rebuildTableWithConstraint(db, tbl, { addPK: pkCols });
          } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
        }};
      }

      // ALTER TABLE t DROP PRIMARY KEY
      const dropPK = trimmed.match(/^ALTER\s+TABLE\s+`?(\w+)`?\s+DROP\s+PRIMARY\s+KEY/i);
      if (dropPK) {
        return { type:"virtual", stmt:trimmed, handler: db => {
          try { return rebuildTableWithConstraint(db, dropPK[1], { dropPK: true }); }
          catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
        }};
      }

      // ALTER TABLE t ADD [CONSTRAINT name] FOREIGN KEY (col) REFERENCES ref(col) [ON DELETE ...] [ON UPDATE ...]
      const addFK = trimmed.match(/^ALTER\s+TABLE\s+`?(\w+)`?\s+ADD\s+(?:CONSTRAINT\s+`?(\w+)`?\s+)?FOREIGN\s+KEY\s*\(([^)]+)\)\s+REFERENCES\s+`?(\w+)`?\s*\(([^)]+)\)([\s\S]*?)(?:;|$)/i);
      if (addFK) {
        return { type:"virtual", stmt:trimmed, handler: db => {
          try {
            const tbl     = addFK[1];
            const fkName  = addFK[2]||null;
            const fromCol = addFK[3].split(',').map(c=>c.trim().replace(/`/g,''));
            const refTbl  = addFK[4];
            const refCol  = addFK[5].split(',').map(c=>c.trim().replace(/`/g,''));
            const actions = (addFK[6]||'').trim();
            return rebuildTableWithConstraint(db, tbl, { addFK:{ name:fkName, from:fromCol, refTable:refTbl, refCol, actions } });
          } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
        }};
      }

      // ALTER TABLE t DROP FOREIGN KEY name
      const dropFK = trimmed.match(/^ALTER\s+TABLE\s+`?(\w+)`?\s+DROP\s+FOREIGN\s+KEY\s+`?(\w+)`?/i);
      if (dropFK) {
        return { type:"virtual", stmt:trimmed, handler: db => {
          try { return rebuildTableWithConstraint(db, dropFK[1], { dropFK: dropFK[2] }); }
          catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
        }};
      }

      // ALTER TABLE t ADD COLUMN ... (SQLite supports this natively — pass through)
      // ALTER TABLE t RENAME TO ... (SQLite supports natively)
      // ALTER TABLE t RENAME COLUMN ... (SQLite 3.25+ supports)
      // ALTER TABLE t MODIFY COLUMN / CHANGE COLUMN → rebuild
      const modCol = trimmed.match(/^ALTER\s+TABLE\s+`?(\w+)`?\s+(?:MODIFY\s+(?:COLUMN\s+)?|CHANGE\s+(?:COLUMN\s+)?`?\w+`?\s+)`?(\w+)`?\s+(.+?)(?:;|$)/i);
      if (modCol) {
        return { type:"virtual", stmt:trimmed, handler: db => {
          try {
            const tbl = modCol[1], col = modCol[2], newDef = modCol[3].trim();
            return rebuildTableWithConstraint(db, tbl, { modifyCol:{ name:col, def:newDef } });
          } catch(e) { return { type:"error", message:e.message, sql:trimmed }; }
        }};
      }
    }

    // Otherwise: transpile MySQL DDL/DML syntax to SQLite
    return { type:"exec", stmt: transpileMySQL(trimmed) };
  }).filter(Boolean);
}

function transpileMySQL(sql) {
  let s = sql;

  // Backtick identifiers → plain (SQLite uses double-quotes, but also accepts unquoted)
  s = s.replace(/`([^`]+)`/g, '"$1"');

  // MySQL comments: # comment → -- comment
  s = s.replace(/^#(.*)$/mg, "--$1");

  // AUTO_INCREMENT → AUTOINCREMENT (SQLite keyword)
  s = s.replace(/\bAUTO_INCREMENT\b/gi, "AUTOINCREMENT");

  // INT(n) / TINYINT(n) / etc. — SQLite ignores display width, just strip it
  s = s.replace(/\b(TINYINT|SMALLINT|MEDIUMINT|BIGINT|INT)\s*\(\s*\d+\s*\)/gi, (_, t) => t);

  // UNSIGNED — SQLite doesn't support, strip it
  s = s.replace(/\bUNSIGNED\b/gi, "");

  // ZEROFILL — strip
  s = s.replace(/\bZEROFILL\b/gi, "");

  // ENUM(...) → TEXT
  s = s.replace(/\bENUM\s*\([^)]+\)/gi, "TEXT");

  // SET(...) type → TEXT
  s = s.replace(/\bSET\s*\([^)]+\)/gi, "TEXT");

  // MEDIUMTEXT, LONGTEXT, TINYTEXT → TEXT
  s = s.replace(/\b(MEDIUM|LONG|TINY)TEXT\b/gi, "TEXT");

  // MEDIUMBLOB, LONGBLOB, TINYBLOB → BLOB
  s = s.replace(/\b(MEDIUM|LONG|TINY)BLOB\b/gi, "BLOB");

  // DATETIME/TIMESTAMP → TEXT (SQLite stores as text)
  // (keep as-is, SQLite accepts DATETIME)

  // ON UPDATE CURRENT_TIMESTAMP / ON UPDATE NOW() — strip (SQLite triggers exist but overkill)
  s = s.replace(/\bON\s+UPDATE\s+(CURRENT_TIMESTAMP|NOW\s*\(\s*\))/gi, "");

  // CHARACTER SET xxx / CHARSET xxx — strip
  s = s.replace(/\b(CHARACTER\s+SET|CHARSET)\s+\w+/gi, "");

  // COLLATE xxx — strip
  s = s.replace(/\bCOLLATE\s+\w+/gi, "");

  // DEFAULT CHARSET=xxx — strip
  s = s.replace(/\bDEFAULT\s+CHARSET\s*=\s*\w+/gi, "");

  // ENGINE=xxx / ENGINE xxx — strip (SQLite has one engine)
  s = s.replace(/\bENGINE\s*=\s*\w+/gi, "");
  s = s.replace(/\bENGINE\s+\w+/gi, "");

  // ROW_FORMAT=xxx — strip
  s = s.replace(/\bROW_FORMAT\s*=\s*\w+/gi, "");

  // KEY_BLOCK_SIZE=xxx — strip
  s = s.replace(/\bKEY_BLOCK_SIZE\s*=\s*\d+/gi, "");

  // COMMENT='...' at column/table level — strip
  s = s.replace(/\bCOMMENT\s*=\s*'[^']*'/gi, "");
  s = s.replace(/\bCOMMENT\s+'[^']*'/gi, "");

  // INSERT IGNORE → INSERT OR IGNORE
  s = s.replace(/\bINSERT\s+IGNORE\b/gi, "INSERT OR IGNORE");

  // INSERT ... ON DUPLICATE KEY UPDATE → INSERT OR REPLACE (simplified)
  s = s.replace(/\bON\s+DUPLICATE\s+KEY\s+UPDATE\b[\s\S]*$/i, "");
  // Ensure it becomes INSERT OR REPLACE if ON DUPLICATE KEY was present
  if (/^INSERT\s+/i.test(s) && !(/OR\s+(IGNORE|REPLACE|ABORT|FAIL)/i.test(s))) {
    // was an ON DUPLICATE KEY — turn into REPLACE
  }

  // REPLACE INTO → INSERT OR REPLACE INTO
  s = s.replace(/^REPLACE\s+INTO\b/i, "INSERT OR REPLACE INTO");
  s = s.replace(/^REPLACE\s+`?"?(\w+)`?"?/i, "INSERT OR REPLACE INTO $1");

  // MySQL LIMIT x, y → LIMIT y OFFSET x
  s = s.replace(/\bLIMIT\s+(\d+)\s*,\s*(\d+)/gi, "LIMIT $2 OFFSET $1");

  // NOW() → CURRENT_TIMESTAMP
  s = s.replace(/\bNOW\s*\(\s*\)/gi, "CURRENT_TIMESTAMP");

  // SYSDATE() → CURRENT_TIMESTAMP
  s = s.replace(/\bSYSDATE\s*\(\s*\)/gi, "CURRENT_TIMESTAMP");

  // CURDATE() → DATE('now')
  s = s.replace(/\bCURDATE\s*\(\s*\)/gi, "DATE('now')");

  // CURTIME() → TIME('now')
  s = s.replace(/\bCURTIME\s*\(\s*\)/gi, "TIME('now')");

  // UNIX_TIMESTAMP() → strftime('%s','now')
  s = s.replace(/\bUNIX_TIMESTAMP\s*\(\s*\)/gi, "CAST(strftime('%s','now') AS INTEGER)");
  s = s.replace(/\bUNIX_TIMESTAMP\s*\(([^)]+)\)/gi, "CAST(strftime('%s',$1) AS INTEGER)");

  // FROM_UNIXTIME(x) → datetime(x, 'unixepoch')
  s = s.replace(/\bFROM_UNIXTIME\s*\(([^)]+)\)/gi, "datetime($1,'unixepoch')");

  // DATE_FORMAT(date, format) → strftime(format, date) — map MySQL → strftime
  s = s.replace(/\bDATE_FORMAT\s*\(([^,]+),\s*'([^']+)'\)/gi, (_, d, f) => {
    const fmt = f.replace(/%Y/g,"%Y").replace(/%m/g,"%m").replace(/%d/g,"%d")
                  .replace(/%H/g,"%H").replace(/%i/g,"%M").replace(/%s/g,"%S")
                  .replace(/%M/g,"%B").replace(/%W/g,"%A");
    return `strftime('${fmt}',${d})`;
  });

  // STR_TO_DATE(str, format) → just the string (simplified)
  s = s.replace(/\bSTR_TO_DATE\s*\(([^,]+),[^)]+\)/gi, "$1");

  // DATEDIFF(a,b) → (julianday(a) - julianday(b))
  s = s.replace(/\bDATEDIFF\s*\(([^,]+),([^)]+)\)/gi, "CAST(julianday($1)-julianday($2) AS INTEGER)");

  // TIMESTAMPDIFF(UNIT, a, b) — approximate
  s = s.replace(/\bTIMESTAMPDIFF\s*\(\s*(\w+)\s*,([^,]+),([^)]+)\)/gi, (_, unit, a, b) => {
    const u = unit.toUpperCase();
    if (u==="DAY") return `CAST(julianday(${b})-julianday(${a}) AS INTEGER)`;
    if (u==="HOUR") return `CAST((julianday(${b})-julianday(${a}))*24 AS INTEGER)`;
    if (u==="MINUTE") return `CAST((julianday(${b})-julianday(${a}))*1440 AS INTEGER)`;
    if (u==="SECOND") return `CAST((julianday(${b})-julianday(${a}))*86400 AS INTEGER)`;
    if (u==="MONTH") return `CAST((julianday(${b})-julianday(${a}))/30.436875 AS INTEGER)`;
    if (u==="YEAR") return `CAST((julianday(${b})-julianday(${a}))/365.25 AS INTEGER)`;
    return `CAST(julianday(${b})-julianday(${a}) AS INTEGER)`;
  });

  // DATE_ADD / DATE_SUB → datetime(...)
  s = s.replace(/\bDATE_ADD\s*\(([^,]+),\s*INTERVAL\s+([^)]+)\)/gi, (_, d, iv) => mysqlInterval(d, iv, "+"));
  s = s.replace(/\bDATE_SUB\s*\(([^,]+),\s*INTERVAL\s+([^)]+)\)/gi, (_, d, iv) => mysqlInterval(d, iv, "-"));
  s = s.replace(/([^\s,\(]+)\s*\+\s*INTERVAL\s+([^\s,\)]+)\s+(\w+)/gi, (_, d, n, u) => mysqlInterval(d, n+" "+u, "+"));
  s = s.replace(/([^\s,\(]+)\s*-\s*INTERVAL\s+([^\s,\)]+)\s+(\w+)/gi, (_, d, n, u) => mysqlInterval(d, n+" "+u, "-"));

  // YEAR(d) → strftime('%Y', d)
  s = s.replace(/\bYEAR\s*\(([^)]+)\)/gi, "CAST(strftime('%Y',$1) AS INTEGER)");

  // MONTH(d) → strftime('%m', d)
  s = s.replace(/\bMONTH\s*\(([^)]+)\)/gi, "CAST(strftime('%m',$1) AS INTEGER)");

  // DAY(d) / DAYOFMONTH(d)
  s = s.replace(/\b(DAY|DAYOFMONTH)\s*\(([^)]+)\)/gi, "CAST(strftime('%d',$2) AS INTEGER)");

  // HOUR(d) / MINUTE(d) / SECOND(d)
  s = s.replace(/\bHOUR\s*\(([^)]+)\)/gi, "CAST(strftime('%H',$1) AS INTEGER)");
  s = s.replace(/\bMINUTE\s*\(([^)]+)\)/gi, "CAST(strftime('%M',$1) AS INTEGER)");
  s = s.replace(/\bSECOND\s*\(([^)]+)\)/gi, "CAST(strftime('%S',$1) AS INTEGER)");

  // DAYOFWEEK(d) → strftime('%w', d) + 1
  s = s.replace(/\bDAYOFWEEK\s*\(([^)]+)\)/gi, "(CAST(strftime('%w',$1) AS INTEGER)+1)");

  // DAYOFYEAR(d)
  s = s.replace(/\bDAYOFYEAR\s*\(([^)]+)\)/gi, "CAST(strftime('%j',$1) AS INTEGER)");

  // WEEK(d) / WEEKOFYEAR(d)
  s = s.replace(/\b(WEEK|WEEKOFYEAR)\s*\(([^)]+?)(?:,\s*\d+)?\)/gi, "CAST(strftime('%W',$2) AS INTEGER)");

  // QUARTER(d) — approximate
  s = s.replace(/\bQUARTER\s*\(([^)]+)\)/gi, "((CAST(strftime('%m',$1) AS INTEGER)+2)/3)");

  // IF(cond, a, b) → CASE WHEN cond THEN a ELSE b END
  s = s.replace(/\bIF\s*\(([^,]+),([^,]+),([^)]+)\)/gi, "CASE WHEN $1 THEN $2 ELSE $3 END");

  // IFNULL(a, b) → COALESCE(a, b) (SQLite has COALESCE)
  s = s.replace(/\bIFNULL\s*\(/gi, "COALESCE(");

  // NULLIF already supported in SQLite

  // GREATEST / LEAST — SQLite doesn't have these natively, use MAX/MIN subquery trick
  // (leave as-is — SQLite 3.38+ added them; sql.js is recent enough)

  // CONCAT(a,b,...) → (a||b||...)
  s = s.replace(/\bCONCATWS\s*\(([^,)]+),([^)]+)\)/gi, (_, sep, rest) => {
    const parts = smartSplit(rest);
    return parts.join(`||${sep.trim()}||`);
  });
  s = s.replace(/\bCONCAT\s*\(([^)]+)\)/gi, (_, args) => {
    return smartSplit(args).map(a=>a.trim()).join("||");
  });

  // GROUP_CONCAT separator MySQL syntax → SQLite (MySQL uses SEPARATOR keyword)
  s = s.replace(/\bGROUP_CONCAT\s*\(([^)]+?)\s+SEPARATOR\s+'([^']*)'\)/gi, "GROUP_CONCAT($1,'$2')");
  s = s.replace(/\bGROUP_CONCAT\s*\(([^)]+?)\s+SEPARATOR\s+"([^"]*)"\)/gi, 'GROUP_CONCAT($1,"$2")');

  // CHAR_LENGTH → LENGTH (SQLite LENGTH counts bytes but for ASCII it's the same)
  s = s.replace(/\bCHAR_LENGTH\s*\(/gi, "LENGTH(");
  s = s.replace(/\bCHARACTER_LENGTH\s*\(/gi, "LENGTH(");

  // LOCATE(substr, str[, pos]) → INSTR(str, substr) (simplified, pos ignored)
  s = s.replace(/\bLOCATE\s*\(([^,]+),([^,)]+)(?:,[^)]*)?\)/gi, "INSTR($2,$1)");

  // POSITION(substr IN str) → INSTR(str, substr)
  s = s.replace(/\bPOSITION\s*\(([^)]+?)\s+IN\s+([^)]+)\)/gi, "INSTR($2,$1)");

  // LPAD(str, len, pad) → not native in SQLite, approximate with substr
  // (leave for now — sql.js modern enough for most)

  // FIELD(val, v1, v2, ...) → CASE WHEN val=v1 THEN 1 WHEN val=v2 THEN 2 ... END
  s = s.replace(/\bFIELD\s*\(([^)]+)\)/gi, (_, args) => {
    const parts = smartSplit(args);
    const val = parts[0];
    return parts.slice(1).map((v,i)=>`WHEN ${val}=${v.trim()} THEN ${i+1}`).reduce((a,b)=>`${a} ${b}`, "CASE")+" ELSE 0 END";
  });

  // ELT(n, v1, v2, ...) — strip to first val as fallback
  // STR(n) → CAST(n AS TEXT)

  // CONVERT(expr, type) → CAST(expr AS type)
  s = s.replace(/\bCONVERT\s*\(([^,]+),\s*(\w+)\s*\)/gi, "CAST($1 AS $2)");

  // CAST(x AS SIGNED) / CAST(x AS UNSIGNED) → CAST(x AS INTEGER)
  s = s.replace(/CAST\s*\(([^)]+)\s+AS\s+(SIGNED|UNSIGNED)(\s+INTEGER)?\s*\)/gi, "CAST($1 AS INTEGER)");

  // CAST(x AS DECIMAL/FLOAT/DOUBLE) → CAST(x AS REAL)
  s = s.replace(/CAST\s*\(([^)]+)\s+AS\s+(DECIMAL|FLOAT|DOUBLE)(\s*\(\s*\d+\s*,\s*\d+\s*\))?\s*\)/gi, "CAST($1 AS REAL)");

  // CAST(x AS CHAR) / CAST(x AS NCHAR) → CAST(x AS TEXT)
  s = s.replace(/CAST\s*\(([^)]+)\s+AS\s+(CHAR|NCHAR|VARCHAR)(\s*\(\d+\))?\s*\)/gi, "CAST($1 AS TEXT)");

  // FORMAT(n, d) → printf('%.df', n) (rounded number)
  s = s.replace(/\bFORMAT\s*\(([^,]+),\s*(\d+)\)/gi, "printf('%.$2f',$1)");

  // ROUND(n, d) — SQLite supports this natively ✓

  // POW(a,b) → POWER(a,b) (SQLite uses POW)
  s = s.replace(/\bPOWER\s*\(/gi, "POW(");

  // LOG(b, x) MySQL two-arg form → LOG(x)/LOG(b) in SQLite
  s = s.replace(/\bLOG\s*\(([^,)]+),([^)]+)\)/gi, "(LOG($2)/LOG($1))");

  // LOG2(x) → (LOG(x)/LOG(2))
  s = s.replace(/\bLOG2\s*\(/gi, "(LOG(");
  if (s.includes("(LOG(") && !s.includes("/LOG(")) {
    // crude fix — skip, leave for eval
  }

  // RAND() → RANDOM() / (RANDOM()+9223372036854775808)/18446744073709551616
  s = s.replace(/\bRAND\s*\(\s*\)/gi, "(ABS(RANDOM()) * 1.0 / 9223372036854775808)");

  // STD / STDDEV / STDDEV_POP — not in SQLite, leave as-is (will error gracefully)

  // BIT_LENGTH(x) → LENGTH(x)*8
  s = s.replace(/\bBIT_LENGTH\s*\(([^)]+)\)/gi, "(LENGTH($1)*8)");

  // OCTET_LENGTH → LENGTH
  s = s.replace(/\bOCTET_LENGTH\s*\(/gi, "LENGTH(");

  // HEX(x) — SQLite supports HEX ✓

  // UNHEX(x) → X'x'... can't easily do inline, leave
  // ORD(c) → UNICODE(c)
  s = s.replace(/\bORD\s*\(/gi, "UNICODE(");

  // ASCII(c) — SQLite has UNICODE()
  s = s.replace(/\bASCII\s*\(/gi, "UNICODE(");

  // CHAR(n) → CHAR(n) — SQLite supports ✓

  // SPACE(n) → SUBSTR(' ',1,0) hack... use printf
  s = s.replace(/\bSPACE\s*\(([^)]+)\)/gi, "REPLACE(HEX(ZEROBLOB($1/2+1)),'00',' ')");

  // REPEAT(str, n) → not in SQLite... approximate
  // REVERSE(str) — SQLite has no REVERSE; leave as-is (will error gracefully)

  // STRCMP(a,b) → CASE WHEN a<b THEN -1 WHEN a=b THEN 0 ELSE 1 END
  s = s.replace(/\bSTRCMP\s*\(([^,]+),([^)]+)\)/gi, "(CASE WHEN $1<$2 THEN -1 WHEN $1=$2 THEN 0 ELSE 1 END)");

  // INET_ATON / INET_NTOA — leave (will error gracefully)

  // JSON_OBJECT, JSON_ARRAY, JSON_EXTRACT — SQLite 3.38+ supports JSON ✓
  // JSON_UNQUOTE(x) → JSON_EXTRACT(x, '$') (unquote)
  s = s.replace(/\bJSON_UNQUOTE\s*\(([^)]+)\)/gi, "JSON_EXTRACT($1,'$')");

  // mysql_num_rows, mysql_affected_rows — not applicable

  // Clean up extra whitespace and trailing comma before )
  s = s.replace(/,\s*\)/g, ")");
  s = s.replace(/\s{2,}/g, " ").trim();

  // Strip trailing semicolon (execSQL adds it back)
  s = s.replace(/;\s*$/, "");

  return s;
}

function mysqlInterval(date, iv, op) {
  const m = String(iv).trim().match(/^(\d+(?:\.\d+)?)\s+(\w+)$/i);
  if (!m) return `datetime(${date})`;
  const [, n, unit] = m;
  const u = unit.toUpperCase();
  if (u==="SECOND") return `datetime(${date},'${op}${n} seconds')`;
  if (u==="MINUTE") return `datetime(${date},'${op}${n} minutes')`;
  if (u==="HOUR")   return `datetime(${date},'${op}${n} hours')`;
  if (u==="DAY")    return `datetime(${date},'${op}${n} days')`;
  if (u==="WEEK")   return `datetime(${date},'${op}${Number(n)*7} days')`;
  if (u==="MONTH")  return `datetime(${date},'${op}${n} months')`;
  if (u==="YEAR")   return `datetime(${date},'${op}${n} years')`;
  return `datetime(${date},'${op}${n} days')`;
}

function smartSplit(str) {
  // Split by comma, respecting parens and quotes
  const parts = []; let depth=0, cur="", inStr=null;
  for (let i=0;i<str.length;i++) {
    const c=str[i];
    if (inStr) { cur+=c; if (c===inStr&&str[i-1]!=="\\") inStr=null; }
    else if (c==="'"||c==='"') { inStr=c; cur+=c; }
    else if (c==="(") { depth++; cur+=c; }
    else if (c===")") { depth--; cur+=c; }
    else if (c===","&&depth===0) { parts.push(cur.trim()); cur=""; }
    else cur+=c;
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts;
}

function splitMySQL(sql) {
  // Split on ; but not inside strings or comments
  const stmts=[]; let cur="", inStr=null, inLineComment=false, inBlockComment=false;
  for (let i=0;i<sql.length;i++) {
    const c=sql[i], n=sql[i+1];
    if (inLineComment) { cur+=c; if (c==="\n") inLineComment=false; continue; }
    if (inBlockComment) { cur+=c; if (c==="*"&&n==="/") { cur+="/"; i++; inBlockComment=false; } continue; }
    if (inStr) { cur+=c; if (c===inStr&&sql[i-1]!=="\\") inStr=null; continue; }
    if (c==="-"&&n==="-") { inLineComment=true; cur+=c; continue; }
    if (c==="/"&&n==="*") { inBlockComment=true; cur+=c; continue; }
    if (c==="#") { inLineComment=true; cur+=c; continue; }
    if (c==="'"||c==='"'||c==="$") { inStr=c; cur+=c; continue; }
    if (c==="`") { inStr="`"; cur+=c; continue; }
    if (c===";") { const t=cur.trim(); if(t) stmts.push(t); cur=""; continue; }
    cur+=c;
  }
  const t=cur.trim(); if(t) stmts.push(t);
  return stmts;
}

function execSQL(db, sql) {
  const items = mysqlToSQLite(sql);
  return items.map(item => {
    if (item.type === "virtual") {
      try { return item.handler(db); }
      catch(e) { return { type:"error", message:e.message, sql:item.stmt }; }
    }
    // type === "exec"
    try {
      const res = db.exec(item.stmt);
      if (res.length > 0) return { type:"table", data:res[0], sql:item.stmt };
      const affected = db.getRowsModified();
      return { type:"ok", message:`Query OK${affected?`, ${affected} row(s) affected`:""}`, sql:item.stmt };
    } catch(e) { return { type:"error", message:e.message, sql:item.stmt }; }
  });
}

let SQL = null;
async function loadSQLJS() {
  if (SQL) return SQL;
  return new Promise((res, rej) => {
    const boot = () => window.initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` }).then(s => { SQL = s; res(s); }).catch(rej);
    if (window.initSqlJs) { boot(); return; }
    const sc = document.createElement("script");
    sc.src = "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js";
    sc.onload = boot; sc.onerror = rej; document.head.appendChild(sc);
  });
}
async function saveDB(sid, db) { try { const b64 = btoa(String.fromCharCode(...db.export())); LS.set(DB_PFX+sid, b64); } catch {} }
// Save teacher schema to shared key so students can load it
function saveSharedDB(db) {
  try { const b64 = btoa(String.fromCharCode(...db.export())); LS.set("__shared__"+SHARED_DB_KEY, b64); } catch {}
}
// Merge teacher's tables into a student DB (copy CREATE TABLE + data)
function mergeSharedTables(studentDb, sqlJS) {
  try {
    var b64 = LS.get("__shared__"+SHARED_DB_KEY);
    if(!b64) return;
    var teacherDb = new sqlJS.Database(Uint8Array.from(atob(b64), function(c){return c.charCodeAt(0);}));
    try { teacherDb.run("PRAGMA foreign_keys = ON"); } catch {}
    try { studentDb.run("PRAGMA foreign_keys = OFF"); } catch {} // OFF during merge to avoid FK order issues
    var metaRes = teacherDb.exec("SELECT name, sql FROM sqlite_master WHERE type='table' ORDER BY name");
    if(!metaRes.length){teacherDb.close();try{studentDb.run("PRAGMA foreign_keys = ON");}catch{} return;}
    metaRes[0].values.forEach(function(row){
      var tname = row[0]; var ddl = row[1];
      if(!tname||!ddl) return;
      try {
        // Always drop and recreate so students get the exact latest schema+data
        studentDb.run("DROP TABLE IF EXISTS ["+tname+"]");
        studentDb.run(ddl);
        var dataRes = teacherDb.exec("SELECT * FROM ["+tname+"]");
        if(!dataRes.length) return;
        var cols = dataRes[0].columns;
        var ph = cols.map(function(){return "?";}).join(",");
        var colList = cols.map(function(c){return "["+c+"]";}).join(",");
        var ins = "INSERT INTO ["+tname+"] ("+colList+") VALUES ("+ph+")";
        dataRes[0].values.forEach(function(r){ try{studentDb.run(ins,r);}catch(e2){} });
      } catch(e){}
    });
    teacherDb.close();
    try { studentDb.run("PRAGMA foreign_keys = ON"); } catch {}
  } catch(e){}
}
async function loadDB(sid, S) {
  try {
    const v = LS.get(DB_PFX+sid);
    if (v) {
      const db = new S.Database(Uint8Array.from(atob(v), c=>c.charCodeAt(0)));
      try { db.run("PRAGMA foreign_keys = ON"); } catch {}
      return db;
    }
  } catch {}
  const db = new S.Database();
  try { db.run("PRAGMA foreign_keys = ON"); } catch {}
  return db;
}

function simpleHash(str) {
  // djb2 — good enough for a classroom tool
  let h = 5381;
  for(let i=0;i<str.length;i++) h=((h<<5)+h)^str.charCodeAt(i);
  return (h>>>0).toString(36);
}

/* ── Mobile bottom nav ─────────────────────────────────────────────────── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: #111720;
  border-top: 1px solid #1e2d3d;
  z-index: 90;
  flex-direction: row;
}

/* ── Mobile responsive ─────────────────────────────────────────────────── */
@media (max-width: 768px) {
  /* Show bottom nav, hide desktop tabs */
  .mobile-nav { display: flex !important; }
  #desktop-tabs { display: none !important; }

  /* App grid: header + content + bottom nav */
  .app { grid-template-rows: 48px 1fr; padding-bottom: 56px; box-sizing: border-box; }

  /* Header — compact */
  .hdr { padding: 0 10px; gap: 5px; }
  .hdr-sep { min-width: 4px; }
  .tag { display: none; }
  .logo-sub { display: none !important; }

  /* IDE: single column */
  .ide-grid { grid-template-columns: 1fr !important; }
  .sidebar { display: none; }
  .rpanel  { display: none; }
  .results-pane { max-height: 40vh; }

  /* Modals — full screen */
  .modal, .modal-lg, .modal-xl {
    width: 100vw !important;
    max-width: 100vw !important;
    max-height: calc(100vh - 56px) !important;
    height: calc(100vh - 56px);
    border-radius: 0 !important;
    margin: 0;
  }
  .overlay { align-items: flex-start; }

  /* Rewards sidebar stacks on top */
  .rw-wrap { flex-direction: column; }
  .rw-sidebar { width: 100% !important; height: auto; max-height: 35vh; border-right: none; border-bottom: 1px solid #1e2d3d; }

  /* Leaderboard */
  .lb-row { grid-template-columns: 28px 1fr auto; gap: 8px; padding: 9px 12px; }
  .lb-pts { font-size: 15px; min-width: 40px; }

  /* Badge grid */
  .badge-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }

  /* Give points row */
  .give-pts-row { grid-template-columns: 1fr 60px auto; gap: 6px; }

  /* Whiteboard — full width stickies */
  .sticky { min-width: 140px !important; max-width: 88vw !important; }

  /* Quiz cards */
  .quiz-card { padding: 10px 12px; }

  /* Status bar */
  .status-bar { gap: 8px; padding: 2px 10px; font-size: 8px; }

  /* Buttons */
  .btn { font-size: 10px; padding: 5px 9px; }
  .btn-sm { font-size: 9px; padding: 4px 7px; }
}

@media (max-width: 480px) {
  .modal, .modal-lg, .modal-xl { border-radius: 0 !important; }
  .mbody { padding: 10px 12px; }
  .mhdr { padding: 10px 12px 8px; font-size: 13px; }
  .mftr { padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
}

// ─── ER Canvas ────────────────────────────────────────────────────────────────
// ─── Logical ERD Canvas (Chen Notation) ─────────────────────────────────────
// Nodes: entity (rect), weak_entity (double-rect), relationship (diamond),
//        weak_rel (double-diamond), attribute (ellipse), multi_attr (double-ellipse),
//        derived_attr (dashed ellipse), key_attr (underlined ellipse)
// Edges: line (label optional, cardinality optional)
function ERCanvas({ value, onChange, readOnly=false }) {
  const svgRef = useRef(null);
  const [nodes, setNodes]         = useState(value?.nodes||[]);
  const [edges, setEdges]         = useState(value?.edges||[]);
  // backward-compat: if old format (entities/relations) convert
  useEffect(()=>{
    if(value?.entities && !value?.nodes){
      const nds=value.entities.map(e=>({id:e.id,kind:'entity',label:e.name,x:e.x,y:e.y,attrs:e.attributes||[]}));
      const eds=value.relations.map(r=>({id:r.id,from:r.from,to:r.to,label:r.label||'',card:r.cardinality||'1:N'}));
      setNodes(nds); setEdges(eds);
    } else {
      setNodes(value?.nodes||[]); setEdges(value?.edges||[]);
    }
  },[value]);

  const [tool, setTool]           = useState('select');
  const [selected, setSelected]   = useState(null);
  const [dragging, setDragging]   = useState(null);
  const [edgeSrc, setEdgeSrc]     = useState(null);
  const [hov, setHov]             = useState(null);
  const [pan, setPan]             = useState({x:0,y:0});
  const [isPanning, setIsPanning] = useState(false);
  const panRef = useRef(null);
  const [editLbl, setEditLbl]     = useState(null); // {id}

  const emit=(ns,es)=>{if(onChange)onChange({nodes:ns,edges:es});}

  const svgPt=(e)=>{const r=svgRef.current.getBoundingClientRect();return{x:e.clientX-r.left-pan.x,y:e.clientY-r.top-pan.y};}

  // Node dimensions
  const NODE_KINDS={
    entity:{w:140,h:38,label:'Entity'},
    weak_entity:{w:140,h:38,label:'Weak Entity'},
    relationship:{w:120,h:44,label:'Relationship'},
    weak_rel:{w:120,h:44,label:'Weak Rel.'},
    attribute:{w:110,h:34,label:'Attribute'},
    multi_attr:{w:110,h:34,label:'Multi-val Attr'},
    derived_attr:{w:110,h:34,label:'Derived Attr'},
    key_attr:{w:110,h:34,label:'Key Attr'},
  };
  const nW=(n)=>NODE_KINDS[n.kind]?.w||120;
  const nH=(n)=>NODE_KINDS[n.kind]?.h||36;
  const cx=(n)=>n.x+nW(n)/2;
  const cy=(n)=>n.y+nH(n)/2;

  const handleSvgClick=(e)=>{
    if(readOnly) return;
    if(e.target===svgRef.current||e.target.classList.contains('cvbg')){
      if(tool!=='select'&&tool!=='edge'){
        const pt=svgPt(e);
        const kind=tool;
        const def=NODE_KINDS[kind];
        const nd={id:uid(),kind,label:def.label,x:pt.x-def.w/2,y:pt.y-def.h/2};
        const nn=[...nodes,nd]; setNodes(nn); emit(nn,edges);
        setSelected({type:'node',id:nd.id}); setTool('select');
      } else { setSelected(null); setEdgeSrc(null); }
    }
  };

  const handleNodeDown=(e,nid)=>{
    if(readOnly){e.stopPropagation();return;}
    e.stopPropagation();
    if(tool==='edge'){
      if(!edgeSrc){setEdgeSrc(nid);}
      else if(edgeSrc!==nid){
        const ed={id:uid(),from:edgeSrc,to:nid,label:'',card:''};
        const ne=[...edges,ed]; setEdges(ne); emit(nodes,ne);
        setEdgeSrc(null); setTool('select'); setSelected({type:'edge',id:ed.id});
      } else setEdgeSrc(null);
      return;
    }
    const nd=nodes.find(n=>n.id===nid);
    setDragging({id:nid,ox:e.clientX-nd.x,oy:e.clientY-nd.y});
    setSelected({type:'node',id:nid});
  };

  const handleMM=useCallback((e)=>{
    if(dragging){const nx=e.clientX-dragging.ox,ny=e.clientY-dragging.oy;setNodes(ns=>ns.map(n=>n.id===dragging.id?{...n,x:nx,y:ny}:n));}
    if(isPanning&&panRef.current)setPan({x:e.clientX-panRef.current.ox,y:e.clientY-panRef.current.oy});
  },[dragging,isPanning]);

  const handleMU=useCallback(()=>{
    if(dragging){emit(nodes,edges);setDragging(null);}
    if(isPanning){setIsPanning(false);panRef.current=null;}
  },[dragging,isPanning,nodes,edges]);

  useEffect(()=>{
    window.addEventListener('mousemove',handleMM);window.addEventListener('mouseup',handleMU);
    return()=>{window.removeEventListener('mousemove',handleMM);window.removeEventListener('mouseup',handleMU);};
  },[handleMM,handleMU]);

  const delSelected=()=>{
    if(!selected)return;
    if(selected.type==='node'){const nn=nodes.filter(n=>n.id!==selected.id);const ne=edges.filter(e=>e.from!==selected.id&&e.to!==selected.id);setNodes(nn);setEdges(ne);emit(nn,ne);}
    else{const ne=edges.filter(e=>e.id!==selected.id);setEdges(ne);emit(nodes,ne);}
    setSelected(null);
  };

  const updateNode=(id,field,val)=>{const nn=nodes.map(n=>n.id===id?{...n,[field]:val}:n);setNodes(nn);emit(nn,edges);};
  const updateEdge=(id,field,val)=>{const ne=edges.map(e=>e.id===id?{...e,[field]:val}:e);setEdges(ne);emit(nodes,ne);};

  const selNode=selected?.type==='node'?nodes.find(n=>n.id===selected.id):null;
  const selEdge=selected?.type==='edge'?edges.find(e=>e.id===selected.id):null;

  // Draw a node shape
  const renderNode=(nd)=>{
    const isSel=selected?.id===nd.id;
    const isEdgeSrc=edgeSrc===nd.id;
    const isHov=hov===nd.id&&tool==='edge'&&edgeSrc&&edgeSrc!==nd.id;
    const w=nW(nd),h=nH(nd);
    const stroke=isEdgeSrc?T.orange:isSel?T.accent:isHov?T.green:T.border;
    const sw=isSel?2.5:1.5;

    const lbl=editLbl===nd.id
      ?<foreignObject x={2} y={h/2-11} width={w-4} height={22}>
          <input xmlns="http://www.w3.org/1999/xhtml"
            style={{width:'100%',background:'transparent',border:'none',outline:'none',color:'#d6e4f0',fontWeight:700,fontSize:12,fontFamily:"'Syne',sans-serif",textAlign:'center'}}
            defaultValue={nd.label} autoFocus
            onBlur={e2=>{updateNode(nd.id,'label',e2.target.value);setEditLbl(null);}}
            onKeyDown={e2=>{if(e2.key==='Enter'){updateNode(nd.id,'label',e2.target.value);setEditLbl(null);}e2.stopPropagation();}}
            onClick={e2=>e2.stopPropagation()}/>
        </foreignObject>
      :<text x={w/2} y={h/2+1} textAnchor="middle" dominantBaseline="middle" fontSize={11} fontWeight={700}
          fill={T.text} fontFamily="'Syne',sans-serif" style={{pointerEvents:readOnly?'none':'all',cursor:'text',userSelect:'none'}}
          onDoubleClick={e2=>{e2.stopPropagation();if(!readOnly)setEditLbl(nd.id);}}>
          {nd.label}
        </text>;

    let shape=null;
    if(nd.kind==='entity'){
      shape=<><rect x={0} y={0} width={w} height={h} rx={4} fill={T.surfaceAlt} stroke={stroke} strokeWidth={sw}/>{lbl}</>;
    } else if(nd.kind==='weak_entity'){
      shape=<><rect x={0} y={0} width={w} height={h} rx={4} fill={T.surfaceAlt} stroke={stroke} strokeWidth={sw}/>
        <rect x={4} y={4} width={w-8} height={h-8} rx={2} fill="none" stroke={stroke} strokeWidth={1}/>{lbl}</>;
    } else if(nd.kind==='relationship'){
      const hx=w/2,hy=h/2;
      shape=<><polygon points={`${hx},0 ${w},${hy} ${hx},${h} 0,${hy}`} fill={T.surface} stroke={stroke} strokeWidth={sw}/>{lbl}</>;
    } else if(nd.kind==='weak_rel'){
      const hx=w/2,hy=h/2;
      const inset=5;
      const ihx=hx,ihy=hy;
      shape=<><polygon points={`${hx},0 ${w},${hy} ${hx},${h} 0,${hy}`} fill={T.surface} stroke={stroke} strokeWidth={sw}/>
        <polygon points={`${ihx},${inset} ${w-inset},${ihy} ${ihx},${h-inset} ${inset},${ihy}`} fill="none" stroke={stroke} strokeWidth={1}/>{lbl}</>;
    } else if(nd.kind==='attribute'){
      shape=<><ellipse cx={w/2} cy={h/2} rx={w/2} ry={h/2} fill={T.surface} stroke={stroke} strokeWidth={sw}/>{lbl}</>;
    } else if(nd.kind==='multi_attr'){
      shape=<><ellipse cx={w/2} cy={h/2} rx={w/2} ry={h/2} fill={T.surface} stroke={stroke} strokeWidth={sw}/>
        <ellipse cx={w/2} cy={h/2} rx={w/2-4} ry={h/2-4} fill="none" stroke={stroke} strokeWidth={1}/>{lbl}</>;
    } else if(nd.kind==='derived_attr'){
      shape=<><ellipse cx={w/2} cy={h/2} rx={w/2} ry={h/2} fill={T.surface} stroke={stroke} strokeWidth={sw} strokeDasharray="5 3"/>{lbl}</>;
    } else if(nd.kind==='key_attr'){
      shape=<><ellipse cx={w/2} cy={h/2} rx={w/2} ry={h/2} fill={T.surface} stroke={stroke} strokeWidth={sw}/>
        <text x={w/2} y={h/2+1} textAnchor="middle" dominantBaseline="middle" fontSize={11} fontWeight={700}
          fill={T.text} fontFamily="'Syne',sans-serif" style={{textDecoration:'underline',pointerEvents:readOnly?'none':'all',cursor:'text',userSelect:'none'}}
          onDoubleClick={e2=>{e2.stopPropagation();if(!readOnly)setEditLbl(nd.id);}}>{nd.label}</text></>;
      return shape; // skip default lbl
    }
    return shape;
  };

  const TOOLS=[
    ['select','🖱','Select'],['edge','🔗','Connect'],
    ['entity','▭','Entity'],['weak_entity','▬','Weak Entity'],
    ['relationship','◇','Relationship'],['weak_rel','⬡','Weak Rel.'],
    ['attribute','○','Attribute'],['key_attr','<u>○</u>','Key Attr'],
    ['multi_attr','⊙','Multi Attr'],['derived_attr','◌','Derived Attr'],
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.bg}}>
      {!readOnly&&(
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'5px 8px',background:T.surface,borderBottom:`1px solid ${T.border}`,flexShrink:0,flexWrap:'wrap'}}>
          {TOOLS.map(([t,ico,lbl])=>(
            <button key={t} className={`btn btn-sm ${tool===t?'btn-run':'btn-ghost'}`}
              style={{fontSize:10,padding:'3px 7px'}}
              onClick={()=>{setTool(t);setEdgeSrc(null);}}
              dangerouslySetInnerHTML={{__html:`${ico} ${lbl}`}}/>
          ))}
          <div style={{flex:1}}/>
          {edgeSrc&&<span style={{fontSize:10,color:T.orange,fontWeight:600}}>📍 Click target node…</span>}
          {selected&&<button className="btn btn-red btn-sm" style={{fontSize:10}} onClick={delSelected}>🗑 Delete</button>}
          <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>{setNodes([]);setEdges([]);emit([],[]);setSelected(null);}}>Clear</button>
        </div>
      )}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        <svg ref={svgRef} width="100%" height="100%"
          style={{flex:1,background:T.bg,cursor:tool==='select'?'default':tool==='edge'?'cell':'crosshair',userSelect:'none',minWidth:0}}
          onClick={handleSvgClick}
          onMouseDown={e=>{if(e.target===svgRef.current||e.target.classList.contains('cvbg')){if(e.button===1||(e.button===0&&tool==='select'&&!e.altKey)){setIsPanning(true);panRef.current={ox:e.clientX-pan.x,oy:e.clientY-pan.y};}}}}>
          <defs>
            <pattern id="ercvgrid" width="24" height="24" patternUnits="userSpaceOnUse" x={pan.x%24} y={pan.y%24}>
              <path d="M 24 0 L 0 0 0 24" fill="none" stroke={T.border} strokeWidth="0.5" opacity="0.4"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#ercvgrid)" className="cvbg"/>
          <g transform={`translate(${pan.x},${pan.y})`}>
            {edges.map(ed=>{
              const fn=nodes.find(n=>n.id===ed.from),tn=nodes.find(n=>n.id===ed.to);
              if(!fn||!tn) return null;
              const x1=cx(fn),y1=cy(fn),x2=cx(tn),y2=cy(tn);
              const mx=(x1+x2)/2,my=(y1+y2)/2;
              const isSel=selected?.id===ed.id;
              return (
                <g key={ed.id} onClick={e=>{e.stopPropagation();if(!readOnly)setSelected({type:'edge',id:ed.id});}}>
                  <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={isSel?T.accent:T.muted} strokeWidth={isSel?2.5:1.5} style={{cursor:'pointer'}}/>
                  {(ed.label||ed.card)&&(
                    <g>
                      <rect x={mx-24} y={my-10} width={48} height={20} rx={4} fill={T.surfaceAlt} stroke={isSel?T.accent:T.border} strokeWidth={1}/>
                      <text x={mx} y={my+1} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill={isSel?T.accent:T.muted} fontFamily="'Syne',sans-serif" fontWeight={700} style={{pointerEvents:'none'}}>{ed.card||ed.label}</text>
                    </g>
                  )}
                </g>
              );
            })}
            {nodes.map(nd=>(
              <g key={nd.id} transform={`translate(${nd.x},${nd.y})`}
                onMouseDown={e=>handleNodeDown(e,nd.id)}
                onMouseEnter={()=>setHov(nd.id)} onMouseLeave={()=>setHov(null)}
                style={{cursor:tool==='edge'?'pointer':'move'}}>
                {renderNode(nd)}
              </g>
            ))}
          </g>
        </svg>
        {/* Properties panel */}
        {!readOnly&&(selNode||selEdge)&&(
          <div style={{width:200,background:T.surface,borderLeft:`1px solid ${T.border}`,overflow:'auto',flexShrink:0,fontSize:11,padding:10}}>
            {selNode&&(
              <>
                <div style={{fontWeight:700,fontSize:11,marginBottom:8,color:T.accent,textTransform:'uppercase',letterSpacing:.5}}>Node</div>
                <div className="fg"><label className="flabel">Label</label>
                  <input className="finput" style={{fontSize:11}} value={selNode.label} onChange={e=>updateNode(selNode.id,'label',e.target.value)}/>
                </div>
                <div className="fg"><label className="flabel">Kind</label>
                  <select className="finput" style={{fontSize:10}} value={selNode.kind} onChange={e=>updateNode(selNode.id,'kind',e.target.value)}>
                    {Object.entries(NODE_KINDS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
              </>
            )}
            {selEdge&&(
              <>
                <div style={{fontWeight:700,fontSize:11,marginBottom:8,color:T.accent,textTransform:'uppercase',letterSpacing:.5}}>Edge</div>
                <div className="fg"><label className="flabel">Label</label>
                  <input className="finput" style={{fontSize:11}} value={selEdge.label||''} onChange={e=>updateEdge(selEdge.id,'label',e.target.value)}/>
                </div>
                <div className="fg"><label className="flabel">Cardinality</label>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    {['1','N','M','1:1','1:N','N:M','total','partial'].map(c=>(
                      <button key={c} className={`btn btn-sm ${selEdge.card===c?'btn-run':'btn-ghost'}`}
                        style={{fontSize:9,padding:'2px 5px'}} onClick={()=>updateEdge(selEdge.id,'card',c)}>{c}</button>
                    ))}
                  </div>
                </div>
                <div style={{fontSize:10,color:T.muted,marginTop:4}}>{nodes.find(n=>n.id===selEdge.from)?.label} → {nodes.find(n=>n.id===selEdge.to)?.label}</div>
              </>
            )}
          </div>
        )}
        {readOnly&&nodes.length>0&&(
          <div style={{width:140,background:T.surface,borderLeft:`1px solid ${T.border}`,padding:8,overflow:'auto',flexShrink:0}}>
            <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Diagram</div>
            {nodes.map(n=>(
              <div key={n.id} style={{marginBottom:4,fontSize:10,color:T.text}}>
                <span style={{fontSize:9,color:T.muted,marginRight:4}}>{NODE_KINDS[n.kind]?.label?.slice(0,4)||''}</span>{n.label}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Physical ERD / Relational Model Canvas ───────────────────────────────────
// Tables with columns (name, type, PK, FK), FK arrows between tables
function RelationalCanvas({ value, onChange, readOnly=false }) {
  const svgRef = useRef(null);
  const [tables, setTables]       = useState(value?.tables||[]);
  const [fkeys,  setFkeys]        = useState(value?.fkeys||[]);
  const [tool,   setTool]         = useState('select');
  const [selected, setSelected]   = useState(null);
  const [dragging, setDragging]   = useState(null);
  const [fkSrc,  setFkSrc]        = useState(null); // {tableId, colId}
  const [hov,    setHov]          = useState(null);
  const [pan,    setPan]          = useState({x:0,y:0});
  const [isPanning,setIsPanning]  = useState(false);
  const panRef = useRef(null);

  useEffect(()=>{setTables(value?.tables||[]);setFkeys(value?.fkeys||[]);},[value?.tables?.length,value?.fkeys?.length]);

  const emit=(ts,fks)=>{if(onChange)onChange({tables:ts,fkeys:fks});}

  const COL_H=22, HDR_H=30, TBL_W=180;
  const tblH=(t)=>HDR_H+t.cols.length*COL_H;
  const colY=(t,ci)=>HDR_H+ci*COL_H+COL_H/2; // center of col row
  const tblCx=(t)=>t.x+TBL_W/2;
  const tblColCy=(t,ci)=>t.y+colY(t,ci);

  const svgPt=(e)=>{const r=svgRef.current.getBoundingClientRect();return{x:e.clientX-r.left-pan.x,y:e.clientY-r.top-pan.y};}

  const addTable=(pt)=>{
    const t={id:uid(),name:'Table',x:pt.x-TBL_W/2,y:pt.y-40,
      cols:[{id:uid(),name:'id',type:'INT',pk:true,fk:false,nn:true}]};
    const nt=[...tables,t];setTables(nt);emit(nt,fkeys);
    setSelected({type:'table',id:t.id});setTool('select');
  };

  const handleSvgClick=(e)=>{
    if(readOnly)return;
    if(e.target===svgRef.current||e.target.classList.contains('rcvbg')){
      if(tool==='table'){addTable(svgPt(e));}
      else{setSelected(null);setFkSrc(null);}
    }
  };

  const handleTblDown=(e,tid)=>{
    if(readOnly){e.stopPropagation();return;}
    e.stopPropagation();
    if(tool==='fk'){setFkSrc({tableId:tid,colId:null});return;}
    const t=tables.find(t=>t.id===tid);
    setDragging({id:tid,ox:e.clientX-t.x,oy:e.clientY-t.y});
    setSelected({type:'table',id:tid});
  };

  const handleColClick=(e,tid,cid)=>{
    if(readOnly)return;
    e.stopPropagation();
    if(tool==='fk'){
      if(!fkSrc){setFkSrc({tableId:tid,colId:cid});}
      else if(fkSrc.tableId!==tid){
        const fk={id:uid(),fromTable:fkSrc.tableId,fromCol:fkSrc.colId,toTable:tid,toCol:cid,card:'N:1'};
        const nf=[...fkeys,fk];setFkeys(nf);emit(tables,nf);
        // Mark FK column
        const nt=tables.map(t=>t.id===fkSrc.tableId?{...t,cols:t.cols.map(c=>c.id===fkSrc.colId?{...c,fk:true}:c)}:t);
        setTables(nt);emit(nt,nf);
        setFkSrc(null);setTool('select');setSelected({type:'fk',id:fk.id});
      } else setFkSrc(null);
      return;
    }
    setSelected({type:'col',tableId:tid,id:cid});
  };

  const handleMM=useCallback((e)=>{
    if(dragging){const nx=e.clientX-dragging.ox,ny=e.clientY-dragging.oy;setTables(ts=>ts.map(t=>t.id===dragging.id?{...t,x:nx,y:ny}:t));}
    if(isPanning&&panRef.current)setPan({x:e.clientX-panRef.current.ox,y:e.clientY-panRef.current.oy});
  },[dragging,isPanning]);
  const handleMU=useCallback(()=>{
    if(dragging){emit(tables,fkeys);setDragging(null);}
    if(isPanning){setIsPanning(false);panRef.current=null;}
  },[dragging,isPanning,tables,fkeys]);
  useEffect(()=>{
    window.addEventListener('mousemove',handleMM);window.addEventListener('mouseup',handleMU);
    return()=>{window.removeEventListener('mousemove',handleMM);window.removeEventListener('mouseup',handleMU);};
  },[handleMM,handleMU]);

  const addCol=(tid)=>{const nt=tables.map(t=>t.id===tid?{...t,cols:[...t.cols,{id:uid(),name:'col',type:'VARCHAR(100)',pk:false,fk:false,nn:false}]}:t);setTables(nt);emit(nt,fkeys);};
  const updCol=(tid,cid,f,v)=>{const nt=tables.map(t=>t.id===tid?{...t,cols:t.cols.map(c=>c.id===cid?{...c,[f]:v}:c)}:t);setTables(nt);emit(nt,fkeys);};
  const delCol=(tid,cid)=>{const nt=tables.map(t=>t.id===tid?{...t,cols:t.cols.filter(c=>c.id!==cid)}:t);setTables(nt);emit(nt,fkeys);};
  const updTbl=(tid,f,v)=>{const nt=tables.map(t=>t.id===tid?{...t,[f]:v}:t);setTables(nt);emit(nt,fkeys);};
  const delSelected=()=>{
    if(!selected)return;
    if(selected.type==='table'){const nt=tables.filter(t=>t.id!==selected.id);const nf=fkeys.filter(f=>f.fromTable!==selected.id&&f.toTable!==selected.id);setTables(nt);setFkeys(nf);emit(nt,nf);}
    else if(selected.type==='fk'){const nf=fkeys.filter(f=>f.id!==selected.id);setFkeys(nf);emit(tables,nf);}
    setSelected(null);
  };

  const selTbl=selected?.type==='table'?tables.find(t=>t.id===selected.id):null;
  const selCol=selected?.type==='col'?tables.find(t=>t.id===selected.tableId)?.cols.find(c=>c.id===selected.id):null;
  const selFk=selected?.type==='fk'?fkeys.find(f=>f.id===selected.id):null;

  const SQL_TYPES=["INT","BIGINT","VARCHAR(50)","VARCHAR(100)","VARCHAR(255)","TEXT","DATE","DATETIME","DECIMAL(10,2)","BOOLEAN","FLOAT","CHAR(10)"];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.bg}}>
      {!readOnly&&(
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'5px 8px',background:T.surface,borderBottom:`1px solid ${T.border}`,flexShrink:0,flexWrap:'wrap'}}>
          {[['select','🖱 Select'],['table','🗃 Add Table'],['fk','🔗 Add FK']].map(([t,l])=>(
            <button key={t} className={`btn btn-sm ${tool===t?'btn-run':'btn-ghost'}`} style={{fontSize:10}} onClick={()=>{setTool(t);setFkSrc(null);}}>{l}</button>
          ))}
          <div style={{flex:1}}/>
          {fkSrc&&<span style={{fontSize:10,color:T.orange,fontWeight:600}}>📍 Click target column…</span>}
          {selected&&<button className="btn btn-red btn-sm" style={{fontSize:10}} onClick={delSelected}>🗑 Delete</button>}
          <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>{setTables([]);setFkeys([]);emit([],[]);setSelected(null);}}>Clear</button>
        </div>
      )}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        <svg ref={svgRef} width="100%" height="100%"
          style={{flex:1,background:T.bg,cursor:tool==='table'?'crosshair':tool==='fk'?'cell':'default',userSelect:'none',minWidth:0}}
          onClick={handleSvgClick}
          onMouseDown={e=>{if(e.target===svgRef.current||e.target.classList.contains('rcvbg')){setIsPanning(true);panRef.current={ox:e.clientX-pan.x,oy:e.clientY-pan.y};}}}>
          <defs>
            <pattern id="relcvgrid" width="24" height="24" patternUnits="userSpaceOnUse" x={pan.x%24} y={pan.y%24}>
              <path d="M 24 0 L 0 0 0 24" fill="none" stroke={T.border} strokeWidth="0.5" opacity="0.4"/>
            </pattern>
            {/* FK arrow markers */}
            <marker id="fk-arr" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
              <polygon points="0 0,10 4,0 8" fill={T.muted}/>
            </marker>
            <marker id="fk-arr-s" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
              <polygon points="0 0,10 4,0 8" fill={T.accent}/>
            </marker>
            <marker id="fk-crow" markerWidth="14" markerHeight="10" refX="2" refY="5" orient="auto">
              <path d="M 12 0 L 2 5 L 12 10 M 14 0 L 14 10" stroke={T.muted} strokeWidth="1.5" fill="none"/>
            </marker>
          </defs>
          <rect width="100%" height="100%" fill="url(#relcvgrid)" className="rcvbg"/>
          <g transform={`translate(${pan.x},${pan.y})`}>
            {/* FK arrows */}
            {fkeys.map(fk=>{
              const ft=tables.find(t=>t.id===fk.fromTable),tt=tables.find(t=>t.id===fk.toTable);
              if(!ft||!tt) return null;
              const fci=ft.cols.findIndex(c=>c.id===fk.fromCol);
              const tci=tt.cols.findIndex(c=>c.id===fk.toCol);
              const x1=tblCx(ft),y1=fci>=0?tblColCy(ft,fci):ft.y+tblH(ft)/2;
              const x2=tblCx(tt),y2=tci>=0?tblColCy(tt,tci):tt.y+tblH(tt)/2;
              const isSel=selected?.id===fk.id;
              return (
                <g key={fk.id} onClick={e=>{e.stopPropagation();if(!readOnly)setSelected({type:'fk',id:fk.id});}}>
                  <line x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke={isSel?T.accent:T.muted} strokeWidth={isSel?2:1.5}
                    strokeDasharray="5 3"
                    markerEnd={`url(#fk-arr${isSel?'-s':''})`}
                    markerStart="url(#fk-crow)"
                    style={{cursor:'pointer'}}/>
                  <rect x={(x1+x2)/2-18} y={(y1+y2)/2-9} width={36} height={18} rx={4} fill={T.surfaceAlt} stroke={isSel?T.accent:T.border}/>
                  <text x={(x1+x2)/2} y={(y1+y2)/2+1} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill={isSel?T.accent:T.muted} fontFamily="'Syne',sans-serif" fontWeight={700} style={{pointerEvents:'none'}}>{fk.card||'N:1'}</text>
                </g>
              );
            })}
            {/* Tables */}
            {tables.map(tbl=>{
              const h=tblH(tbl);
              const isTblSel=selected?.type==='table'&&selected.id===tbl.id;
              const isHovTbl=hov===tbl.id&&tool==='fk'&&fkSrc&&fkSrc.tableId!==tbl.id;
              return (
                <g key={tbl.id} transform={`translate(${tbl.x},${tbl.y})`}
                  style={{cursor:tool==='fk'?'pointer':'move'}}>
                  {/* Shadow */}
                  {!readOnly&&<rect x={3} y={3} width={TBL_W} height={h} rx={5} fill="rgba(0,0,0,.35)"/>}
                  {/* Body */}
                  <rect width={TBL_W} height={h} rx={5} fill={T.surfaceAlt}
                    stroke={isHovTbl?T.green:isTblSel?T.accent:T.border} strokeWidth={isTblSel?2:1.5}
                    onMouseDown={e=>handleTblDown(e,tbl.id)}/>
                  {/* Header */}
                  <rect width={TBL_W} height={HDR_H} rx={5} fill={isTblSel?T.accent:T.borderHi}
                    onMouseDown={e=>handleTblDown(e,tbl.id)}/>
                  <rect y={HDR_H-5} width={TBL_W} height={5} fill={isTblSel?T.accent:T.borderHi}/>
                  <text x={TBL_W/2} y={HDR_H/2+1} textAnchor="middle" dominantBaseline="middle"
                    fontSize={12} fontWeight={800} fill={isTblSel?T.bg:T.text}
                    fontFamily="'Syne',sans-serif" style={{pointerEvents:'none',userSelect:'none'}}>
                    {tbl.name}
                  </text>
                  {/* Columns */}
                  {tbl.cols.map((col,ci)=>{
                    const y=HDR_H+ci*COL_H;
                    const isColSel=selected?.type==='col'&&selected.tableId===tbl.id&&selected.id===col.id;
                    const isFkSrc2=fkSrc?.tableId===tbl.id&&fkSrc?.colId===col.id;
                    return (
                      <g key={col.id} transform={`translate(0,${y})`}
                        onClick={e=>handleColClick(e,tbl.id,col.id)}
                        style={{cursor:tool==='fk'?'crosshair':'default'}}>
                        <rect width={TBL_W} height={COL_H} fill={isColSel||isFkSrc2?T.accentGlow:'transparent'} stroke={T.border} strokeWidth={0.5} style={{pointerEvents:'all'}}/>
                        {col.pk&&<text x={6} y={COL_H/2+1} dominantBaseline="middle" fontSize={9} fill={T.yellow} fontWeight={800}>PK</text>}
                        {col.fk&&!col.pk&&<text x={6} y={COL_H/2+1} dominantBaseline="middle" fontSize={9} fill={T.orange} fontWeight={800}>FK</text>}
                        {col.pk&&col.fk&&<text x={6} y={COL_H/2+1} dominantBaseline="middle" fontSize={8} fill={T.orange}>PFK</text>}
                        <text x={col.pk||col.fk?28:8} y={COL_H/2+1} dominantBaseline="middle"
                          fontSize={10} fill={col.pk?T.yellow:col.fk?T.orange:T.text}
                          fontFamily="'JetBrains Mono',monospace" fontWeight={col.pk?700:400}
                          textDecoration={col.pk?'underline':'none'}
                          style={{pointerEvents:'none',userSelect:'none'}}>
                          {col.name}{col.nn&&!col.pk?'*':''}
                        </text>
                        <text x={TBL_W-5} y={COL_H/2+1} textAnchor="end" dominantBaseline="middle"
                          fontSize={9} fill={T.muted} fontFamily="'JetBrains Mono',monospace"
                          style={{pointerEvents:'none',userSelect:'none'}}>
                          {col.type.split('(')[0]}
                        </text>
                      </g>
                    );
                  })}
                </g>
              );
            })}
          </g>
        </svg>
        {/* Properties panel */}
        {!readOnly&&(selTbl||selCol||selFk)&&(
          <div style={{width:210,background:T.surface,borderLeft:`1px solid ${T.border}`,overflow:'auto',flexShrink:0,fontSize:11,padding:10}}>
            {selTbl&&(
              <>
                <div style={{fontWeight:700,fontSize:11,marginBottom:8,color:T.accent,textTransform:'uppercase'}}>Table</div>
                <div className="fg"><label className="flabel">Name</label>
                  <input className="finput" style={{fontSize:11}} value={selTbl.name} onChange={e=>updTbl(selTbl.id,'name',e.target.value)}/>
                </div>

                      <label style={{display:'flex',gap:3,alignItems:'center',fontSize:9,cursor:'pointer',color:col.fk?T.orange:T.muted}}><input type="checkbox" checked={col.fk} onChange={e=>updCol(selTbl.id,col.id,'fk',e.target.checked)}/> FK</label>
                      <label style={{display:'flex',gap:3,alignItems:'center',fontSize:9,cursor:'pointer',color:col.nn?T.teal:T.muted}}><input type="checkbox" checked={col.nn||false} onChange={e=>updCol(selTbl.id,col.id,'nn',e.target.checked)}/> NN</label>

              </>

                  </div>
                  <div className="fg"><label className="flabel">Type</label>
                    <select className="finput" style={{fontSize:10}} value={selCol.type} onChange={e=>updCol(pt.id,selCol.id,'type',e.target.value)}>

                    </select>
                  </div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
                    <label style={{display:'flex',gap:3,alignItems:'center',fontSize:9,cursor:'pointer',color:selCol.pk?T.yellow:T.muted}}><input type="checkbox" checked={selCol.pk} onChange={e=>updCol(pt.id,selCol.id,'pk',e.target.checked)}/> PK</label>
                    <label style={{display:'flex',gap:3,alignItems:'center',fontSize:9,cursor:'pointer',color:selCol.fk?T.orange:T.muted}}><input type="checkbox" checked={selCol.fk} onChange={e=>updCol(pt.id,selCol.id,'fk',e.target.checked)}/> FK</label>
                    <label style={{display:'flex',gap:3,alignItems:'center',fontSize:9,cursor:'pointer',color:selCol.nn?T.teal:T.muted}}><input type="checkbox" checked={selCol.nn||false} onChange={e=>updCol(pt.id,selCol.id,'nn',e.target.checked)}/> NN</label>
                  </div>
                </>
